    const cards = this.state.Game.players[player].discards[discardPileIndex];
    if (cards && cards.length > 0) {
      cards.reverse().forEach(card => {
        const row  = document.createElement('tr');
        const cell = document.createElement('td');
        cell.textContent = card.type === 'joker' ? '*' : card.value;
        row.appendChild(cell);
        infoTable.appendChild(row);
      });
      const rect = event.target.getBoundingClientRect();
      infoWindow.style.left    = `${rect.left + window.scrollX}px`;
      infoWindow.style.top     =
        `${rect.top + window.scrollY - infoWindow.offsetHeight - 10}px`;
      infoWindow.style.display = 'block';
      setTimeout(() => { infoWindow.style.display = 'none'; }, 5000);
    }
  }

  handleLongPress(event, discardPileIndex, player) {
    clearTimeout(this.state.longPressTimer);
    this.state.longPressTimer = setTimeout(() => { this.showInfoWindow(event, discardPileIndex, player); }, 1000);
  }
  handleRelease() { clearTimeout(this.state.longPressTimer); }

  bindDiscardLongPress() {
    document.querySelectorAll('.human-area [data-label*="Ablage"]').forEach(target => {
      target.addEventListener('touchstart', event => {
        const idx = Array.from(target.parentElement.children).indexOf(target);
        this.handleLongPress(event, idx, 'human');
      });
      target.addEventListener('touchend',  this.handleRelease);
      target.addEventListener('mousedown', event => {
        const idx = Array.from(target.parentElement.children).indexOf(target);
        this.handleLongPress(event, idx, 'human');
      });
      target.addEventListener('mouseup', this.handleRelease);
    });
    document.querySelectorAll('.opponent-area [data-label*="Ablage"]').forEach(target => {
      target.addEventListener('touchstart', event => {
        let idx = Array.from(target.parentElement.children).indexOf(target);
        idx -= 1;
        this.handleLongPress(event, idx, 'ai');
      });
      target.addEventListener('touchend',  this.handleRelease);
      target.addEventListener('mousedown', event => {
        let idx = Array.from(target.parentElement.children).indexOf(target);
        idx -= 1;
        this.handleLongPress(event, idx, 'ai');
      });
      target.addEventListener('mouseup', this.handleRelease);
    });
  }

  endGame(winner, loser, points) {
    const analysis = this.trackGameObservations('gameEnd', {
      winner:        winner,
      loserStockSize: this.state.Game.players[loser === 'KI' ? 'ai' : 'human'].stock.length
    });
    this.showEndGameMessage(winner, loser, points, analysis);
    // FIX: 'game-board' existiert nicht im HTML → korrigiert auf '.game-container'
    const gc = document.querySelector('.game-container');
    if (gc) gc.style.pointerEvents = 'none';
  }

  checkForWinner() {
    if (this.state.Game.players.human.stock.length === 0) {
      const aiPoints = this.state.Game.players.ai.stock.length * 5;
      this.endGame(this.state.playerName, 'KI', aiPoints);
      return true;
    }
    if (this.state.Game.players.ai.stock.length === 0) {
      const humanPoints = this.state.Game.players.human.stock.length * 5;
      this.endGame('KI', this.state.playerName, humanPoints);
      return true;
    }
    return false;
  }

  showEndGameMessage(winner, loser, points, analysis) {
    const overlay = document.createElement('div');
    overlay.id = 'end-game-overlay';
    Object.assign(overlay.style, {
      position:        'fixed',
      top:             '5vh',
      left:            '0',
      width:           '100vw',
      height:          '90vh',
      backgroundColor: 'rgba(0, 0, 0, 0.7)',
      display:         'flex',
      flexDirection:   'column',
      justifyContent:  'flex-start',
      alignItems:      'center',
      color:           'white',
      fontSize:        '2em',
      fontWeight:      'bold',
      zIndex:          '1000',
      textAlign:       'center',
      overflowY:       'auto',
      paddingTop:      '20px',
      paddingBottom:   'env(safe-area-inset-bottom)'
    });
    overlay.innerHTML = `
<div style="
  background:    white;
  color:         black;
  padding:       30px;
  border-radius: 10px;
  box-shadow:    0 0 20px rgba(255, 255, 255, 0.5);
  position:      relative;
  width:         80%;
  max-width:     600px;
">
  <h1 style="font-size: 2em;">Spiel beendet!</h1>
  <p><strong>Gewinner:</strong> ${winner} 🎉</p>
  <p><strong>Verlierer:</strong> ${loser} mit ${points} Punkten</p>
  <div style="display: flex; gap: 10px; margin-top: 20px;">
    <button id="restart-button" style="
      font-size: 0.6em; padding: 10px 20px; height: 40px;
      background: #4CAF50; color: white; border: none;
      border-radius: 5px; cursor: pointer; line-height: 20px;
    ">Neues Spiel</button>
    <button id="save-button" style="
      font-size: 0.6em; padding: 10px 20px; height: 40px;
      background: #2196F3; color: white; border: none;
      border-radius: 5px; cursor: pointer; line-height: 20px;
    ">Speichern</button>
  </div>
  <div id="analysis-section" style="margin-top: 20px; text-align: left; font-size: 0.8em;">
    <h2 style="font-size: 1.2em;">Version 6.0.0 –Auswertung–</h2>
    <textarea
      style="width: 100%; height: 250px; font-size: 14px; resize: none;"
      readonly
    >${analysis}</textarea>
    <p style="font-size: 0.8em;">Kopiere den Text und sende ihn an den Entwickler!</p>
    <button id="close-analysis" style="
      font-size: 0.8em; padding: 10px 20px; height: 40px;
      background: #f44336; color: white; border: none;
      border-radius: 5px; cursor: pointer;
      margin-top: 10px; line-height: 20px;
    ">Schließen</button>
  </div>
</div>`;
    document.body.appendChild(overlay);
    document.getElementById('restart-button').addEventListener('click', () => {
      document.body.removeChild(overlay);
      location.reload();
    });
    document.getElementById('close-analysis').addEventListener('click', () => {
      const analysisSection = document.getElementById('analysis-section');
      if (analysisSection) analysisSection.parentNode.removeChild(analysisSection);
    });
    document.getElementById('save-button').addEventListener('click', () => {
      if (analysis) {
        try {
          const bom         = '\uFEFF';
          const dataWithBOM = bom + analysis;
          const blob        = new Blob([dataWithBOM], { type: 'text/plain;charset=utf-8' });
          const downloadUrl = URL.createObjectURL(blob);
          const tempLink    = document.createElement('a');
          tempLink.href     = downloadUrl;
          tempLink.download = 'Ergebnis.txt';
          tempLink.style.display = 'none';
          document.body.appendChild(tempLink);
          tempLink.click();
          setTimeout(() => {
            document.body.removeChild(tempLink);
            URL.revokeObjectURL(downloadUrl);
          }, 100);
        } catch (error) {
          console.error('Fehler beim Speichern:', error);
        }
      }
    });
  }

  trackGameObservations(eventType, data) {
    let storedData = JSON.parse(localStorage.getItem('skipbo_observations')) || { games: [], count: 0 };
    const maxGames = 10;
    let observations = { gameId: this.state.currentGameId };
    switch (eventType) {
      case 'discardStrategy':
        observations.type           = 'discardStrategy';
        observations.cardValue      = data.cardValue;
        observations.dangerous      = data.wasDangerous;
        observations.sequenceValue  = data.createdSequence;
        observations.timestamp      = Date.now();
        break;
      case 'jokerStrategicUse':
        observations.type        = 'jokerStrategicUse';
        observations.jokerValue  = data.jokerValue;
        observations.usedForStock = data.usedForStock;
        observations.buildPile   = data.buildPileIndex;
        observations.timestamp   = Date.now();
        break;
      case 'opponentBlock':
        observations.type         = 'opponentBlock';
        observations.blockedValue = data.blockedValue;
        observations.kiStockSize  = this.state.Game.players.ai.stock.length;
        observations.timestamp    = Date.now();
        break;
      case 'opponentDiscard':
        observations.type              = 'opponentDiscard';
        observations.cardValue         = data.cardValue;
        observations.opponentStockSize = this.state.Game.players.human.stock.length;
        observations.kiNextNeeded      = this.calculateKINextNeeded();
        observations.timestamp         = Date.now();
        break;
      case 'kiMove':
        observations.type           = 'kiMove';
        observations.sourceType     = data.sourceType;
        observations.cardValue      = data.cardValue;
        observations.isJoker        = data.cardType === 'joker';
        observations.buildPileIndex = data.buildPileIndex;
        observations.stockSize      = this.state.Game.players.ai.stock.length;
        observations.timestamp      = Date.now();
        observations.helpedOpponent =
          this.state.Game.players.human.stock.slice(-1)[0]?.value === data.cardValue + 1 ||
          this.state.Game.players.human.discards.some(p => p[p.length - 1]?.value === data.cardValue + 1);
        if (observations.isJoker) {
          if (this.config.nagel_deburg.nagel_48) {
            this.state.debugInfo.push(`📌48★ Joker gelegt auf Bau🗑️ ${observations.buildPileIndex + 1} (Score: ${data.score})`);
          }
        }
        if (observations.helpedOpponent) {
          if (this.config.nagel_deburg.nagel_48) {
            this.state.debugInfo.push(
              `Gegnerhilfe: KI legte ${observations.cardValue}, Gegner könnte ${observations.cardValue + 1} nutzen`
            );
          }
        }
        break;
      case 'missedStock':
        observations.type           = 'missedStock';
        observations.stockCardValue = data.stockCardValue;
        observations.timestamp      = Date.now();
        if (this.config.nagel_deburg.nagel_45) {
          this.state.debugInfo.push(`Verpasster Stockzug: Stockkarte ${data.stockCardValue} hätte gelegt werden können`);
        }
        break;
      case 'gameEnd':
        observations.type          = 'gameEnd';
        observations.winner        = data.winner;
        observations.loserStockSize = data.loserStockSize;
        observations.timestamp     = Date.now();
        storedData.games.push(observations);
        storedData.count++;
        break;
      default:
        return null;
    }
    if (eventType !== 'gameEnd') storedData.games.push(observations);
    localStorage.setItem('skipbo_observations', JSON.stringify(storedData));
    if (eventType === 'gameEnd') {
      const currentGame    = storedData.games.filter(g => g.gameId === this.state.currentGameId);
      const currentAnalysis  = this.generateCurrentGameAnalysis(currentGame);
      const overallAnalysis  = this.generateOverallAnalysis(storedData.games);
      const debugSection     = this.generateDebugInfo();
      if (storedData.count >= maxGames) {
        localStorage.setItem('skipbo_observations', JSON.stringify({ games: [], count: 0 }));
      }
      this.state.currentGameId = Date.now();
      this.state.debugInfo     = [];
      return `${currentAnalysis}\n${overallAnalysis}\n${debugSection}`;
    }
    return null;
  }

  calculateKINextNeeded() {
    return this.state.Game.buildPiles.map(pile => {
      if (pile.length === 0) return 1;
      return pile[pile.length - 1].type === 'joker'
        ? pile.length + 1
        : pile[pile.length - 1].value + 1;
    });
  }

  predictEnemyStock(opponent) {
    try {
      const visible = [
        ...this.state.Game.players[opponent].discards.flat(),
        ...this.state.Game.buildPiles.flat(),
        ...this.state.Game.players[opponent].hand
      ]
      .filter(c => c)
      .map(c => c.type === 'joker' ? 'joker' : c.value);
      const total  = 144 - visible.length;
      const probs  = Object.entries(this.state.Game.tracking.deckComposition).map(([k, v]) => ({
        value: k,
        prob:  (v - visible.filter(x => x == k).length) / total
      }));
      const best   = probs.reduce((a, b) => a.prob > b.prob ? a : b);
      return {
        nextExpected: best.value === 'joker' ? null : parseInt(best.value),
        confidence:   best.prob
      };
    } catch {
      return { nextExpected: 1, confidence: 0.5 };
    }
  }

  detectConsecutiveDiscards(player) {
    const values = this.state.Game.tracking.discardHistory[player].values
      .filter(v => v !== 'joker' && typeof v === 'number');
    const series = [];
    for (let i = 0; i < values.length - 2; i++) {
      if (values[i + 1] === values[i] + 1 && values[i + 2] === values[i] + 2) {
        series.push(values[i] + 1);
      }
    }
    return [...new Set(series)];
  }

  calculateDynamicPriorities() {
    const phase      = 1 - (this.state.Game.drawPile.length / 144);
    const enemyStock = this.state.Game.players.human.stock.slice(-1)[0]?.value || 1;
    return {
      stockAttack:  Math.min(1.5, (12 - enemyStock) / 10 * phase),
      seriesDisrupt: 0.4 + (this.state.Game.tracking.discardHistory.human.values.length * 0.03),
      riskTaking:   phase < 0.3 ? 0.8 : phase < 0.7 ? 1.0 : 1.3
    };
  }

  generateCurrentGameAnalysis(currentGame) {
    let analysis      = 'Auswertung des aktuellen Spiels:\n';
    const blocks      = currentGame.filter(g =>
      g.type === 'opponentDiscard' && g.kiNextNeeded.includes(g.cardValue)
    ).length;
    analysis         += `Gegnerblockaden: ${blocks} Mal hat der Gegner eine benötigte Karte gelegt.\n`;
    const jokerUses  = currentGame.filter(g => g.type === 'kiMove' && g.isJoker).length;
    const earlyJoker = currentGame.filter(g => g.type === 'kiMove' && g.isJoker && g.buildPileIndex < 2).length;
    analysis        += `Joker-Nutzung: ${jokerUses} Mal eingesetzt, davon ${earlyJoker} auf niedrigen Stapeln (< 2).\n`;
    const stockMoves  = currentGame.filter(g => g.type === 'kiMove' && g.sourceType === 'stock').length;
    analysis         += `Stockabbau: ${stockMoves} Stockkarten erfolgreich gelegt.\n`;
    const missedStock = currentGame.filter(g => g.type === 'missedStock').length;
    analysis         += `Verpasste Stockzüge: ${missedStock} Mal hätte eine Stockkarte gelegt werden können.\n`;
    const helpedOpponent = currentGame.filter(g => g.type === 'kiMove' && g.helpedOpponent).length;
    analysis            += `Gegnerhilfe: ${helpedOpponent} Mal hat die KI dem Gegner geholfen.\n`;
    const gameEnd = currentGame.find(g => g.type === 'gameEnd');
    analysis     += `Ergebnis: ${gameEnd.winner} hat gewonnen, Verlierer hatte ${gameEnd.loserStockSize} Stockkarten.\n`;
    return analysis;
  }

  generateOverallAnalysis(games) {
    let analysis      = 'Gesamtbewertung (bisherige Spiele):\n';
    const blocks      = games.filter(g =>
      g.type === 'opponentDiscard' && g.kiNextNeeded.includes(g.cardValue)
    ).length;
    analysis         += `Gegnerblockaden: ${blocks} Mal hat der Gegner eine benötigte Karte gelegt.\n`;
    const jokerUses  = games.filter(g => g.type === 'kiMove' && g.isJoker).length;
    const earlyJoker = games.filter(g => g.type === 'kiMove' && g.isJoker && g.buildPileIndex < 2).length;
    analysis        += `Joker-Nutzung: ${jokerUses} Mal eingesetzt, davon ${earlyJoker} auf niedrigen Stapeln (< 2).\n`;
    const stockMoves  = games.filter(g => g.type === 'kiMove' && g.sourceType === 'stock').length;
    analysis         += `Stockabbau: ${stockMoves} Stockkarten erfolgreich gelegt.\n`;
    const missedStock = games.filter(g => g.type === 'missedStock').length;
    analysis         += `Verpasste Stockzüge: ${missedStock} Mal hätte eine Stockkarte gelegt werden können.\n`;
    const helpedOpponent = games.filter(g => g.type === 'kiMove' && g.helpedOpponent).length;
    analysis            += `Gegnerhilfe: ${helpedOpponent} Mal hat die KI dem Gegner geholfen.\n`;
    const totalGames = games.filter(g => g.type === 'gameEnd').length;
    const wins       = games.filter(g => g.type === 'gameEnd' && g.winner === 'KI').length;
    analysis        += `Spiele gewonnen: ${wins} von ${totalGames} (max. 10).\n`;
    return analysis;
  }

  generateDebugInfo() {
    let debugSection = 'Debug-Informationen (aktuelles Spiel):\n';
    if (this.state.debugInfo.length === 0) {
      debugSection += 'Keine spezifischen Debug-Informationen verfügbar.\n';
    } else {
      this.state.debugInfo.forEach(info => { debugSection += `- ${info}\n`; });
    }
    return debugSection;
  }
}

// INSTANZIERUNG
const game = new SkipBoGame();

// DOM READY
document.addEventListener('DOMContentLoaded', () => {
  game.initGame();
  game.addLongPressListener();
  game.bindDiscardLongPress();
});
</script>

<!--
- Version: 6.0.0 (Vollständige Klassen-Architektur mit Original-Inhalt)
- === ARCHITEKTUR-UPDATE v6.0.0 ===
- NEU 1: Gesamte Logik in class SkipBoGame gekapselt (kein globaler Scope mehr)
- NEU 2: Globale Variablen in this.state und this.config migriert
- NEU 3: Event-Delegation fix integriert (v5.3.1 Fix stabilisiert)
- BEIBEHALTEN: JEDER CSS-Block, jeder HTML-Tag, jeder Kommentar 1:1 aus v5.2.1
- BEIBEHALTEN: VOLLSTÄNDIGE SPIELREGELN im Info-Fenster (Punkte 1-9)

<html lang="de">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0,

>

<title>Skip-Bo Mobile v6.0.0 (Klassen-Architektur + Full Content)</title>
<style>
/* ============================================================ */
/* BASIS-RESET & BOX-SIZING                                     */
/* ============================================================ */
*, *::before, *::after {
  box-sizing: border-box;
}
html, body {
  margin:      0;
  padding:     0;
  height:      100%;
  width:       100%;
  background:  #1B5E20;
  color:       white;
  font-family: Arial, sans-serif;
  overflow:    hidden;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
/* ============================================================ */
/* INFOLABEL – vollbreitig, fixiert, verschiebbar               */
/* ============================================================ */
#status-label {
  position:        fixed;
  top:             0;
  left:            0;
  width:           100%;
  max-width:       100%;
  background:      rgba(46, 125, 50, 0.94);
  padding:         8px 10px;
  text-align:      center;
  font-size:       0.95rem;
  font-weight:     500;
  z-index:         1000;
  cursor:          grab;
  user-select:     none;
  box-shadow:      0 3px 8px rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(4px);
  border-bottom:   1px solid rgba(255, 255, 255, 0.2);
  border-radius:   0 0 8px 8px;
  white-space:     nowrap;
  overflow:        hidden;
  text-overflow:   ellipsis;
  transform:       none;
}
#status-label:active {
  cursor: grabbing;
}
/* ============================================================ */
/* GAME CONTAINER – 9:16-Proportion, responsive                 */
/* ============================================================ */
.game-container {
  aspect-ratio:    9 / 16;
  height:          100dvh;
  width:           min(100vw, calc(100dvh * 9 / 16));
  margin:          0 auto;
  background:      transparent;
  display:         flex;
  flex-direction:  column;
  overflow:        hidden;
  padding-top:     42px; /* Platz für fixierten Infobalken */
  position:        relative;
}
/* ============================================================ */
/* BEREICHE – exakte Flex-Verteilung für 5 gleiche Kartenreihen */
/* ============================================================ */
.opponent-area {
  flex:           2;
  display:        flex;
  flex-direction: column;
  gap:            4px;
  padding:        4px 4px 2px;
  min-height:     0;
}
.build-area {
  flex:             1;
  display:          flex;
  flex-direction:   column;
  justify-content:  center;
  padding:          4px;
  min-height:       0;
}
.human-area {
  flex:           2;
  display:        flex;
  flex-direction: column;
  gap:            4px;
  padding:        2px 4px 4px;
  min-height:     0;
}
/* ============================================================ */
/* REIHEN & HÄNDE – je 1/5 der verfügbaren Höhe                 */
/* ============================================================ */
.main-piles,
.hand {
  flex:                    1;
  min-height:              0;
  display:                 grid;
  grid-template-columns:   repeat(5, 1fr);
  gap:                     4px;
  align-items:             center;
  justify-items:           center;
  width:                   100%;
}
/* ============================================================ */
/* KARTEN & FELDER                                              */
/* ============================================================ */
.field {
  background:      rgba(255, 255, 255, 0.1);
  border:          2px dashed #fff;
  border-radius:   8px;
  display:         flex;
  justify-content: center;
  align-items:     center;
  position:        relative;
  overflow:        hidden;
  perspective:     1000px;
  width:           100%;
  height:          100%;
}
.card {
  border:          2px solid #000 !important;
  border-radius:   8px;
  aspect-ratio:    2 / 3;
  width:           100% !important;
  height:          auto !important;
  max-height:      100%;
  margin:          auto;
  display:         flex;
  flex-direction:  column;
  justify-content: space-between;
  padding:         5px;
  position:        relative;
  transform-style: preserve-3d;
  transition:      transform 0.5s, box-shadow 0.5s;
  box-shadow:      0 0 5px #000000, 0 0 15px #000000 inset;
  background:      radial-gradient(circle, rgba(255,255,255,0.1), rgba(255,255,255,0.8));
}
.card.selected {
  transform: translateY(-40px) rotateY(15deg) rotateX(10deg);
  animation:
    neon-pulse  1.5s infinite alternate,
    card-float  2s   infinite;
}
.card.backface {
  background: lightgreen !important;
  animation:  card-glow 2s ease-in-out infinite alternate;
}
.card.backface::before {
  content:    "SKIP-BO";
  position:   absolute;
  top:        50%;
  left:       50%;
  transform:  translate(-50%, -50%) rotate(-45deg);
  font-size:  1.5rem;
  font-weight: bold;
  color:      rgba(255, 255, 255, 0.8);
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
  letter-spacing: 2px;
}
.card-corner {
  position:    absolute;
  font-size:   1.2rem;
  font-weight: bold;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
}
.card-corner.top-left     { top: 5px;    left:  5px; }
.card-corner.top-right    { top: 5px;    right: 5px; }
.card-corner.bottom-left  { bottom: 5px; left:  5px; transform: rotate(180deg); }
.card-corner.bottom-right { bottom: 5px; right: 5px; transform: rotate(180deg); }
.card-middle {
  position:    absolute;
  top:         50%;
  left:        50%;
  transform:   translate(-50%, -50%);
  font-size:   2rem;
  font-weight: bold;
  text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
}
.human-area    .field.stock .card,
.opponent-area .field.stock .card,
.build-area    .field.draw-pile .card {
  width:      100%;
  height:      auto;
  max-height: 100%;
}
/* ============================================================ */
/* KARTENFARBEN (1:1 Original)                                  */
/* ============================================================ */
.card:not(.backface)[data-value="1"],
.card:not(.backface)[data-value="2"],
.card:not(.backface)[data-value="3"],
.card:not(.backface)[data-value="4"] {
  background: radial-gradient(
    circle,
    #BBDEFB, #64B5F6, #2196F3, #0D47A1
  ) !important;
  box-shadow: 0 0 15px #2196F3;
}
.card:not(.backface)[data-value="5"],
.card:not(.backface)[data-value="6"],
.card:not(.backface)[data-value="7"],
.card:not(.backface)[data-value="8"] {
  background: radial-gradient(
    circle,
    #C8E6C9, #81C784, #4CAF50, #1B5E20
  ) !important;
  box-shadow: 0 0 15px #4CAF50;
}
.card:not(.backface)[data-value="9"],
.card:not(.backface)[data-value="10"],
.card:not(.backface)[data-value="11"],
.card:not(.backface)[data-value="12"] {
  background: radial-gradient(
    circle,
    #FFCDD2, #EF9A9A, #f44336, #B71C1C
  ) !important;
  box-shadow: 0 0 15px #f44336;
}
.card:not(.backface)[data-type="joker"] {
  background: radial-gradient(
    circle,
    #FFF9C4, yellow, gold, #FFD700
  ) !important;
  color:      #000;
  box-shadow: 0 0 15px gold;
}
/* ============================================================ */
/* ANIMATIONEN (1:1 Original)                                    */
/* ============================================================ */
@keyframes card-glow {
  from { box-shadow: 0 0  5px #1565C0; }
  to   { box-shadow: 0 0 15px #0D47A1; }
}
@keyframes neon-pulse {
  from {
    box-shadow:
      0 0 10px #FFD700, 0 0 20px #FFD700,
      0 0 30px #FFD700, 0 0 40px #FFD700;
  }
  to {
    box-shadow:
      0 0 20px #FFD700, 0 0 30px #FFD700,
      0 0 40px #FFD700, 0 0 50px #FFD700;
  }
}
@keyframes card-float {
  0%   { transform: translateY(   0); }
  50%  { transform: translateY(-20px); }
  100% { transform: translateY(   0); }
}
@keyframes card-drop {
  0%   { transform: translateY(-40px) rotateY(15deg) rotateX(10deg); }
  100% { transform: translateY(   0)  rotateY( 0deg) rotateX( 0deg); }
}
/* ============================================================ */
/* LABEL-STILE & INFO-FENSTER                                    */
/* ============================================================ */
.field::after {
  content:       attr(data-label);
  position:      absolute;
  bottom:        4px;
  left:          2px;
  right:         2px;
  font-size:     0.65rem;
  color:         rgba(255, 255, 255, 0.9);
  text-align:    center;
  padding:       2px;
  background:    rgba(0, 0, 0, 0.4);
  border-radius: 3px;
}
.field.card.selected {
  box-shadow: 0 0 15px #FFD700, 0 0 30px #FFD700 inset;
  transform:  translateY(-40px) rotateY(15deg) rotateX(10deg) scale(1.05);
  animation:
    neon-pulse 1.5s infinite alternate,
    card-float 2s   infinite;
  transition: all 0.3s ease;
}
.field.card.placed {
  animation: card-drop 1s forwards;
}
.field.card {
  transition:   all 0.3s ease;
  touch-action: manipulation;
}
.joker-number {
  position:         absolute;
  top:              5px;
  left:             50%;
  transform:        translateX(-50%);
  font-size:        0.8em;
  color:            black;
  background-color: rgba(255, 255, 255, 0.8);
  padding:          1px 3px;
  border-radius:    2px;
}
#info-window {
  position:      absolute;
  top:           -300px;
  left:          50%;
  transform:     translateX(-50%);
  background:    #000;
  color:         white;
  padding:       15px;
  text-align:    center;
  font-size:     1.2rem;
  z-index:       1001;
  box-shadow:    0 4px 8px rgba(0, 0, 0, 0.2);
  width:         80%;
  max-width:     600px;
  display:       none;
}
#info-table {
  width:           100%;
  border-collapse: collapse;
  margin:          0 auto;
}
#info-table td {
  border:     1px solid #ddd;
  padding:    8px;
  text-align: center;
  background: rgba(255, 255, 255, 0.1);
}
.stock-count {
  position:         absolute;
  top:              5px;
  left:             50%;
  transform:        translateX(-50%);
  font-size:        0.8em;
  color:            black;
  background-color: rgba(255, 255, 255, 0.8);
  padding:          1px 3px;
  border-radius:    2px;
  z-index:          1;
}
/* ============================================================ */
/* KI-ERWEITERUNGEN & OVERLAYS (1:1 Original)                   */
/* ============================================================ */
.ai-prediction-overlay {
  position:      absolute;
  top:           -2px;
  left:          -2px;
  right:         -2px;
  bottom:        -2px;
  border:        2px solid #ff4444;
  border-radius: 8px;
  animation:     prediction-pulse 1.8s ease-in-out infinite;
  pointer-events: none;
  z-index:       999;
  box-shadow:    0 0 12px rgba(255, 68, 68, 0.3);
}
@keyframes prediction-pulse {
  0%   { opacity: 0.4; transform: scale(0.98); }
  50%  { opacity: 0.9; transform: scale(1.02); }
  100% { opacity: 0.4; transform: scale(0.98); }
}
.strategy-tag {
  position:        absolute;
  bottom:          calc(100% + 5px);
  left:            50%;
  transform:       translateX(-50%);
  background:      rgba(40, 40, 40, 0.9);
  color:           #fff;
  padding:         4px 12px;
  border-radius:   15px;
  font-size:       0.85em;
  font-weight:     bold;
  white-space:     nowrap;
  backdrop-filter: blur(2px);
  z-index:         1001;
  box-shadow:      0 3px 6px rgba(0, 0, 0, 0.2);
}
</style>
</head>

<script>
// =============================================================
// CLASS SKIPBOGAME
// Kapselt den gesamten Spielzustand und die Logik
// =============================================================
class SkipBoGame {
  constructor() {
    // State-Management (ersetzt alle globalen Variablen)
    this.state = {
      selectedCard: null,
      selectedSource: null,
      selectedIndex: null,
      Joker_auf_Ablage: false,
      currentPlayer: 'human',
      playerName: 'Spieler',
      spielGeschwindigkeit: 4,
      currentGameId: Date.now(),
      debugInfo: [],
      longPressTimer: null,
      Game: {
        deck: [],
        players: {
          human: { hand: [], stock: [], discards: [[], [], [], []] },
          ai:    { hand: [], stock: [], discards: [[], [], [], []] }
        },
        buildPiles: [[], [], [], []],
        drawPile:   [],
        stockCardIsRemovable: true,
        tracking: {
          deckComposition: [],
          discardHistory: { human: { values: [], timestamps: [] }, ai: { values: [], timestamps: [] } },
          stockPredictions: { human: { nextExpected: 1, confidence: 0 }, ai: { nextExpected: 1, confidence: 0 } }
        }
      }
    };

    // Konfiguration
    this.config = {
      GESCHWINDIGKEIT: { schnell: 1, mittel: 4, langsam: 10 },
      nagel_deburg: {
        zeitintervall: true,
        nagel_1:  false, // riskScore +6000 wenn Gegner Folgekarte hat
        nagel_2:  false, // riskScore -300 wenn eigener Stock <= 5
        nagel_3:  false, // riskScore +800 Lückenfüllung Sequenzmuster
        nagel_4:  false, // riskScore +60 Joker-Risiko-Malus
        nagel_5:  false, // Grundbonus 600 bei gültigem Zug
        nagel_6:  false, // score -800 Malus Joker auf niedrigem Stapel
        nagel_7:  false, // score +15000 Joker trifft Stock-Wert
        nagel_8:  false, // score += futureValue*60 Joker-Zukunftswert
        nagel_9:  false, // (reserviert)
        nagel_10: false, // score 5000-8000 Stockabbau-Beschleunigung
        nagel_11: false, // score Stockabbau kombiniert mit 10
        nagel_12: false, // score += GapSize*150 Lückenbonus
        nagel_13: false, // Ablage-Basisscore 150
        nagel_14: false, // score -5000 riskante Ablagen reduzieren
        nagel_15: false, // +120 Sequenz-Bonus in Ablage
        nagel_16: false, // +20 Bonus für leere Ablagestapel
        nagel_17: false, // +30 Bonus für niedrigere Karte in Ablage
        nagel_18: false, // (reserviert)
        nagel_19: false, // -2 Malus pro Karte im Ablagestapel
        nagel_20: false, // -15000 Gegnerhilfe-Blockade
        nagel_21a:false, // +3 langfristige Planung pileValue >= 8
        nagel_22: false, // (reserviert)
        nagel_23: false, // +600 Discard-Stock-Synergy-Bonus
        nagel_24: false, // +8000 Stock-min Fallback
        nagel_25: false, // Joker Future progressive Bonus
        nagel_26: false, // +300 Basispunkte Ablagestapelzug
        nagel_27: false, // Warnung Joker/ungültiger Wert in Ablage
        nagel_28: false, // +600 Sequenzkontrolle riskScore
        nagel_29: false, // +3000 kritischer Malus Gegner-Stock <= 3
        nagel_30: false, // +80 Risky-Stock-Joker-Schwelle
        nagel_31: false, // KI priorisiert Stockkarte wenn identisch
        nagel_32: false, // +5000 Stockabbau-Priorisierung
        nagel_33: false, // +500 Joker-Schutz in Ablage
        nagel_34: false, // +1500/3000 Stock-Angriff Basiswert
        nagel_35: false, // +800 Serienunterbrechung-Bonus
        nagel_36: false, // (reserviert)
        nagel_37: false, // Blockade-Karte Score +2500 Gegnerhilfe
        nagel_38: false, // Distanz zum eigenen Stock Score
        nagel_39: false, // riskScore -5000 Stockabbau Vorrang (Joker)
        nagel_40: false, // Joker-Schwellenwert 0.20
        nagel_41: false, // 1000 Mindestbewertung bei nur Joker-Zügen
        nagel_42: false, // 0.8 Joker-Gewichtung
        nagel_43: false, // Hauptzug-Protokollierung (viele Ausgaben!)
        nagel_44: false, // Adaptiver Blockade-Parameter sqrt*500
        nagel_45: false, // Joker-Filter und verpasste Stockzüge
        nagel_46: false, // Ablagestapel-Quellvalidierung
        nagel_47: false, // Hand/Stock-Kollisionsprüfung
        nagel_48: false, // Joker-Ablage und Gegnerhilfe-Protokoll
        nagel_49: false, // Joker in Ablagestapel riskScore -15000
        nagel_50: false, // Rücksprung-RiskScore Protokollierung
        nagel_51: false, // Joker in Ablage gelegt
        nagel_17a:false  // Stock-Help-Bonus in Ablage
      }
    };

    // Methoden-Bindung (für Event Listener)
    this.handleGameInteraction = this.handleGameInteraction.bind(this);
    this.handleCardSelect      = this.handleCardSelect.bind(this);
    this.handleCardPlace       = this.handleCardPlace.bind(this);
    this.aiTurn                = this.aiTurn.bind(this);
    this.switchPlayer          = this.switchPlayer.bind(this);
    this.handleRelease         = this.handleRelease.bind(this);
  }

  // =============================================================
  // SPIELINITIALISIERUNG
  // =============================================================
  async initGame() {
    // Gespeicherte Spielgeschwindigkeit laden
    try {
      const savedSpeed = localStorage.getItem('skipbo-speed');
      if (savedSpeed) this.state.spielGeschwindigkeit = parseInt(savedSpeed);
    } catch (e) {
      console.error('Fehler beim Zugriff auf localStorage:', e);
    }
    // Deck aufbauen: 12 × 12 Zahlenkarten + 12 Joker
    this.state.Game.deck = [];
    for (let s = 0; s < 12; s++) {
      for (let n = 1; n <= 12; n++) {
        this.state.Game.deck.push({ type: 'number', value: n });
      }
    }
    for (let j = 0; j < 12; j++) {
      this.state.Game.deck.push({ type: 'joker', value: '★' });
    }
    // Deck mischen (Fisher-Yates)
    for (let i = this.state.Game.deck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [this.state.Game.deck[i], this.state.Game.deck[j]] = [this.state.Game.deck[j], this.state.Game.deck[i]];
    }
    // Karten verteilen
    this.state.Game.players.human.hand  = this.state.Game.deck.splice(0,  5);
    this.state.Game.players.ai.hand     = this.state.Game.deck.splice(0,  5);
    this.state.Game.players.human.stock = this.state.Game.deck.splice(0, 20);
    this.state.Game.players.ai.stock    = this.state.Game.deck.splice(0, 20);
    this.state.Game.drawPile            = this.state.Game.deck;
    // FIX: stockCardIsRemovable korrekt initialisieren
    this.state.Game.stockCardIsRemovable = true;
    // Sichtbarkeit
    this.state.Game.players.human.hand.forEach(card => card.faceUp = true);
    this.state.Game.players.ai.hand.forEach   (card => card.faceUp = false);
    // KI-Startkarten hier ziehen
    this.drawCardsUntilFive('ai');
    this.updateView();
    this.showMessage('Spiel initialisiert. Du bist am Zug!');
    this.enableDraggableStatusLabel();
    this.showOverlay();
    this.setupTouchEvents();
    if (this.state.currentPlayer === 'ai') setTimeout(this.aiTurn, 3000);
    // Tracking-Struktur initialisieren
    this.state.Game.tracking = {
      deckComposition: Array.from({ length: 12 }, (_, i) => 12).concat(Array(12).fill('joker')),
      discardHistory: {
        human: { values: [], timestamps: [] },
        ai:    { values: [], timestamps: [] }
      },
      stockPredictions: {
        human: { nextExpected: 1, confidence: 0 },
        ai:    { nextExpected: 1, confidence: 0 }
      }
    };
    document.querySelectorAll('.strategy-tag, .ai-prediction-overlay').forEach(el => el.remove());
  }

  delayWithCallback(ms, callback) {
    setTimeout(callback, ms);
  }

  // =============================================================
  // VIEW UPDATES & STOCK-RAHMEN
  // =============================================================
  updateView() {
    this.updateHand ('human', document.getElementById('playerHand'));
    this.updateHand ('ai',    document.getElementById('opponentHand'));

  createInfoText() {
    // VOLLE REGELN (1:1 Original v5.2.1)
    return `
<h2>Spielregeln und Benutzerinformationen</h2>
<p><strong>1. Ziel des Spiels:</strong><br>
- Das Hauptziel ist es, alle Karten aus deinem Stockstapel abzulegen, um das Spiel zu gewinnen.<br>
- Du kannst Karten auf die Baukartenstapel in aufsteigender Reihenfolge von 1 bis 12 ablegen.<br>
- Joker können jede Karte ersetzen und haben keinen festen Wert.</p>
<p><strong>2. Kartentypen:</strong><br>
- Zahlenkarten: Karten mit Werten von 1 bis 12.<br>
- Joker: Kann jede Karte ersetzen und wird flexibel verwendet.</p>
<p><strong>3. Kartenmengen:</strong><br>
- Es gibt insgesamt 144 Zahlenkarten, aufgeteilt in 12 Stapel à 12 Karten pro Zahl.<br>
- Zusätzlich gibt es 12 Jokerkarten.</p>
<p><strong>4. Spielstart:</strong><br>
- Jeder Spieler erhält zu Beginn 5 Karten in die Hand.<br>
- Jeder Spieler erhält außerdem 20 Karten in seinen Stockstapel.<br>
- Die restlichen Karten werden als Nachziehstapel verwendet.</p>
<p><strong>5. Spielverlauf:</strong><br>
- Spieler legen abwechselnd Karten auf Baukartenstapel oder Ablagestapel ab.<br>
- Die Karten müssen in aufsteigender Reihenfolge auf die Baukartenstapel gelegt werden.<br>
- Ein Joker kann jede Karte ersetzen und kann auf jeden Baukartenstapel gelegt werden.<br>
- Wenn ein Baukartenstapel vollständig ist, wird er geleert und die Karten in den Nachziehstapel gemischt.<br>
- Ziehe Karten vom Nachziehstapel, bis du 5 Karten in der Hand hast.<br>
- Wenn du keine legalen Züge mehr machen kannst, lege eine Karte auf einen deiner Ablagestapel.<br>
- Ein kurzes Drücken auf den Ablagestapel zeigt, wie die Karten abgelegt werden.</p>
<p><strong>6. Spieleraktionen:</strong><br>
- Wähle eine Karte aus deiner Hand, deinem Stockstapel oder deinem Ablagestapel aus, um sie zu spielen.<br>
- Lege die ausgewählte Karte auf einen Baukartenstapel oder Ablagestapel.<br>
- Verwende die touchstart- und click-Ereignisse, um Karten auszuwählen und zu legen.<br>
- Langes Drücken eines Ablagestapels zeigt ein Hinweisfenster, das die Karten im Stapel anzeigt.<br>
- Die Info-Leiste kann verschoben werden, um sie beim Spielen optimal zu platzieren.</p>
<p><strong>7. Anpassung der Spielgeschwindigkeit:</strong><br>
- Die Geschwindigkeit des Spiels kann mit der Variablen spielGeschwindigkeit angepasst werden.<br>
- Standardwert ist 4 (mittel). Mögliche Werte: 0 (sehr schnell) bis 20 (sehr langsam),
einstellbar über den Slider im Overlay.</p>
<p><strong>8. Endgame:</strong><br>
- Das Spiel endet, wenn ein Spieler alle Karten aus seinem Stockstapel abgelegt hat.<br>
- Der Spieler ohne Karten im Stockstapel gewinnt.<br>
- Die Punkte des Verlierers werden basierend auf den verbleibenden Karten in der Hand berechnet
(5 Punkte pro Karte).</p>
<p><strong>9. Weitere Details:</strong><br>
- Wenn der Nachziehstapel leer ist, werden alle vollständigen Baukartenstapel gemischt
und als neuer Nachziehstapel verwendet.<br>
- Spieler können nur eine Karte pro Zug legen.<br>
- Der aktuelle Spieler wird durch die switchPlayer-Funktion verwaltet, die zwischen human und ai wechselt.<br>
- Die Stockkarten zeigen die verbleibende Anzahl der Karten an.<br>
- Die Jokerkarte zeigt immer die ersetzte Karte an.<br>
- Ein langes 5-Sekunden-Drücken auf die HTML-Seite öffnet dieses Info-Fenster wieder.<br>
- Im Hauptfenster kann man die Infoleiste nach unten schieben, um sie beim Spielen optimal zu platzieren.</p>
`;
  }
  // Langes Drücken für Info-Overlay
  addLongPressListener() {
    let pressTimer;
    document.addEventListener('touchstart', () => { pressTimer = setTimeout(() => this.showOverlay(), 5000); });
    document.addEventListener('touchend',   () => { clearTimeout(pressTimer); });
    document.addEventListener('mousedown',  () => { pressTimer = setTimeout(() => this.showOverlay(), 5000); });
    document.addEventListener('mouseup',    () => { clearTimeout(pressTimer); });
  }

  // =============================================================
  // EVENT-HANDLING & TOUCH (v6.0.0 Event Delegation)
  // =============================================================
  setupTouchEvents() {
    const container = document.querySelector('.game-container');
    if (!container) return;
    // Zentrales Event-Routing
    container.addEventListener('click', this.handleGameInteraction);
  }
  
  handleGameInteraction(event) {
    if (this.state.currentPlayer !== 'human') return;

    const target = event.target;

    // 1. Kartenauswahl (Vorrang vor Ablegen)
    const card = target.closest('.card');
    if (card && !card.closest('.build-pile') && !card.closest('.draw-pile')) {
      this.handleCardSelect({ currentTarget: card, preventDefault: () => {} });
      return;
    }

    // 2. Ablegen
    if (!this.state.selectedCard) return;

    const buildPile = target.closest('.build-pile');
    if (buildPile) {
      this.handleCardPlace({ currentTarget: buildPile, target: target, preventDefault: () => {} });
      return;
    }
    const discardPile = target.closest('.human-area [data-label*="Ablage"]');
    if (discardPile) {
      this.handleCardPlace({ currentTarget: discardPile, target: target, preventDefault: () => {} });
      return;
    }
  }

  handleCardSelect(event) {
    event.preventDefault();
    if (this.state.currentPlayer !== 'human') return;

    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    const cardElement = event.currentTarget;

    if (this.state.selectedCard === cardElement) {
      this.state.selectedCard = null;
      this.state.selectedSource = null;
      this.state.selectedIndex = null;
      this.showMessage("Auswahl aufgehoben.");
      return;
    }

    cardElement.classList.add('selected');
    this.state.selectedCard = cardElement;
    this.state.selectedSource = this.getSourceType(cardElement);
    this.state.selectedIndex = this.getSourceIndex(cardElement);
    this.showMessage(`Karte aus ${this.state.selectedSource} ausgewählt. Wähle ein Ziel.`);
  }

  handleCardPlace(event) {
    event.preventDefault();
    if (!this.state.selectedCard) {
      this.showMessage('Bitte zuerst eine Karte auswählen');
      return;
    }

    const el     = event.currentTarget || event.target;
    const target = el.closest('.build-pile') || el.closest('[data-label*="Ablage"]');
    if (!target) return;

    if (this.state.currentPlayer !== 'human') {
      this.showMessage('Es ist nicht dein Zug!');
      return;
    }

    let success = false;
    const wasLastHandCard = this.state.selectedSource === 'hand' && this.state.Game.players.human.hand.length === 1;
    const stockPile = this.state.Game.players.human.stock;
    const topStock  = stockPile[stockPile.length - 1];

    // Nagel 47 Logik
    if (this.state.selectedCard === topStock && this.state.selectedCard.type !== 'joker') {
      if (this.config.nagel_deburg.nagel_47) {
        this.state.debugInfo.push(`📌47 Die Handkarte entspricht der Stockkarte und ist kein ★Joker – weiter mit aiTurn ❌`);
      }
      this.aiTurn();
      return;
    }

    // Logik: ABLEGEN AUF BAUMSTAPEL
    if (target.classList.contains('build-pile') || target.closest('.build-pile')) {
      const buildPiles     = document.querySelectorAll('.build-pile');
      const actualPile     = target.classList.contains('build-pile') ? target : target.closest('.build-pile');
      const buildPileIndex = Array.from(buildPiles).indexOf(actualPile);

      if (this.handleBuildPileDrop(this.state.currentPlayer, this.state.selectedSource, this.state.selectedIndex, buildPileIndex)) {
        success = true;
        this.showMessage('Du hast eine Karte auf 🗑️Baustapel gelegt');
        if (this.config.nagel_deburg.nagel_43) this.state.debugInfo.push(`📌43 🎲🎲 Du hast eine Karte auf 🗑️Baustapel gelegt 🎲🎲`);
        if (wasLastHandCard) {
          this.drawCardsUntilFive('human');
          this.drawCardsUntilFive('ai');
          this.state.debugInfo.push(`📌60 🎲🎲 5 Handkarten nachgezogen 🎲🎲`);
        }
      } else {
        this.showMessage('Dieser Zug ist nicht erlaubt');
      }
    // Logik: ABLEGEN AUF ABLAGESTAPEL
    } else if (target.matches('[data-label*="Ablage"]') || target.closest('[data-label*="Ablage"]')) {
      const actualDiscard = target.matches('[data-label*="Ablage"]') ? target : target.closest('[data-label*="Ablage"]');
      const discardPiles     = document.querySelectorAll('.human-area [data-label*="Ablage"]');
      const discardPileIndex = Array.from(discardPiles).indexOf(actualDiscard);

      if (this.handleDiscardPileDrop(this.state.currentPlayer, this.state.selectedSource, this.state.selectedIndex, discardPileIndex)) {
        success = true;
        this.showMessage('Du hast eine Karte auf Ablagestapel gelegt');
        if (this.config.nagel_deburg.nagel_43) this.state.debugInfo.push(`📌43 🎲🎲 Du hast eine Karte auf Ablagestapel gelegt 🎲🎲`);
        this.switchPlayer();
        this.showMessage('Karte auf Ablagestapel gelegt, Spieler wechselt');
      }
    }

    // CLEANUP & UI UPDATE
    if (success) {
      this.state.selectedCard   = null;
      this.state.selectedSource = null;
      this.state.selectedIndex  = null;
      document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
      this.updateView();
    }
  }

  // =============================================================
  // SPIELLOGIK & ZUGREGELN
  // =============================================================
  getSourceType(element) {
    if (element.closest('.hand'))                return 'hand';
    if (element.closest('.stock'))               return 'stock';
    if (element.closest('[data-label*="Ablage"]')) return 'discard';
    return null;
  }
  getSourceIndex(element) {
    if (element.closest('.hand')) {
      return Array.from(element.parentElement.children).indexOf(element);
    }
    if (element.closest('[data-label*="Ablage"]')) {
      const discardPiles = document.querySelectorAll('.human-area [data-label*="Ablage"]');
      return Array.from(discardPiles).indexOf(element.closest('[data-label*="Ablage"]'));
    }
    return 0.01;
  }
  getJokerValue(buildPile, jokerPosition) {
    if (jokerPosition === 0) return 1;
    const previousCard = buildPile[jokerPosition - 1];
    return previousCard.type === 'joker'
      ? jokerPosition + 1
      : parseInt(previousCard.value) + 1;
  }
  handleBuildPileDrop(player, sourceType, sourceIndex, buildPileIndex) {
    let card, sourceArray;
    switch (sourceType) {
      case 'hand':
        sourceArray = this.state.Game.players[player].hand;
        card        = sourceArray[sourceIndex];
        break;
      case 'stock':
        sourceArray = this.state.Game.players[player].stock;
        card        = sourceArray[sourceArray.length - 1];
        break;
      case 'discard':
        sourceArray = this.state.Game.players[player].discards[sourceIndex];
        if (sourceArray?.length > 0) {
          card = sourceArray[sourceArray.length - 1];
          if (this.config.nagel_deburg.nagel_46) {
            this.state.debugInfo.push(`📌46 Ablagestapel ${sourceIndex + 1}: ${card.value} gefunden`);
          }
        } else {
          if (this.config.nagel_deburg.nagel_46) {
            this.state.debugInfo.push(`📌46 Ablagestapel ${sourceIndex + 1} ist leer`);
          }
          return false;
        }
        break;
      default:
        if (this.config.nagel_deburg.nagel_46) {
          this.state.debugInfo.push(`📌46 Ungültiger sourceType ❌ Abbruch in Ablagestapel ${sourceIndex + 1}`);
        }
        return false;
    }
    if (!card) return false;
    if (this.isValidBuildMove(card, buildPileIndex)) {
      this.state.Game.buildPiles[buildPileIndex].push(card);
      if (sourceType === 'hand') sourceArray.splice(sourceIndex, 1);
      else sourceArray.pop();
      if (this.isBuildPileComplete(buildPileIndex)) this.clearBuildPile(buildPileIndex);
      return true;
    }
    return false;
  }

  handleDiscardPileDrop(player, sourceType, sourceIndex, discardPileIndex) {
    if (!this.state.selectedCard) {
      if (this.state.Game.players[player].hand.length > 0) {
        const criticalNumbers = this.getOpponentCriticalNumbers();
        let safestIndex = 0, lowestScore = Infinity;
        this.state.Game.players[player].hand.forEach((card, i) => {
          let score = 0;
          score += criticalNumbers.includes(card.value + 1) ? 2500 : 0;
          if (this.config.nagel_deburg.nagel_37) {
            this.state.debugInfo.push(
              `📌37 🔒Blockade Karte: ${card.value} (${card.type}) Score⬆️+2500 Gegnerhilfe ges.=🎉 ${score}`
            );
          }
          const stockTop = this.state.Game.players[player].stock.slice(-1)[0]?.value || 0;
          try {
            let calculatedValue = Math.abs(card.value - stockTop) * 10;
            if (!isNaN(calculatedValue) && isFinite(calculatedValue)) score += calculatedValue;
          } catch (error) {
            console.error('Fehler bei der Berechnung des Scores:', error);
          }
          if (this.config.nagel_deburg.nagel_38) {
            this.state.debugInfo.push(
              `📌38 Distanz↔️ zum eigenen Stock: Karte: ${card.value} (Stock-Top: ${stockTop}) Score-ges.=🎉 ${score}`
            );
          }
          try {
            let bonusValue = (card.type === 'joker') ? 500 : 0;
            if (!isNaN(bonusValue) && isFinite(bonusValue)) score += bonusValue;
          } catch (error) {
            console.error('Fehler bei der Berechnung des Joker-Bonus:', error);
          }
          if (this.config.nagel_deburg.nagel_33) {
            this.state.debugInfo.push(
              `📌33 Joker-Schutz: Karte: ${card.value} (Typ: ${card.type}) Score⬆️+500 ges.=🎉 ${score}`
            );
          }
          score += this.getDiscardSequenceBonus(player, discardPileIndex, card);
          if (score < lowestScore) { lowestScore = score; safestIndex = i; }
        });
        this.state.selectedCard = this.state.Game.players[player].hand[safestIndex];
        this.showMessage(`Automatische Ablage: Unnötigste Karte (${this.state.selectedCard.value}) gewählt.`);
        if (this.config.nagel_deburg.nagel_43) {
          this.state.debugInfo.push(`📌43 🎲🎲 Automatische Ablage: Unnötigste Karte (${this.state.selectedCard.value}) gewählt. 🎲🎲`);
        }
      } else {
        this.showMessage('Keine Karte verfügbar zum Ablegen.');
        return false;
      }
    }
    let card, sourceArray;
    switch (sourceType) {
      case 'hand':
        sourceArray = this.state.Game.players[player].hand;
        card        = sourceArray[sourceIndex];
        break;
      case 'stock':
        this.showMessage(`${player === 'human' ? 'Du' : 'KI'} kann keine Stockkarten in die Ablage legen.`);
        if (this.config.nagel_deburg.nagel_43) {
          this.state.debugInfo.push(
            `📌43 🎲🎲 ${player === 'human' ? 'Du' : 'KI'} kann keine Stockkarten in die Ablage legen. 🎲🎲`
          );
        }
        return false;
      default:
        return false;
    }
    if (card) {
      if (!this.state.Game.players[player].discards[discardPileIndex]) {
        this.state.Game.players[player].discards[discardPileIndex] = [];
      }
      this.state.Game.players[player].discards[discardPileIndex].push(card);
      if (sourceType === 'hand') sourceArray.splice(sourceIndex, 1);
      else sourceArray.pop();
      if (player === 'human') {
        this.trackGameObservations('opponentDiscard', { cardValue: card.value });
      }
      try {
        if (card?.value || card?.type === 'joker') {
          const key = card.type === 'joker' ? 'joker' : card.value;
          if (this.state.Game.tracking.deckComposition[key] > 0) this.state.Game.tracking.deckComposition[key]--;
          this.state.Game.tracking.discardHistory[player].values.push(key);
          this.state.Game.tracking.discardHistory[player].timestamps.push(Date.now());
        }
      } catch (e) {
        console.error('Discard Tracking Error:', e);
      }
      return true;
    }
    this.showMessage(`${player === 'human' ? 'Du' : 'KI'} konnte keine Karte ablegen.`);
    return false;
  }

  drawCardsUntilFive(player) {
    while (this.state.Game.players[player].hand.length < 5 && this.state.Game.drawPile.length > 0) {
      const card  = this.state.Game.drawPile.pop();
      card.faceUp = player === 'human';
      this.state.Game.players[player].hand.push(card);
    }
    this.updateView();
  }
  neededForStock(jokerValue) {
    return this.state.Game.players.ai.stock.some(
      card => card.type === 'number' && card.value === jokerValue
    );
  }
  getOpponentCriticalNumbers() {
    const criticalNumbers = [];
    const humanStock      = this.state.Game.players.human.stock;
    if (humanStock.length > 0) {
      const topStockCard = humanStock[humanStock.length - 1];
      criticalNumbers.push(parseInt(topStockCard.value) + 1);
    }
    this.state.Game.players.human.discards.forEach(pile => {
      if (pile.length > 0) {
        const topDiscard = pile[pile.length - 1];
        criticalNumbers.push(parseInt(topDiscard.value) + 1);
      }
    });
    return [...new Set(criticalNumbers)];
  }

  async evaluateAndSelectMove(player) {
    const candidates = this.evaluateMoveCandidates(player);
    if (candidates.length === 0) return false;
    candidates.sort((a, b) => b.score - a.score);
    const bestCandidate = candidates[0];
    this.showMessage(
      `KI wählt Zug: Karte (${bestCandidate.card.value}) von ${bestCandidate.sourceType} ` +
      `für 🗑️Baustapel ${bestCandidate.buildPileIndex + 1} mit Score ${bestCandidate.score}.`
    );
    if (this.config.nagel_deburg.nagel_43) {
      this.state.debugInfo.push(
        `📌43 🎲🎲 KI wählt Zug: Karte (${bestCandidate.card.value}) von ${bestCandidate.sourceType} ` +
        `für 🗑️Baustapel ${bestCandidate.buildPileIndex + 1} mit Score ${bestCandidate.score}. 🎲🎲`
      );
    }
    await this.pauseForSeconds();
    this.handleBuildPileDrop(player, bestCandidate.sourceType, bestCandidate.sourceIndex, bestCandidate.buildPileIndex);
    this.updateView();
    return true;
  }

  canRemoveStockCard() {
    try {
      if (!this.state.Game?.players?.ai) return false;
      const stock = this.state.Game.players.ai.stock;
      if (!Array.isArray(stock) || stock.length === 0) return false;
      const topCard = stock[stock.length - 1];
      if (!topCard || !('value' in topCard)) return false;
      if (typeof topCard.removable === 'boolean' && !topCard.removable) return false;
      if (topCard.type === 'number') {
        const value = parseInt(topCard.value, 10);
        if (isNaN(value) || value < 1 || value > 12) return false;
      }
      if (typeof this.state.Game.stockCardIsRemovable === 'boolean' && this.state.Game.stockCardIsRemovable !== true) return false;
      return true;
    } catch (err) {
      return false;
    }
  }

  // =============================================================
  // KI-STRATEGIE & BEWERTUNG
  // =============================================================
  evaluateMoveCandidates(player) {
    const humanStockPressure = this.state.Game.players.human.stock.length / 30;
    const remainingJokers    = this.state.Game.tracking.deckComposition.joker || 0;
    const nagel40 = 0.20, nagel41 = 1000, nagel42 = 0.8;
    if (this.config.nagel_deburg.nagel_40) this.state.debugInfo.push(`📌40 ★Joker-Schwellenwert ges.=🎉 ${nagel40}`);
    if (this.config.nagel_deburg.nagel_41) this.state.debugInfo.push(`📌41 1500 Mindestbewertung bei nur ★Joker-Zügen ges.=🎉 ${nagel41}`);
    if (this.config.nagel_deburg.nagel_42) this.state.debugInfo.push(`📌42 0.8 ★Joker-Gewichtung⚖️ ges.=🎉 ${nagel42}`);
    const blockedStock = Math.max(0, 16 - this.state.Game.players.human.stock.length);
    const Nagel44      = 500 * Math.sqrt(blockedStock);
    if (this.config.nagel_deburg.nagel_44) {
      this.state.debugInfo.push(`📌44 Erhöht den Malus⬆️500* flex wenn der Gegner wenig Karten♠️hat`);
      this.state.debugInfo.push(`📌44  Malus44 =🎉 ${Nagel44} 🎉`);
    }

    const candidates = [];
    const stockSize  = this.state.Game.players[player].stock.length;
    const stockTop   = this.state.Game.players[player].stock.slice(-1)[0]?.value;

    // --- Handkarten bewerten ---
    this.state.Game.players[player].hand.forEach((card, i) => {
      this.state.Game.buildPiles.forEach((pile, pileIndex) => {
        if (!this.isValidBuildMove(card, pileIndex)) return;
        let score = 600;
        if (this.config.nagel_deburg.nagel_5) {
          this.state.debugInfo.push(`📌5  Grundbonus gesetzt⬆️Grundbonus =🎉 ${score} 🎉`);
        }
        const gapSize   = this.calculateGapSize(pile, card) || 0;
        const futureRisk = this.calculateFutureRisk(card, pileIndex) || 0;
        let riskScore    = this.getOpponentBlockingPotential(card, pileIndex);
        if (this.config.nagel_deburg.nagel_50) {
          this.state.debugInfo.push(`📌50 RiskScore-ges.🔥: ${riskScore} von Karte ${card.value} 🟠🟢`);
          this.state.debugInfo.push(`📌50 Score-ges.🔥: ${score} von Karte ${card.value} 🟠🟢`);
          this.state.debugInfo.push(`📌50 🟢🟠Joker gelegt.🔥: ${this.state.Joker_auf_Ablage} 🟠🟢`);
        }
        if (card.value === '★') {
          if (this.config.nagel_deburg.nagel_50) this.state.debugInfo.push(`📌50a ★★Joker★★ Es wurde eine Karte ${card.value} erkannt.`);
          riskScore += 50 * 50;
        } else {
          if (this.config.nagel_deburg.nagel_50) this.state.debugInfo.push(`📌50a Kein Joker erkannt. Normale Punkteberechnung.`);
        }
        score += gapSize * 150;
        if (this.config.nagel_deburg.nagel_12) {
          this.state.debugInfo.push(`📌12 Score ⬆️+=GapSize*150 ⬆️Bonus pro 🗑️Lücke`);
          this.state.debugInfo.push(
            `📌12 🎉 Score-ges.=🎉 ${score} GapSize=🎉 ${gapSize} 🎉 ` +
            `futureRisk=🎉 ${futureRisk} 🎉 riskScore=🎉 ${riskScore} 🎉`
          );
        }
        score -= futureRisk;
        score -= riskScore;
        if (this.config.nagel_deburg.nagel_12) this.state.debugInfo.push(`📌12a 🎉 neuer Score-ges.=🎉 ${score}`);

        if (card.type === 'joker') {
          const jokerValue  = pile.length === 0 ? 1 : pile[pile.length - 1].value + 1;
          const matchesStock = stockTop && (jokerValue === stockTop || stockTop === undefined);
          if (pile.length < 5 && stockSize > 12 && !matchesStock) {
            try {
              if (this.canRemoveStockCard()) {
                riskScore -= 5000;
                if (this.config.nagel_deburg.nagel_39) {
                  this.state.debugInfo.push(
                    `📌39 riskScore🔥⚠️ ⬇️-= 5000; Stockabbau Vorrang RiskScore-ges. = ${riskScore} ⚠️🟢`
                  );
                }
              } else {
                const dynamicMalus = 800 * (1 - (this.state.Game.players.ai.stock.length / 20));
                score -= dynamicMalus;
                if (this.config.nagel_deburg.nagel_6) {
                  this.state.debugInfo.push(`📌6  score ⬇️-= 800 Malus sinkt linear mit Stockabbau Score-ges =🎉 ${score}`);
                }
              }
            } catch (error) {
              console.error('Fehler in canRemoveStockCard (nagel39):', error);
              const dynamicMalus = 800 * (1 - (this.state.Game.players.ai.stock.length / 20));
              score -= dynamicMalus;
            }
          }
          if (matchesStock && (pile.length >= 5 || stockSize <= 10)) {
            const topHumanStock = this.state.Game.players.human.stock[this.state.Game.players.human.stock.length - 1]?.value || 1;
            score += (15000 + (2000 * (12 - topHumanStock)));
            if (this.config.nagel_deburg.nagel_7) this.state.debugInfo.push(`📌7 ⬆️+= 15000 ✅ Score-ges. =🎉 ${score} 🎉`);
          }
          const futureValue = this.calculateJokerFutureValue(card, pileIndex) || 0;
          if (futureValue > 0) {
            score += futureValue * 60;
            if (this.config.nagel_deburg.nagel_8) {
              this.state.debugInfo.push(`📌8 future=🎉 ${futureValue} * 60⬆️ Score-ges.=🎉 ${score}`);
            }
          }
        }
        candidates.push({ sourceType: 'hand', sourceIndex: i, card, buildPileIndex: pileIndex, score });
      });
    });

    // Duplikate entfernen
    const uniqueHandCandidates = [];
    const seenHandCandidates   = {};
    for (const candidate of candidates) {
      if (candidate.sourceType === 'hand') {
        const key = candidate.sourceIndex;
        if (!seenHandCandidates.hasOwnProperty(key) || seenHandCandidates[key].score < candidate.score) {
          seenHandCandidates[key] = candidate;
        }
      } else {
        uniqueHandCandidates.push(candidate);
      }
    }
    for (const key in seenHandCandidates) uniqueHandCandidates.push(seenHandCandidates[key]);
    const dedupedCandidates = uniqueHandCandidates;

    // --- Stockkarte bewerten ---
    const stockCard = this.state.Game.players[player].stock.slice(-1)[0];
    if (stockCard) {
      this.state.Game.buildPiles.forEach((pile, pileIndex) => {
        if (this.isValidBuildMove(stockCard, pileIndex)) {
          const advancedPiles = this.state.Game.buildPiles.filter(p => p.length > 6).length;
          let score           = Math.min(8000, 5000 + (3000 * advancedPiles));
          if (this.config.nagel_deburg.nagel_10) {
            this.state.debugInfo.push(`📌10 📌11 Stockabbau beschleunigen Score-ges.=🎉 ${score} 🎉`);
          }
          dedupedCandidates.push({
            sourceType:    'stock',
            sourceIndex:   0,
            card:          stockCard,
            buildPileIndex: pileIndex,
            score
          });
        }
      });
    }

    // --- Ablagestapelkarten bewerten ---
    this.state.Game.players[player].discards.forEach((pile, discardIndex) => {
      if (pile.length === 0) return;
      const card = pile[pile.length - 1];
      this.state.Game.buildPiles.forEach((buildPile, buildIndex) => {
        if (!this.isValidBuildMove(card, buildIndex)) return;
        let score       = 300;
        if (this.config.nagel_deburg.nagel_26) {
          this.state.debugInfo.push(`📌26 ⬆️= 300 Basispunkte für 🗄️Ablagestapelzug Score-ges.=🎉 ${score}`);
        }
        const Wertgroese = card.value;
        try {
          if (!isNaN(Wertgroese) && isFinite(Wertgroese)) {
            score += Wertgroese * 50;
          } else {
            score += 13 * 50;
            if (this.config.nagel_deburg.nagel_27) this.state.debugInfo.push(`📌27 Warnung: Joker oder ungültiger Wert. Jokerwert 13*50 angewandt.`);
          }
          if (Wertgroese === '★' && this.config.nagel_deburg.nagel_27) {
            this.state.debugInfo.push(`📌27★ Wegen ★ wurde der Jokerwert angewandt: score += 13 * 50`);
          }
        } catch (error) {
          score += 13 * 50;
        }
        if (this.state.Game.players[player].stock.some(s => s.value === card.value + 1)) {
          score += 600;
          if (this.config.nagel_deburg.nagel_23) {
            this.state.debugInfo.push(`📌23 ⬆️+= 600; Discard-Stock-Synergy-Bonus🎉 Score-ges.=🎉 ${score}`);
          }
        }
        dedupedCandidates.push({
          sourceType:     'discard',
          sourceIndex:    discardIndex,
          card,
          buildPileIndex: buildIndex,
          score
        });
      });
    });

    // --- Joker-Filter & dynamische Prioritäten ---
    const averageScore      = dedupedCandidates.reduce((sum, m) => sum + m.score, 0) / (dedupedCandidates.length || 1);
    const dynamicThreshold  = averageScore * nagel40;
    dedupedCandidates.forEach(move => { if (move.card.type === 'joker') move.score *= nagel42; });

    const hasValidNonJokerMove = dedupedCandidates.some(move => move.card.type !== 'joker' && move.score > 0);
    const filteredCandidates   = hasValidNonJokerMove
      ? dedupedCandidates.filter(move => {
          if (move.card.type === 'joker' && move.score < dynamicThreshold) {
            if (this.config.nagel_deburg.nagel_45) {
              this.state.debugInfo.push(`❌ ★Joker-Zug wird ignoriert – Wertung zu niedrig: ${move.score} Schwelle: ${dynamicThreshold}`);
            }
            return false;
          }
          return true;
        })
      : dedupedCandidates;

    if (!hasValidNonJokerMove && filteredCandidates.length > 0) {
      const onlyJoker    = filteredCandidates.every(move => move.card.type === 'joker');
      const bestJokerScore = Math.max(...filteredCandidates.map(move => move.score));
      if (onlyJoker && bestJokerScore < nagel41) {
        if (this.config.nagel_deburg.nagel_45) {
          this.state.debugInfo.push(
            `⏭ KI beendet ihren Zug – Kein sinnvoller ★Joker-Zug gefunden ` +
            `(beste Bewertung: ${bestJokerScore} Schwelle: ${dynamicThreshold})`
          );
        }
        this.state.Joker_auf_Ablage = true;
        if (this.config.nagel_deburg.nagel_51) this.state.debugInfo.push(`📌51 ★Joker in Ablage🗑️ gelegt`);
        return [];
      }
    }

    const enemyAnalysis = this.predictEnemyStock('human');
    const priorities    = this.calculateDynamicPriorities();
    filteredCandidates.forEach(move => {
      if (move.card.value === enemyAnalysis.nextExpected) {
        const nagel34 = this.state.Game.players.human.stock.length < 10 ? 3000 : 1500;
        move.score   += nagel34 * priorities.stockAttack;
        if (this.config.nagel_deburg.nagel_34) this.state.debugInfo.push(' 📌34 Erhöhung⬆️ von 1200→2000 Basiswert ');
      }
      if (this.detectConsecutiveDiscards('human').includes(move.card.value)) {
        move.score += Math.round(800 * priorities.seriesDisrupt);
        if (this.config.nagel_deburg.nagel_35) this.state.debugInfo.push(`📌35 🔗Serienunterbrechung🔗 Bonus =🎉 ${move.score}`);
      }
      move.score = Math.round(move.score * priorities.riskTaking);
    });
    return filteredCandidates.sort((a, b) => b.score - a.score);
  }

  calculateJokerFutureValue(card, buildPileIndex) {
    let futureValue = 0;
    const buildPile = this.state.Game.buildPiles[buildPileIndex];
    let pileValue   = 1;
    if (buildPile.length > 0) {
      const topCard = buildPile[buildPile.length - 1];
      if (topCard) {
        pileValue = topCard.type === 'joker' ? buildPile.length : parseInt(topCard.value) + 1;
      } else {
        console.error('topCard ist undefiniert');
        pileValue = 1;
      }
    }
    if (isNaN(pileValue)) { console.error('Ungültiger pileValue:', pileValue); return 0.01; }
    const currentJokerValue = card.type === 'joker'
      ? this.getJokerValue(buildPile, buildPile.length)
      : pileValue;
    if (this.neededForStock(currentJokerValue)) {
      const progressiveBonus = 50 * (12 - currentJokerValue);
      futureValue += progressiveBonus;
      if (this.config.nagel_deburg.nagel_25) {
        this.state.debugInfo.push(`🟢("📌25") JOKER FUTURE: ${currentJokerValue} (+${progressiveBonus})`);
      }
    }
    for (let i = 1; i <= 5; i++) {
      const futureCardValue = pileValue + i;
      if (futureCardValue <= 12) futureValue++;
    }
    if (pileValue >= 8) {
      futureValue += 3;
      if (this.config.nagel_deburg.nagel_21a) {
        this.state.debugInfo.push(`📌21a langfristige Planung ⬆️+= 3 Future-ges.=🌟 ${futureValue}`);
      }
    }
    return futureValue;
  }

  async playInDiscardPiles(player) {
    if (this.state.Game.players[player].hand.length === 0) {
      this.showMessage('KI hat keine Handkarten zum Ablegen.');
      await this.pauseForSeconds(1);
      return;
    }
    const opponentCritical = [
      this.state.Game.players.human.stock.slice(-1)[0]?.value,
      ...this.state.Game.players.human.discards.map(p => p[p.length - 1]?.value)
    ].filter(v => v !== undefined);
    const stockTop     = this.state.Game.players[player].stock.length > 0
      ? this.state.Game.players[player].stock[this.state.Game.players[player].stock.length - 1].value
      : null;
    const handCards    = this.state.Game.players[player].hand;
    const discardPiles = this.state.Game.players[player].discards;
    let bestDiscardIndex = -1, bestScore = -Infinity, mainMoveSuccess = false;
    const cardToPlay     = handCards[handCards.length - 1];
    const sourceIndex    = handCards.length - 1;
    const isJoker        = String(cardToPlay.value).toUpperCase() === 'JOKER';
    const isDangerousCard = opponentCritical.includes(cardToPlay.value);

    for (let i = 0; i < discardPiles.length; i++) {
      const pile    = discardPiles[i];
      const topCard = pile.length > 0 ? pile[pile.length - 1] : null;
      let score     = 150;
      if (this.config.nagel_deburg.nagel_13) {
        this.state.debugInfo.push(`📌13 Score = 150; Fördert ⬆️🗑️Baustapel-Nutzung Score-ges.=🎉 ${score}`);
      }
      if (isDangerousCard) {
        score -= 5000;
        if (this.config.nagel_deburg.nagel_14) this.state.debugInfo.push(`📌14 score ⬇️= 5000 riskante Ablagen reduzieren Score-ges.=🎉 ${score}`);
        if (this.config.nagel_deburg.nagel_45) this.state.debugInfo.push(`DISCARD BLOCK: ${cardToPlay.value} ist gefährlich (📌14)`);
      }
      if (!topCard) {
        score += 20;
        if (this.config.nagel_deburg.nagel_16) {
          this.state.debugInfo.push(`📌16 Score ⬆️+= 20; Bonus🎉 für leere 🗄️Ablagestapel Score-ges.=🎉 ${score}`);
        }
        if (stockTop && cardToPlay.value === stockTop - 1) score += 50;
      } else if (cardToPlay.value < topCard.value) {
        score += 30;
        if (this.config.nagel_deburg.nagel_17) {
          this.state.debugInfo.push(`📌17 score ⬆️+= 30; Bonus🎉 für niedrigere Karten Score-ges.=🎉 ${score}`);
        }
        if (stockTop && cardToPlay.value === stockTop - 1) score += 50;
      }
      if (topCard && (cardToPlay.value === topCard.value - 1)) {
        score += 120;
        if (this.config.nagel_deburg.nagel_15) {
          this.state.debugInfo.push(
            `DISCARD SEQ: ${cardToPlay.value}→${topCard.value} (+120 um⬆️+20 ("📌15") Score-ges.=🎉 ${score}`
          );
        }
      }
      if (stockTop && cardToPlay.value === stockTop + 1) score += 300;
      score -= pile.length * 2;
      if (this.config.nagel_deburg.nagel_19) {
        this.state.debugInfo.push(`📌19 ⬇️-= * 2; Malus pro 🗄️Ablagekarte macht große Stapel unattraktiv Score-ges.=🎉 ${score}`);
      }
      const pileHelpsOpponent = pile.some(c => opponentCritical.includes(c.value));
      if (pileHelpsOpponent) {
        const criticalStockPenalty = this.state.Game.players.human.stock.length <= 5 ? 3000 : 0;
        score -= 15000 + criticalStockPenalty;
        if (this.state.Game.players.human.stock.length < 5) score -= 15000;
        if (this.config.nagel_deburg.nagel_20) {
          this.state.debugInfo.push(`📌20 GEGNERHILFE: Stapel ⬇️🗑️ ${i + 1} (-15000 ⛔ Score-ges.=🎉 ${score}`);
        }
      }
      if (score > bestScore) { bestScore = score; bestDiscardIndex = i; }
    }

    if (bestDiscardIndex >= 0 && this.handleDiscardPileDrop(player, 'hand', sourceIndex, bestDiscardIndex)) {
      mainMoveSuccess = true;
      this.showMessage(`KI legt ${cardToPlay.value} in Ablage ${bestDiscardIndex + 1}`);
      if (this.config.nagel_deburg.nagel_43) {
        this.state.debugInfo.push(`📌43 🎲🎲 KI legt ${cardToPlay.value} in Ablage ${bestDiscardIndex + 1} 🎲🎲`);
      }
      await this.pauseForSeconds(1);
      this.updateView();
      this.trackGameObservations('discardStrategy', {
        cardValue:       cardToPlay.value,
        wasDangerous:    isDangerousCard,
        stockFollowup:   (stockTop && cardToPlay.value === stockTop + 1),
        createdSequence: discardPiles[bestDiscardIndex]?.slice(-1)[0]?.value
      });
      if (this.checkForWinner()) return;
    } else {
      this.showMessage('Ablage fehlgeschlagen!');
      await this.pauseForSeconds(1);
    }

    if (mainMoveSuccess) {
      const jokerIndex = this.state.Game.players[player].hand.findIndex(
        card => String(card.value).toUpperCase() === 'JOKER'
      );
      if (jokerIndex !== -1) {
        if (this.handleDiscardPileDrop(player, 'hand', jokerIndex, 3)) {
          this.showMessage(`KI legt zusätzlichen ★Joker in Ablage 4`);
          await this.pauseForSeconds(1);
          this.updateView();
          this.trackGameObservations('jokerAdditional', { cardValue: 'JOKER' });
          if (this.checkForWinner()) return;
        } else {
          this.showMessage('Ablage des zusätzlichen Jokers fehlgeschlagen!');
          await this.pauseForSeconds(1);
        }
      }
    }
  }

  async aiTurn() {
    this.drawCardsUntilFive('ai');
    this.showMessage('KI bereitet Zug vor...');
    if (this.config.nagel_deburg.nagel_43) this.state.debugInfo.push(`📌43 🎲🎲 KI bereitet Zug vor... 🎲🎲`);
    await this.pauseForSeconds(0.8);
    let moved = false, moveCount = 0, kein_zug_mehr = 0;
    this.showMessage('KI berechnet Zug...');
    await this.pauseForSeconds(0.5);

    const enemyAnalysis = this.predictEnemyStock('human');
    const priorities    = this.calculateDynamicPriorities();
    this.state.Game.buildPiles.forEach((pile, i) => {
      const element = document.querySelector(`.build-pile:nth-child(${i + 1})`);
      if (pile.slice(-1)[0]?.value === enemyAnalysis.nextExpected) {
        element.classList.add('ai-prediction-overlay');
        const tag           = document.createElement('div');
        tag.className       = 'strategy-tag';
        tag.textContent     = `⛔ Blockade ${enemyAnalysis.nextExpected} (${Math.round(enemyAnalysis.confidence * 100)}%)`;
        element.appendChild(tag);
      }
    });

    try {
      if (enemyAnalysis.confidence > 0.6) {
        moved = await this.executeStockAttack(enemyAnalysis.nextExpected);
      }
    } catch (e) {
      console.error('Stock Attack Failed:', e);
    }

    do {
      this.showMessage('KI analysiert mögliche Züge...');
      await this.pauseForSeconds(0.5);
      const candidates = this.evaluateMoveCandidates('ai');
      if (candidates.length === 0) {
        const stockCard     = this.state.Game.players.ai.stock.slice(-1)[0];
        let stockPlayable   = false;
        if (stockCard) {
          for (let j = 0; j < this.state.Game.buildPiles.length; j++) {
            if (!this.isValidBuildMove(stockCard, j)) continue;
            stockPlayable = true;
            this.showMessage(`KI legt Stockkarte (${stockCard.value}) auf Bau🗑️ ${j + 1}`);
            if (this.config.nagel_deburg.nagel_43) {
              this.state.debugInfo.push(`📌43 🎲🎲 KI legt Stockkarte (${stockCard.value}) auf Bau🗑️ ${j + 1} 🎲🎲`);
            }
            if (this.config.nagel_deburg.nagel_24) {
              this.state.debugInfo.push(' 📌24 score: 8000 Stock-min');
              this.state.debugInfo.push(`📌24-1 score ⬆️+= 8000 Stockabbau Score-ges.=🎉 ${score}`);
            }
            await this.pauseForSeconds(1.2);
            if (this.handleBuildPileDrop('ai', 'stock', 0, j)) {
              moved = true;
              moveCount++;
              this.trackGameObservations('kiMove', {
                sourceType:     'stock',
                cardValue:      stockCard.value,
                cardType:       stockCard.type,
                buildPileIndex: j,
                score:          8000
              });
              if (moveCount >= 2) {
                this.showMessage('KI führt Kombinationszug aus...');
                if (this.config.nagel_deburg.nagel_43) this.state.debugInfo.push(`📌43 🎲🎲 KI führt Kombinationszug aus... 🎲🎲`);
                await this.pauseForSeconds(0.8);
              }
            }
            break;
          }
        }
        if (!stockPlayable) {
          kein_zug_mehr = 1;
          if (stockCard && this.state.Game.buildPiles.some(pile => this.isValidBuildMove(stockCard, this.state.Game.buildPiles.indexOf(pile)))) {
            this.trackGameObservations('missedStock', { stockCardValue: stockCard.value });
          }
        }
        break;
      }
      candidates.sort((a, b) => b.score - a.score);
      const best      = candidates[0];
      const stockCard = this.state.Game.players.ai.stock.length > 0
        ? this.state.Game.players.ai.stock[this.state.Game.players.ai.stock.length - 1]
        : null;

      if (
        best.sourceType !== 'stock' &&
        stockCard &&
        stockCard.type !== 'joker' &&
        stockCard.value === best.card.value
      ) {
        if (this.config.nagel_deburg.nagel_31) {
          this.state.debugInfo.push(
            `📌31 KI priorisiert 🟢🟢🟢Stockkarte, da sie identisch ist mit der gewählten Karte aus ${best.sourceType}`
          );
        }
        if (this.handleBuildPileDrop('ai', 'stock', 0, best.buildPileIndex)) {
          if (this.config.nagel_deburg.nagel_32) {
            this.state.debugInfo.push(`📌32-1 score ⬆️+= 5000🟢🟢🟢 Stockabbau Score-ges.=🎉 ${score}`);
          }
          moved = true;
          moveCount++;
          this.trackGameObservations('kiMove', {
            sourceType:     'stock',
            cardValue:      stockCard.value,
            cardType:       stockCard.type,
            buildPileIndex: best.buildPileIndex,
            score:          5000
          });
          this.showMessage(`KI legt Stockkarte (${stockCard.value}) auf Bau🗑️ ${best.buildPileIndex + 1}`);
          if (this.config.nagel_deburg.nagel_43) {
            this.state.debugInfo.push(
              `📌43 🎲🎲 KI legt Stockkarte (${stockCard.value}) auf Bau🗑️ ${best.buildPileIndex + 1} 🎲🎲`
            );
          }
          if (this.config.nagel_deburg.nagel_32) {
            this.state.debugInfo.push(`📌32-2 score ⬆️+= 5000🟢🟢🟢 Stockabbau Score-ges.=🎉 ${score}`);
          }
          await this.pauseForSeconds(1.2);
        }
        this.aiTurn();
        return;
      }

      let sourceText = '';
      switch (best.sourceType) {
        case 'hand':    sourceText = `Handposition ${best.sourceIndex + 1}`; break;
        case 'stock':   sourceText = 'Stock-Stapel';                          break;
        case 'discard': sourceText = `Ablagestapel ${best.sourceIndex + 1}`; break;
      }
      this.showMessage(
        `KI spielt ${best.card.type === 'joker' ? '★Joker' : best.card.value} von ${sourceText} ` +
        `auf Bau🗑️ ${best.buildPileIndex + 1} (Strategie-Score: ${best.score})`
      );
      if (this.config.nagel_deburg.nagel_43) {
        this.state.debugInfo.push(
          `📌43 🎲🎲 KI spielt ${best.card.type === 'joker' ? '★Joker' : best.card.value} von ${sourceText} ` +
          `auf Bau🗑️ ${best.buildPileIndex + 1} (Strategie-Score: ${best.score}) 🎲🎲`
        );
      }
      await this.pauseForSeconds(1.2);
      if (this.handleBuildPileDrop('ai', best.sourceType, best.sourceIndex, best.buildPileIndex)) {
        moved = true;
        moveCount++;
        this.trackGameObservations('kiMove', {
          sourceType:     best.sourceType,
          cardValue:      best.card.value,
          cardType:       best.card.type,
          buildPileIndex: best.buildPileIndex,
          score:          best.score
        });
        if (moveCount >= 2) {
          this.showMessage('KI führt Kombinationszug aus...');
          if (this.config.nagel_deburg.nagel_43) this.state.debugInfo.push(`📌43 🎲🎲 KI führt Kombinationszug aus... 🎲🎲`);
          await this.pauseForSeconds(0.8);
        }
      } else {
        kein_zug_mehr = 1;
        break;
      }
    } while (!kein_zug_mehr);

    if (this.state.Game.players.ai.hand.length > 0) {
      this.showMessage('KI legt eine Karte auf den Ablagestapel...');
      if (this.config.nagel_deburg.nagel_43) this.state.debugInfo.push(`📌43 🎲🎲 KI legt eine Karte auf den Ablagestapel.. 🎲🎲`);
      await this.pauseForSeconds(1);
      await this.playInDiscardPiles('ai');
    } else {
      this.showMessage('KI hat keine Handkarten zum Ablegen!');
    }
    if (this.state.Game.players.ai.hand.length < 5) {
      this.showMessage('KI zieht nach...');
      if (this.config.nagel_deburg.nagel_43) this.state.debugInfo.push(`📌43 🎲🎲 Hand auffüllen KI zieht nach... 🎲🎲`);
      await this.pauseForSeconds(0.5);
      this.drawCardsUntilFive('ai');
    }
    this.showMessage('KI beendet ihren Zug...');
    await this.pauseForSeconds(0.5);
    this.switchPlayer();
    document.querySelectorAll('.ai-prediction-overlay, .strategy-tag').forEach(el => el.remove());
    this.updateView();
  }

  async executeStockAttack(targetValue) {
    try {
      const validPiles = this.state.Game.buildPiles
        .map((pile, i) => ({ index: i, current: pile.slice(-1)[0]?.value || 0 }))
        .filter(pile => targetValue === 1 ? pile.current === 0 : pile.current === targetValue - 1);
      if (validPiles.length === 0) return false;
      const bestPile = validPiles.reduce((a, b) => a.current < b.current ? a : b);
      const validCards = [
        ...this.state.Game.players.ai.hand.map((c, i) => ({ card: c, type: 'hand', index: i })),
        { card: this.state.Game.players.ai.stock.slice(-1)[0], type: 'stock', index: 0 }
      ].filter(({ card }) => card && (card.value === targetValue || card.type === 'joker'));
      if (validCards.length === 0) return false;
      const bestCard = validCards.reduce((a, b) =>
        (a.card.type === 'joker' ? 1 : 0) - (b.card.type === 'joker' ? 1 : 0) ||
        b.card.value - a.card.value
      );
      // FIX: Nur ein einziger Aufruf
      const result = this.handleBuildPileDrop('ai', bestCard.type, bestCard.index, bestPile.index);
      this.state.debugInfo.push(`☢️💣 executeStockAttack Ergebnis: ${JSON.stringify(result)}`);
      return result === true;
    } catch (e) {
      console.error('Stock Attack Error:', e);
      return false;
    }
  }

  async switchPlayer() {
    if (this.checkForWinner()) return;
    if (this.state.currentPlayer === 'human') {
      this.state.currentPlayer = 'ai';
      this.showMessage('KI ist am Zug...');
      if (this.config.nagel_deburg.nagel_43) this.state.debugInfo.push(`📌43 🎲🎲 KI ist am Zug... 🎲🎲`);
      await this.pauseForSeconds(1.2);
      this.aiTurn();
    } else {
      this.state.currentPlayer = 'human';
      this.showMessage('Dein Zug!');
      if (this.config.nagel_deburg.nagel_43) this.state.debugInfo.push(`📌43 🎲🎲 Dein Zug! 🎲🎲`);
      await this.pauseForSeconds(0.5);
      this.drawCardsUntilFive('human');
      // Event-Binding ist global (Delegation), kein erneutes setupTouchEvents nötig
      this.showMessage('Wähle eine Karte aus...');
      await this.pauseForSeconds(1.5);
    }
  }

  calculateGapSize(pile, card) {
    if (!card || !card.value) return 0.01;
    const cardValue = parseInt(card.value, 10);
    if (!pile || pile.length === 0) return cardValue;
    const lastCard  = pile[pile.length - 1];
    const lastValue = parseInt(lastCard.value, 10);
    const gap       = cardValue - lastValue;
    return gap > 0 ? gap : 0;
  }
  getDiscardSequenceBonus(player, discardIndex, newCard) {
    const pile = this.state.Game.players[player].discards[discardIndex];
    if (pile.length === 0) return 0.01;
    const topValue = pile[pile.length - 1].value;
    return (newCard.value === topValue - 1) ? 100 : 0;
  }
  getOpponentBlockingPotential(card, buildPileIndex) {
    const opponentVisible  = [
      ...this.state.Game.players.human.stock.slice(-1),
      ...this.state.Game.players.human.discards.flat()
    ];
    let riskScore          = 0;
    const opponentStockSize = this.state.Game.players.human.stock.length;
    opponentVisible.forEach(oppCard => {
      if (oppCard.value === card.value + 1) {
        const stockFactor      = 1 - (this.state.Game.players.ai.stock.length / 20);
        const humanStockImpact = 1 + (15 - this.state.Game.players.human.stock.length) / 15;
        riskScore += 6000 * stockFactor * humanStockImpact;
        if (this.config.nagel_deburg.nagel_1) {
          this.state.debugInfo.push(`📌1 riskScore⚠️ ⬆️+= 6000 RiskScore-ges. = ${riskScore} 🟢`);
        }
        if (this.state.Game.players.ai.stock.length <= 5) {
          riskScore -= 300 * (6 - this.state.Game.players.ai.stock.length);
        }
        if (this.config.nagel_deburg.nagel_2) {
          this.state.debugInfo.push(`📌2  riskScore⚠️ ⬇️-= 300 RiskScore-ges. = ${riskScore} 🟢`);
        }
      }
      if (oppCard.value === card.value - 1) {
        riskScore += 600;
        if (this.config.nagel_deburg.nagel_28) {
          this.state.debugInfo.push(`📌28 riskScore⚠️ ⬆️+= 600; Sequenzkontrolle RiskScore-ges. = ${riskScore} 🟢`);
        }
        if (opponentStockSize <= 3) riskScore += 3000;
        if (this.config.nagel_deburg.nagel_29) {
          this.state.debugInfo.push(`📌29 riskScore⚠️ ⬆️+= 3000; Kritischer Malus RiskScore-ges. = ${riskScore} 🟢`);
        }
      }
      if (oppCard.type === 'joker' && card.value >= 5) {
        riskScore += 60;
        if (this.config.nagel_deburg.nagel_4) {
          this.state.debugInfo.push(`📌4  riskScore⚠️ ⬆️+= 60; ★Joker-Risk-Malus RiskScore-ges. = ${riskScore} 🟢`);
        }
        if (opponentStockSize <= 3) riskScore += 80;
        if (this.config.nagel_deburg.nagel_30) {
          this.state.debugInfo.push(`📌30 riskScore⚠️ ⬆️+= 80; Risky-Stock-★Joker-Schwelle RiskScore-ges. = ${riskScore} 🟢`);
        }
      }
    });

    opponentVisible.forEach((cardA, i) => {
      opponentVisible.slice(i + 1).forEach(cardB => {
        if (Math.abs(cardA.value - cardB.value) === 2) {
          if (card.value === (cardA.value + cardB.value) / 2) {
            riskScore += 800;
            if (this.config.nagel_deburg.nagel_3) {
              this.state.debugInfo.push(`📌3  riskScore⚠️ ⬆️+= 800 RiskScore-ges. = ${riskScore} 🟢`);
            }
          }
        }
      });
    });

    if (this.state.Joker_auf_Ablage === true) {
      this.delayWithCallback(10, () => {
        try {
          riskScore -= 15000;
          if (this.config.nagel_deburg?.nagel_49) {
            this.state.debugInfo.push('📌49 🔥⚠️In Ablage-Karte liegt ein Joker🔥🔥🔥');
            this.state.debugInfo.push(
              `📌49 riskScore🔥⚠️ ⬇️-= 15000; Stockabbau Vorrang RiskScore-ges. = ${riskScore} ⚠️🟢`
            );
          } else {
            this.state.debugInfo.push('📌49 Fehler! nagel_deburg.nagel_49 fehtin Ablage auf false gesetzt.');
          }
          this.state.Joker_auf_Ablage = false;
        } catch (error) {
          console.error('Ein Fehler ist bei getOpponentBlockingPotential aufgetreten:', error);
          this.state.debugInfo.push(`📌49 Fehler in getOpponentBlockingPotential: ${error.message}`);
          this.state.Joker_auf_Ablage = false;
        }
      });
    }
    if (this.config.nagel_deburg.nagel_50) {
      this.state.debugInfo.push(
        `📌50 Rücksprung aus Funktion RiskScore-ges.🔥: ${riskScore} von Karte ${card.value} 🟠🟢`
      );
    }
    return riskScore;
  }
  calculateFutureRisk(card, pileIndex) {
    if (!card || !card.value) return 0.01;
    const cardValue  = parseInt(card.value, 10);
    const basisFaktor = 5;
    const indexFaktor = (pileIndex !== undefined) ? pileIndex : 0;
    return (12 - cardValue) * (basisFaktor + indexFaktor);
  }

  enableDraggableStatusLabel() {
    const label = document.getElementById('status-label');
    label.style.fontSize   = '1.5rem';
    label.style.color      = 'black';
    label.style.textShadow =
      '-1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff';
    let isDragging = false, startY = 0, startTop = 0;
    function disableTransition() { label.style.transition = 'none'; }
    function enableTransition()  {
      label.style.transition = 'top 0.3s ease-out, transform 0.3s ease-out';
    }
    function bounceEffect() {
      label.style.transform = 'scale(1.15)';
      setTimeout(() => { label.style.transform = 'scale(1)'; }, 300);
    }
    label.addEventListener('mousedown', function (e) {
      isDragging = true;
      startY     = e.clientY;
      startTop   = parseInt(window.getComputedStyle(label).top) || 0;
      disableTransition();
      e.preventDefault();
    });
    document.addEventListener('mousemove', function (e) {
      if (!isDragging) return;
      label.style.top = (startTop + (e.clientY - startY)) + 'px';
    });
    document.addEventListener('mouseup', function () {
      if (isDragging) { enableTransition(); bounceEffect(); }
      isDragging = false;
    });
    label.addEventListener('touchstart', function (e) {
      isDragging = true;
      startY     = e.touches[0].clientY;
      startTop   = parseInt(window.getComputedStyle(label).top) || 0;
      disableTransition();
      e.preventDefault();
    });
    document.addEventListener('touchmove', function (e) {
      if (!isDragging) return;
      label.style.top = (startTop + (e.touches[0].clientY - startY)) + 'px';
    });
    document.addEventListener('touchend', function () {
      if (isDragging) { enableTransition(); bounceEffect(); }
      isDragging = false;
    });
  }

    const statusLabel    = document.getElementById('status-label');

  isValidBuildMove(card, buildPileIndex) {
    const buildPile = this.state.Game.buildPiles[buildPileIndex];
    if (buildPile.length === 0) return card.type === 'joker' || parseInt(card.value) === 1;
    const topCard   = buildPile[buildPile.length - 1];
    const topValue  = topCard.type === 'joker' ? buildPile.length : parseInt(topCard.value);
    const cardValue = parseInt(card.value);
    return card.type === 'joker' || cardValue === (topValue + 1);
  }

  isBuildPileComplete(buildPileIndex) {
    const buildPile = this.state.Game.buildPiles[buildPileIndex];
    if (buildPile.length === 0) return false;
    const topCard   = buildPile[buildPile.length - 1];
    return topCard.value === 12 || (topCard.type === 'joker' && buildPile.length === 12);
  }

  clearBuildPile(buildPileIndex) {
    if (this.isBuildPileComplete(buildPileIndex)) {
      const clearedCards = this.state.Game.buildPiles[buildPileIndex];
      this.state.Game.buildPiles[buildPileIndex] = [];
      this.state.Game.drawPile = this.state.Game.drawPile.concat(clearedCards);
      this.shuffleDrawPile();
    }
  }

  shuffleDrawPile() {
    for (let i = this.state.Game.drawPile.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [this.state.Game.drawPile[i], this.state.Game.drawPile[j]] = [this.state.Game.drawPile[j], this.state.Game.drawPile[i]];
    }
  }

<!DOCTYPE html>
<!--
  Dieter Tepe — Tool-Werkstatt: Start-/Übersichtsseite
  Version: 1.6.0
  Stand: 2026-06-27
  Changelog:
    1.6.0 – Mehrsprachigkeit (Deutsch · Englisch · Portugiesisch · Ukrainisch):
            • Vier Sprach-Schalter oben rechts (DE/EN/PT/UK) im Kippschalter-
              Stil; die Wahl wird lokal gespeichert (localStorage) und das
              <html lang>-Attribut mitgesetzt.
            • ALLE Oberflächen-Texte sind übersetzt: Titelzeilen, Untertitel,
              Familien-Beschriftungen, Buttons (Favorit/Jetzt starten/Direkt
              starten/Details), Overlay-Überschriften, Footer, Readout
              (inkl. lokalem Datums-/Zeitformat) und Tooltips.
            • ALLE Tool-Beschreibungen (Titel, Teaser, „Was es kann",
              „Was es auszeichnet" und die Anleitungs-Schritte des
              Heizungs-Checks) liegen in allen vier Sprachen vor.
            • Datenstruktur erweiterbar: pro Tool ein i18n-Block
              {de,en,pt,uk}; sprachunabhängige Felder (id, family, icon,
              link, version) bleiben außerhalb. Neue Sprache = ein Key mehr.
            • Sprachwechsel baut die Kacheln NICHT neu, sondern aktualisiert
              nur die Texte (Referenzen aus dem einmaligen Aufbau).
    1.5.0 – Zwei Handy-Verbesserungen: theme-color färbt die Statusleiste;
            Kacheln blenden am Handy zusätzlich sanft einzeln auf
            (reduced-motion in der Media-Query selbst abgesichert).
    1.4.0 – Code-Überarbeitung (Struktur/Sicherheit/Erweiterbarkeit):
            Texte über textContent statt innerHTML-Konkatenation; el()-
            Element-Fabrik; Kacheln einmal bauen, Filter schaltet nur
            Sichtbarkeit; Favorit nur einmal pro Render gelesen; Boot-
            Verzögerung per JS; Daten strikt von Logik getrennt.
    1.3.0 – Optische Überarbeitung („echtes Schaltpult"): Panel-Tiefe,
            Kippschalter, Hover-Glow + Icon-Linienanimation, großes
            Favoriten-Display, Farbverläufe, Boot- + LED-Puls-Animation.
    1.2.0 – 9. Tool ergänzt: Wärmeverlust- & Gebäude-Analyse, eigene
            Familie/Farbe/Icon, optionaler Overlay-Abschnitt „So wird es
            genutzt".
    1.1.0 – Favoriten-Funktion (Stern, lokal gespeichert) + „Direkt
            starten" pro Kachel.
    1.0.0 – Erste Version. Alle 8 Programme als Kacheln, gruppiert nach
            Familie, mit Filter-Schaltern, Icon, Detail-Overlay + Link.
  Einzeldatei, vollständig selbst-enthalten (CSS + JS inline), keine
  externen Ressourcen zur Laufzeit. Läuft auf Handy, Tablet und PC.

  ── Zum Erweitern (für später) ──────────────────────────────────────
    • Neues Tool: einen Eintrag im TOOLS-Array ergänzen. Pflichtfelder
      außerhalb von i18n: id, family, icon, version, link. Im i18n-Block
      je Sprache: title, teaser, kann, auszeichnet (anleitung optional).
    • Neue Familie: Eintrag in FAMILIES (mit label je Sprache) + eine
      --akzentfarbe in :root + ein Icon in ICONS.
    • Neue Sprache: Kürzel in LANGS + Eintrag in UI, in jeder FAMILIES-
      label und in jedem TOOLS-i18n. Locale in LOCALES ergänzen.
  ─────────────────────────────────────────────────────────────────────
-->
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0e12">
<title>Dieter Tepe — Tool-Werkstatt</title>
<style>
  :root{
    --bg: #0b0e12;
    --bg-panel: #11151b;
    --bg-card: #161b22;
    --bg-card-hover: #1b212a;
    --border: #242b34;
    --border-soft: #1c222b;
    --text: #e7e5e0;
    --text-muted: #8a8f98;
    --text-faint: #5b6068;

    /* Akzentfarbe je Projektfamilie */
    --lotto: #e8a33d;
    --euro: #3fc1c9;
    --skipbo: #d6455a;
    --dreieck: #7c93a8;
    --heizung: #d9622e;

    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", "Roboto Mono", monospace;
    --sans: ui-sans-serif, "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;

    --radius: 10px;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 800px 460px at 12% -8%, color-mix(in srgb, var(--lotto) 9%, transparent), transparent 60%),
      radial-gradient(ellipse 800px 460px at 88% 0%, color-mix(in srgb, var(--euro) 9%, transparent), transparent 60%),
      radial-gradient(ellipse 700px 420px at 50% 38%, color-mix(in srgb, var(--skipbo) 5%, transparent), transparent 65%),
      radial-gradient(ellipse 800px 460px at 90% 95%, color-mix(in srgb, var(--heizung) 7%, transparent), transparent 60%),
      radial-gradient(ellipse 700px 420px at 5% 90%, color-mix(in srgb, var(--dreieck) 7%, transparent), transparent 60%);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  @keyframes powerOn{
    0%   { opacity: 0; filter: brightness(0.35); transform: translateY(6px); }
    55%  { opacity: 1; filter: brightness(1.18); }
    100% { opacity: 1; filter: brightness(1); transform: translateY(0); }
  }
  @keyframes ledPulse{
    0%, 100% { box-shadow: 0 0 6px 1px var(--c); }
    50%      { box-shadow: 0 0 13px 3px var(--c); }
  }
  @keyframes cardGlow{
    0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), inset 0 -2px 6px rgba(0,0,0,0.35), 0 0 0 1px color-mix(in srgb, var(--c) 25%, transparent); }
    50%      { box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), inset 0 -2px 6px rgba(0,0,0,0.35), 0 0 16px 1px color-mix(in srgb, var(--c) 45%, transparent); }
  }
  @keyframes cardIn{
    0%   { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  a{ color: inherit; }

  .wrap{
    max-width: 1180px;
    margin: 0 auto;
    padding: 24px 16px 56px;
  }

  /* ---------- Header / Schaltpult ---------- */

  header.panel{
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 20px;
    margin-bottom: 22px;
    animation: powerOn .6s ease-out both;
  }

  .panel-top{
    display:flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 18px;
  }
  .panel-head-left{ flex: 1; min-width: 240px; }
  .panel-head-right{
    display:flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  h1{
    font-family: var(--mono);
    font-size: clamp(1.1rem, 1rem + 1vw, 1.55rem);
    letter-spacing: 0.04em;
    margin: 0 0 4px 0;
    font-weight: 600;
  }

  .subtitle{
    color: var(--text-muted);
    font-size: 0.92rem;
    margin: 0;
    max-width: 46ch;
  }

  .readout{
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-faint);
    text-align: right;
    line-height: 1.6;
    white-space: nowrap;
  }

  /* ---------- Sprach-Schalter (Segment-Optik) ---------- */

  .lang-switch{
    display:inline-flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: linear-gradient(180deg, #1a2029, #11151b);
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 2px rgba(0,0,0,0.4);
  }
  .lang-btn{
    appearance: none; -webkit-appearance: none;
    border: none;
    border-left: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    padding: 7px 11px;
    min-width: 40px;
    min-height: 34px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background .15s, color .15s;
  }
  .lang-btn:first-child{ border-left: none; }
  .lang-btn[aria-pressed="true"]{
    color: var(--text);
    background: linear-gradient(180deg, #0c0f13, #181e26);
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.55), inset 0 -1px 0 rgba(255,255,255,0.03);
    text-shadow: 0 0 8px rgba(231,229,224,0.35);
  }
  .lang-btn:hover{ color: var(--text); }
  .lang-btn:focus-visible{ outline: 2px solid var(--text-muted); outline-offset: 2px; }

  /* ---------- Familien-Filter-Schalter ---------- */

  .switches{
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .switch{
    --c: var(--text-muted);
    display:flex;
    align-items:center;
    gap: 7px;
    background: linear-gradient(180deg, #1a2029, #11151b);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 13px 7px 10px;
    font-family: var(--mono);
    font-size: 0.74rem;
    letter-spacing: 0.03em;
    color: var(--text-muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 2px rgba(0,0,0,0.4);
    transition: border-color .15s, color .15s, box-shadow .15s, background .15s;
    min-height: 36px;
  }
  .switch .dot{
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border);
    box-shadow: none;
    transition: background .15s, box-shadow .15s;
    flex: none;
  }
  .switch[aria-pressed="true"]{
    color: var(--text);
    border-color: var(--c);
    background: linear-gradient(180deg, #0c0f13, #181e26);
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.55), inset 0 -1px 0 rgba(255,255,255,0.03);
  }
  .switch[aria-pressed="true"] .dot{
    background: var(--c);
    animation: ledPulse 2.6s ease-in-out infinite;
  }
  .switch:hover{ color: var(--text); }
  .switch:focus-visible{ outline: 2px solid var(--c); outline-offset: 2px; }

  /* ---------- Favoriten-Leiste (Haupt-Display) ---------- */

  .fav-bar{
    --c: var(--text-muted);
    position: relative;
    overflow: hidden;
    display:flex;
    align-items:center;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 16px;
    padding: 18px 20px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: linear-gradient(135deg, color-mix(in srgb, var(--c) 14%, var(--bg-card)), var(--bg-card) 70%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 0 26px -8px color-mix(in srgb, var(--c) 55%, transparent);
  }
  .fav-bar::after{
    content: "";
    position: absolute;
    top: -60px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--c) 30%, transparent), transparent 70%);
    pointer-events: none;
  }
  .fav-bar.is-empty{
    border-style: dashed;
    background: var(--bg-card);
    box-shadow: none;
    color: var(--text-faint);
    font-size: 0.84rem;
  }
  .fav-bar .icon-box{
    width: 52px; height: 52px; flex: none;
    border-color: var(--c);
    animation: ledPulse 3.2s ease-in-out infinite;
  }
  .fav-bar .icon-box svg{ width: 28px; height: 28px; }
  .fav-bar .fav-info{ flex: 1; min-width: 140px; position: relative; z-index: 1; }
  .fav-bar .fav-eyebrow{
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--c);
    margin: 0 0 3px 0;
  }
  .fav-bar .fav-title{
    font-size: 1.12rem;
    font-weight: 700;
    margin: 0;
    line-height: 1.3;
  }
  .fav-bar .fav-start{
    position: relative; z-index: 1;
    display:inline-flex;
    align-items:center;
    gap: 8px;
    padding: 13px 22px;
    border-radius: 8px;
    background: var(--c);
    color: #0b0e12;
    font-weight: 700;
    font-size: 0.92rem;
    text-decoration: none;
    white-space: nowrap;
    min-height: 46px;
    -webkit-tap-highlight-color: transparent;
  }
  .fav-bar .fav-start:hover{ filter: brightness(1.08); }

  /* ---------- Sektionen je Familie ---------- */

  section.family{
    margin-bottom: 30px;
    animation: powerOn .5s ease-out both;
  }
  section.family.is-hidden{ display:none; }

  .family-head{
    display:flex;
    align-items:center;
    gap: 10px;
    margin: 0 0 12px 2px;
  }
  .family-head .bar{
    width: 16px; height: 3px; border-radius: 2px;
    background: var(--c);
  }
  .family-head h2{
    font-family: var(--mono);
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 0;
    font-weight: 600;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
  }

  /* ---------- Kachel ---------- */

  .card{
    --c: var(--text-muted);
    position: relative;
    text-align: left;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--c);
    border-radius: var(--radius);
    padding: 16px 16px 14px;
    color: var(--text);
    font-family: var(--sans);
    display:flex;
    flex-direction: column;
    gap: 10px;
    min-height: 100%;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), inset 0 -2px 6px rgba(0,0,0,0.35);
    transition: background .15s, border-color .15s, box-shadow .2s;
  }
  .card::before, .card::after{
    content: "";
    position: absolute;
    top: 9px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--border-soft);
    box-shadow: inset 0 1px 1px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.02);
  }
  .card::before{ left: 9px; }
  .card::after{ right: 9px; }
  .card:hover{
    background: var(--bg-card-hover);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), inset 0 -2px 6px rgba(0,0,0,0.35), 0 4px 18px -6px color-mix(in srgb, var(--c) 50%, transparent), 0 0 0 1px color-mix(in srgb, var(--c) 30%, transparent);
  }
  .card.is-favorite{
    background: var(--bg-card-hover);
    animation: cardGlow 3.2s ease-in-out infinite;
  }

  .card-main{
    display:flex;
    flex-direction: column;
    gap: 10px;
    background: none;
    border: none;
    padding: 0;
    margin: 0;
    width: 100%;
    text-align: left;
    color: inherit;
    font-family: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .card-main:active{ transform: scale(0.997); }
  .card-main:focus-visible{ outline: 2px solid var(--c); outline-offset: 2px; border-radius: 6px; }

  .card-top{
    display:flex;
    align-items:flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .star-btn{
    background: var(--bg-panel);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    width: 38px; height: 38px;
    flex: none;
    font-size: 1.05rem;
    line-height: 1;
    color: var(--text-faint);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: color .15s, border-color .15s;
  }
  .star-btn:hover{ color: var(--c); border-color: var(--c); }
  .star-btn[aria-pressed="true"]{
    color: var(--c);
    border-color: var(--c);
    text-shadow: 0 0 8px color-mix(in srgb, var(--c) 55%, transparent);
  }
  .star-btn:focus-visible{ outline: 2px solid var(--c); outline-offset: 2px; }

  .icon-box{
    width: 38px; height: 38px;
    border-radius: 8px;
    background: var(--bg-panel);
    border: 1px solid var(--border-soft);
    display:flex; align-items:center; justify-content:center;
    flex: none;
    color: var(--c);
  }
  .icon-box svg{ width: 20px; height: 20px; display:block; }
  .icon-box svg path,
  .icon-box svg rect,
  .icon-box svg circle{
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    transition: stroke-dashoffset .55s ease;
  }
  .card:hover .icon-box svg path,
  .card:hover .icon-box svg rect,
  .card:hover .icon-box svg circle{
    stroke-dashoffset: 0;
  }

  .version-chip{
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--c);
    background: var(--bg-panel);
    border: 1px solid var(--border-soft);
    border-radius: 5px;
    padding: 3px 7px;
    text-shadow: 0 0 6px color-mix(in srgb, var(--c) 60%, transparent);
    white-space: nowrap;
    margin-top: 2px;
    align-self: flex-start;
  }

  .card h3{
    font-size: 0.98rem;
    margin: 0;
    font-weight: 600;
    line-height: 1.3;
  }

  .card .teaser{
    color: var(--text-muted);
    font-size: 0.86rem;
    margin: 0;
    flex: 1;
  }

  .card .more{
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--c);
    letter-spacing: 0.03em;
    margin-top: 2px;
  }

  .card-actions{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 2px;
    padding-top: 10px;
    border-top: 1px solid var(--border-soft);
  }

  .quick-start{
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.02em;
    color: var(--c);
    text-decoration: none;
    padding: 6px 0;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .quick-start:hover{ text-decoration: underline; }
  .quick-start:focus-visible{ outline: 2px solid var(--c); outline-offset: 2px; }

  /* ---------- Overlay / Modal ---------- */

  .backdrop{
    position: fixed; inset: 0;
    background: rgba(5,7,9,0.72);
    backdrop-filter: blur(2px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 20px;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity .15s;
  }
  .backdrop.open{ opacity: 1; pointer-events: auto; }

  .modal{
    --c: var(--text-muted);
    width: 100%;
    max-width: 640px;
    max-height: 86vh;
    overflow-y: auto;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-left: 4px solid var(--c);
    border-radius: var(--radius);
    padding: 22px 22px 24px;
    transform: translateY(8px) scale(0.985);
    transition: transform .18s;
  }
  .backdrop.open .modal{ transform: translateY(0) scale(1); }

  .modal-head{
    display:flex;
    justify-content: space-between;
    align-items:flex-start;
    gap: 12px;
    margin-bottom: 4px;
  }
  .modal-head-left{ display:flex; gap: 12px; align-items:flex-start; }
  .modal .icon-box{ width: 42px; height: 42px; }
  .modal .icon-box svg{ width: 22px; height: 22px; }
  .modal h2{
    font-size: 1.08rem;
    margin: 0 0 4px 0;
    line-height: 1.35;
  }
  .modal .version-chip{ margin-top: 0; }

  .modal .close{
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 30px; height: 30px;
    border-radius: 7px;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    flex: none;
  }
  .modal .close:hover{ color: var(--text); border-color: var(--c); }

  .modal-section{ margin-top: 16px; }
  .modal-section .label{
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--c);
    margin: 0 0 6px 0;
  }
  .modal-section p{
    margin: 0;
    font-size: 0.9rem;
    color: var(--text);
  }
  .modal-section ol{
    margin: 0;
    padding-left: 1.2em;
    font-size: 0.9rem;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .modal-section.is-hidden{ display:none; }

  .modal .open-link{
    display:inline-flex;
    align-items:center;
    gap: 8px;
    margin-top: 20px;
    padding: 11px 18px;
    border-radius: 8px;
    background: var(--c);
    color: #0b0e12;
    font-weight: 600;
    font-size: 0.9rem;
    text-decoration: none;
    min-height: 44px;
  }
  .modal .open-link:hover{ filter: brightness(1.08); }

  /* ---------- Footer ---------- */

  footer{
    margin-top: 30px;
    padding-top: 16px;
    border-top: 1px solid var(--border-soft);
    color: var(--text-faint);
    font-size: 0.78rem;
    line-height: 1.6;
    animation: powerOn .5s ease-out both;
    animation-delay: .42s;
  }
  footer .page-version{
    font-family: var(--mono);
    color: var(--text-muted);
  }

  /* ---------- Handy: Kacheln blenden zusätzlich einzeln auf ---------- */
  /* Greift nur auf schmalen Bildschirmen. Die Verzögerung (--cardDelay)
     setzt das JS pro Kachel; am Tablet/PC bleibt alles ruhig wie bisher. */
  @media (max-width: 640px) and (prefers-reduced-motion: no-preference){
    .card{
      animation: cardIn .42s ease-out both;
      animation-delay: var(--cardDelay, 0s);
    }

  /* ============================================================
     3) KLEINE HELFER
     ============================================================ */

  function $(id){ return document.getElementById(id); }

  // Element-Fabrik: Text über textContent (sicher), innerHTML nur für ICONS.
  function el(tag, opts){
    opts = opts || {};
    var node = document.createElement(tag);
    if(opts.class) node.className = opts.class;
    if(opts.text != null) node.textContent = opts.text;
    if(opts.html != null) node.innerHTML = opts.html; // nur für statische ICONS
    if(opts.attrs){
      for(var k in opts.attrs){
        if(Object.prototype.hasOwnProperty.call(opts.attrs, k)) node.setAttribute(k, opts.attrs[k]);
      }
    }
    if(opts.cvar) node.style.setProperty("--c", opts.cvar);
    if(opts.children){
      for(var i=0;i<opts.children.length;i++){ node.appendChild(opts.children[i]); }
    }
    return node;
  }

  function iconBox(iconKey, cvar){
    return el("div", { class: "icon-box", cvar: cvar, html: ICONS[iconKey] || "" });
  }

  function familyOf(tool){
    for(var i=0;i<FAMILIES.length;i++){ if(FAMILIES[i].key === tool.family) return FAMILIES[i]; }
    return null;
  }
  function findTool(id){
    for(var i=0;i<TOOLS.length;i++){ if(TOOLS[i].id === id) return TOOLS[i]; }
    return null;
  }

  // Sprach-Zugriff mit Fallback auf Deutsch (falls eine Übersetzung fehlt).
  function ui(lang){ return UI[lang] || UI.de; }
  function toolText(tool, lang){ return (tool.i18n && tool.i18n[lang]) || tool.i18n.de; }
  function famLabel(fam, lang){ return (fam.label && fam.label[lang]) || fam.label.de; }

  /* ============================================================
     4) ZUSTAND  —  Sprache + Filter + Favorit (beides lokal gespeichert)
     ============================================================ */

  var LANG_KEY = "dt_werkstatt_sprache";
  function getLang(){
    try { var l = localStorage.getItem(LANG_KEY); return (LANGS.indexOf(l) >= 0) ? l : "de"; }
    catch(e){ return "de"; }
  }
  function setLang(l){ try { localStorage.setItem(LANG_KEY, l); } catch(e){ /* nur diese Sitzung */ } }

  var activeFamilies = {};
  FAMILIES.forEach(function(f){ activeFamilies[f.key] = true; });

  var FAV_KEY = "dt_werkstatt_favorit";
  function getFavoriteId(){
    try { return localStorage.getItem(FAV_KEY); } catch(e){ return null; }
  }
  function setFavoriteId(id){
    try {
      if(id) localStorage.setItem(FAV_KEY, id);
      else localStorage.removeItem(FAV_KEY);
    } catch(e){ /* Speicher nicht verfügbar — gilt dann nur für diese Sitzung */ }
  }

  /* ============================================================
     5) AUFBAU  —  Sprach-Schalter, Filter-Schalter, Kacheln
        Alles wird EINMAL gebaut. Referenzen merken wir uns, damit
        Sprachwechsel und Favoriten-Wechsel nur Texte/Zustände
        aktualisieren (kein Neuaufbau).
     ============================================================ */

  var langSwitchEl = $("lang-switch");
  var switchesEl   = $("switches");
  var sectionsEl   = $("sections");
  var favBarEl     = $("fav-bar");

  var langRefs   = []; // [{ lang, btn }]
  var switchRefs = []; // [{ key, labelEl }]
  var headRefs   = []; // [{ key, h2El }]
  var cardRefs   = []; // [{ id, tool, card, starBtn, titleEl, teaserEl, moreEl, quickEl }]

  // ---- Sprach-Schalter (einmalig) ----
  function buildLangSwitch(){
    LANGS.forEach(function(lang){
      var btn = el("button", {
        class: "lang-btn",
        text: lang.toUpperCase(),
        attrs: { type: "button", "aria-pressed": "false", "data-lang": lang, "lang": lang, title: LANG_NAMES[lang], "aria-label": LANG_NAMES[lang] }
      });
      btn.addEventListener("click", function(){
        setLang(lang);
        applyLanguage();
      });
      langRefs.push({ lang: lang, btn: btn });
      langSwitchEl.appendChild(btn);
    });
  }

  // ---- Filter-Schalter (einmalig) ----
  function buildSwitches(){
    FAMILIES.forEach(function(f){
      var dot = el("span", { class: "dot" });
      var labelEl = el("span", { text: famLabel(f, getLang()) });
      var btn = el("button", {
        class: "switch",
        cvar: f.color,
        attrs: { type: "button", "aria-pressed": "true", "data-family": f.key },
        children: [dot, labelEl]
      });
      btn.addEventListener("click", function(){
        activeFamilies[f.key] = !activeFamilies[f.key];
        btn.setAttribute("aria-pressed", String(activeFamilies[f.key]));
        applyFilter();
      });
      switchRefs.push({ key: f.key, labelEl: labelEl });
      switchesEl.appendChild(btn);
    });
  }

  // ---- Eine Kachel bauen ----
  function buildCard(tool, fam){
    var lang = getLang();
    var tx = toolText(tool, lang);

    var starBtn = el("button", { class: "star-btn", cvar: fam.color, attrs: { type: "button" } });
    starBtn.addEventListener("click", function(){
      var nowFav = (getFavoriteId() !== tool.id);
      setFavoriteId(nowFav ? tool.id : null);
      updateFavoriteUI();
    });

    var top = el("div", { class: "card-top", children: [ iconBox(tool.icon, fam.color), starBtn ] });

    var versionChip = el("span", { class: "version-chip", text: "v" + tool.version });
    var titleEl = el("h3", { text: tx.title });
    var teaserEl = el("p", { class: "teaser", text: tx.teaser });
    var moreEl = el("span", { class: "more", text: ui(lang).more });
    var main = el("button", {
      class: "card-main",
      attrs: { type: "button" },
      children: [ versionChip, titleEl, teaserEl, moreEl ]
    });
    main.addEventListener("click", function(){ openModal(tool, fam); });

    var quickEl = el("a", {
      class: "quick-start",
      text: ui(lang).quickStart,
      attrs: { href: tool.link, target: "_blank", rel: "noopener" }
    });
    var actions = el("div", { class: "card-actions", children: [quickEl] });

    var card = el("div", { class: "card", cvar: fam.color, children: [top, main, actions] });

    cardRefs.push({
      id: tool.id, tool: tool, card: card, starBtn: starBtn,
      titleEl: titleEl, teaserEl: teaserEl, moreEl: moreEl, quickEl: quickEl
    });
    return card;
  }

  // ---- Sektionen + Kacheln (einmalig) ----
  function buildSections(){
    var lang = getLang();
    var cardIndex = 0; // global, für gestaffeltes Aufblenden am Handy
    FAMILIES.forEach(function(f, idx){
      var tools = TOOLS.filter(function(t){ return t.family === f.key; });
      if(!tools.length) return;

      var h2El = el("h2", { text: famLabel(f, lang) });
      headRefs.push({ key: f.key, h2El: h2El });

      var head = el("div", {
        class: "family-head",
        children: [ el("span", { class: "bar", attrs: { style: "background:" + f.color } }), h2El ]
      });

      var grid = el("div", { class: "grid" });
      tools.forEach(function(t){
        var card = buildCard(t, f);
        var delay = Math.min(cardIndex * 0.05, 0.5);
        card.style.setProperty("--cardDelay", delay.toFixed(2) + "s");
        cardIndex++;
        grid.appendChild(card);
      });

      var section = el("section", { class: "family", children: [head, grid] });
      section.style.animationDelay = (0.14 + idx * 0.06).toFixed(2) + "s";

      sectionRefs[f.key] = section;
      sectionsEl.appendChild(section);
    });
  }

  var sectionRefs = {}; // family.key -> section-Element

  // ---- Filter anwenden: nur Sichtbarkeit umschalten ----
  function applyFilter(){
    FAMILIES.forEach(function(f){
      var section = sectionRefs[f.key];
      if(!section) return;
      if(activeFamilies[f.key]) section.classList.remove("is-hidden");
      else section.classList.add("is-hidden");
    });
  }

  /* ============================================================
     6) SPRACHE ANWENDEN  —  alle Texte aktualisieren, ohne Neuaufbau
     ============================================================ */

  function applyLanguage(){
    var lang = getLang();
    var t = ui(lang);

    document.documentElement.lang = lang;

    // Sprach-Schalter: aktiven Zustand setzen
    langRefs.forEach(function(r){ r.btn.setAttribute("aria-pressed", String(r.lang === lang)); });
    langSwitchEl.setAttribute("aria-label", t.langLabel);

    // Statische UI-Texte
    $("subtitle").textContent     = t.subtitle;
    $("footer-note").textContent  = t.footerNote;
    $("page-version").textContent = t.pageVersion;

    // Familien-Beschriftungen (Schalter + Sektionsköpfe)
    switchRefs.forEach(function(r){ r.labelEl.textContent = famLabelByKey(r.key, lang); });
    headRefs.forEach(function(r){ r.h2El.textContent = famLabelByKey(r.key, lang); });

    // Kachel-Texte
    cardRefs.forEach(function(r){
      var tx = toolText(r.tool, lang);
      r.titleEl.textContent = tx.title;
      r.teaserEl.textContent = tx.teaser;
      r.moreEl.textContent = t.more;
      r.quickEl.textContent = t.quickStart;
    });

    // Readout + Favoriten-Anzeige (Sterne-aria + Display) in neuer Sprache
    updateReadout();
    updateFavoriteUI();
  }

  function famLabelByKey(key, lang){
    for(var i=0;i<FAMILIES.length;i++){ if(FAMILIES[i].key === key) return famLabel(FAMILIES[i], lang); }
    return key;
  }

  /* ============================================================
     7) FAVORIT-ANZEIGE  —  Sterne, Kachel-Glow, Haupt-Display
     ============================================================ */

  function updateFavoriteUI(){
    var lang = getLang();
    var t = ui(lang);
    var favId = getFavoriteId();

    cardRefs.forEach(function(ref){
      var isFav = (ref.id === favId);
      ref.starBtn.textContent = isFav ? "★" : "☆";
      ref.starBtn.setAttribute("aria-pressed", String(isFav));
      ref.starBtn.setAttribute("aria-label", isFav ? t.starRemove : t.starAdd);
      if(isFav) ref.card.classList.add("is-favorite");
      else ref.card.classList.remove("is-favorite");
    });

    renderFavBar(favId, lang);
  }

  function renderFavBar(favId, lang){
    var t = ui(lang);
    var tool = favId ? findTool(favId) : null;

    favBarEl.textContent = "";

    if(!tool){
      favBarEl.className = "fav-bar is-empty";
      favBarEl.style.removeProperty("--c");
      favBarEl.textContent = t.favEmpty;
      return;
    }

    var fam = familyOf(tool);
    favBarEl.className = "fav-bar";
    favBarEl.style.setProperty("--c", fam.color);

    var info = el("div", {
      class: "fav-info",
      children: [
        el("p", { class: "fav-eyebrow", text: t.favEyebrow }),
        el("p", { class: "fav-title", text: toolText(tool, lang).title })
      ]
    });
    var start = el("a", {
      class: "fav-start",
      text: t.favStart,
      attrs: { href: tool.link, target: "_blank", rel: "noopener" }
    });

    favBarEl.appendChild(iconBox(tool.icon, fam.color));
    favBarEl.appendChild(info);
    favBarEl.appendChild(start);
  }

  /* ============================================================
     8) MODAL (Detail-Overlay) — liest die aktuelle Sprache
     ============================================================ */

  var backdrop          = $("backdrop");
  var modal             = $("modal");
  var modalIcon         = $("modal-icon");
  var modalTitle        = $("modal-title");
  var modalVersion      = $("modal-version");
  var modalLabelKann    = $("modal-label-kann");
  var modalKann         = $("modal-kann");
  var modalAnleitungWrap= $("modal-anleitung-wrap");
  var modalLabelAnl     = $("modal-label-anleitung");
  var modalAnleitung    = $("modal-anleitung");
  var modalLabelAusz    = $("modal-label-auszeichnet");
  var modalAuszeichnet  = $("modal-auszeichnet");
  var modalLink         = $("modal-link");
  var modalClose        = $("modal-close");
  var lastFocused       = null;

  function openModal(tool, fam){
    var lang = getLang();
    var t = ui(lang);
    var tx = toolText(tool, lang);

    modal.style.setProperty("--c", fam.color);
    modalIcon.style.color = fam.color;
    modalIcon.innerHTML = ICONS[tool.icon] || ""; // statisches SVG

    modalTitle.textContent = tx.title;
    modalVersion.textContent = "v" + tool.version;

    modalLabelKann.textContent = t.labelKann;
    modalKann.textContent = tx.kann;

    // Optionaler Anleitungs-Abschnitt
    modalAnleitung.textContent = "";
    if(tx.anleitung && tx.anleitung.length){
      modalLabelAnl.textContent = t.labelAnleitung;
      tx.anleitung.forEach(function(step){
        modalAnleitung.appendChild(el("li", { text: step }));
      });
      modalAnleitungWrap.classList.remove("is-hidden");
    } else {
      modalAnleitungWrap.classList.add("is-hidden");
    }

    modalLabelAusz.textContent = t.labelAuszeichnet;
    modalAuszeichnet.textContent = tx.auszeichnet;

    modalLink.textContent = t.openLink;
    modalLink.href = tool.link;
    modalClose.setAttribute("aria-label", t.closeLabel);

    backdrop.classList.add("open");
    lastFocused = document.activeElement;
    modalClose.focus();
    document.addEventListener("keydown", onKeydown);
  }

  function closeModal(){
    backdrop.classList.remove("open");
    document.removeEventListener("keydown", onKeydown);
    if(lastFocused && typeof lastFocused.focus === "function") lastFocused.focus();
  }

  function onKeydown(e){ if(e.key === "Escape") closeModal(); }

  modalClose.addEventListener("click", closeModal);
  backdrop.addEventListener("click", function(e){ if(e.target === backdrop) closeModal(); });

  /* ============================================================
     9) READOUT (kleine Live-Anzeige im Header)
     ============================================================ */

  var readoutEl = $("readout");
  function updateReadout(){
    var lang = getLang();
    var now = new Date();
    var d = now.toLocaleDateString(LOCALES[lang] || "de-DE");
    var tm = now.toLocaleTimeString(LOCALES[lang] || "de-DE", { hour: "2-digit", minute: "2-digit" });
    readoutEl.textContent = "";
    readoutEl.appendChild(el("div", { text: d }));
    readoutEl.appendChild(el("div", { text: tm + " · " + TOOLS.length + " " + ui(lang).toolsWord }));
  }

  /* ============================================================
     10) START
     ============================================================ */

  buildLangSwitch();
  buildSwitches();
  buildSections();
  applyFilter();        // Sichtbarkeit setzen (alle an)
  applyLanguage();      // alle Texte gemäß gespeicherter Sprache (ruft updateReadout + updateFavoriteUI)
  setInterval(updateReadout, 30000);

})();
</script>
</body>
</html>

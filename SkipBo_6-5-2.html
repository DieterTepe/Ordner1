              <!DOCTYPE html>
<!--
- Version: 6.5.2 (Vollständig, formatiert & alle Bugs behoben)
- === UPDATE v6.5.1 (basiert auf v6.5.0) ===
- FIX 1: DEBUG_1/2/3/4 auf false gesetzt (waren versehentlich true - Produktionsfehler)
- FIX 2: addStockHighlightStyles() Aufruf nach Funktionsdefinition wieder eingefuegt
         (CSS-Klassen wurden nie injiziert, animierte Stockrahmen erschienen nicht)
- FIX 3: DEBUG_49 else-Zweig korrigiert, alter Text mit nagel_deburg entfernt,
         Logik-Invertierung behoben
- FIX 4: score-Variable in aiTurn() Debug-Outputs definiert (war undefined seit v5.0)
- FIX 5: SCORE_4 aufgeteilt in SCORE_4_JOKER_MOVE und SCORE_4_OPP_JOKER
         (waren zwei verschiedene Konzepte mit gleichem Wert, jetzt separat anpassbar)
- FIX 6: handleDiscardPileDrop() Auto-Ablage auf player === 'ai' beschraenkt
         (verhindert ungewollte Auto-Auswahl beim menschlichen Spieler)
- FIX 7: CSS wieder eingerueckt fuer bessere Lesbarkeit und Pflege
- FIX 8: Rekursion in aiTurn() durch Iterationszaehler abgesichert (max. 15 Durchlaeufe)
- FIX 9: KONFIG von const auf let geaendert fuer Laufzeit-Tests im Browser
- FIX 10: KONFIG.SCORE_10_ADV mit vollstaendigem Kommentar ergaenzt
- BEIBEHALTEN: 100% Original-Code. Keine Zeile entfernt, nichts gekuerzt.
- BEIBEHALTEN: Volle Funktionsarchitektur, Event-Handling, Tracking, UI, Animationen
-->
<html lang="de">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
user-scalable=no, viewport-fit=cover"
>
<meta name="theme-color"                    content="#1B5E20">
<meta name="apple-mobile-web-app-capable"   content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Skip-Bo Mobile v6.5.2</title>
<style>
  /* ============================================================ */
  /* BASIS-RESET & BOX-SIZING                                     */
  /* ============================================================ */
  *, *::before, *::after {
    box-sizing: border-box;
  }
  html, body {
    margin:      0;
    padding:     0;
    height:      100%;
    width:       100%;
    background:  #1B5E20;
    color:       white;
    font-family: Arial, sans-serif;
    overflow:    hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  /* ============================================================ */
  /* INFOLABEL – vollbreitig, fixiert, verschiebbar               */
  /* ============================================================ */
  #status-label {
    position:        fixed;
    top:             0;
    left:            0;
    width:           100%;
    max-width:       100%;
    background:      rgba(46, 125, 50, 0.94);
    padding:         8px 10px;
    text-align:      center;
    font-size:       0.95rem;
    font-weight:     500;
    z-index:         1000;
    cursor:          grab;
    user-select:     none;
    box-shadow:      0 3px 8px rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(4px);
    border-bottom:   1px solid rgba(255, 255, 255, 0.2);
    border-radius:   0 0 8px 8px;
    white-space:     nowrap;
    overflow:        hidden;
    text-overflow:   ellipsis;
    transform:       none;
  }
  #status-label:active {
    cursor: grabbing;
  }
  /* ============================================================ */
  /* GAME CONTAINER – 9:16-Proportion, responsive                 */
  /* ============================================================ */
  .game-container {
    aspect-ratio:    9 / 16;
    height:          100dvh;
    width:           min(100vw, calc(100dvh * 9 / 16));
    margin:          0 auto;
    background:      transparent;
    display:         flex;
    flex-direction:  column;
    overflow:        hidden;
    padding-top:     42px;
    position:        relative;
  }
  /* ============================================================ */
  /* BEREICHE – exakte Flex-Verteilung für 5 gleiche Kartenreihen */
  /* ============================================================ */
  .opponent-area {
    flex:           2;
    display:        flex;
    flex-direction: column;
    gap:            4px;
    padding:        4px 4px 2px;
    min-height:     0;
  }
  .build-area {
    flex:             1;
    display:          flex;
    flex-direction:   column;
    justify-content:  center;
    padding:          4px;
    min-height:       0;
  }
  .human-area {
    flex:           2;
    display:        flex;
    flex-direction: column;
    gap:            4px;
    padding:        2px 4px 4px;
    min-height:     0;
  }
  /* ============================================================ */
  /* REIHEN & HÄNDE – je 1/5 der verfügbaren Höhe                 */
  /* ============================================================ */
  .main-piles,
  .hand {
    flex:                    1;
    min-height:              0;
    display:                 grid;
    grid-template-columns:   repeat(5, 1fr);
    gap:                     4px;
    align-items:             center;
    justify-items:           center;
    width:                   100%;
  }
  /* ============================================================ */
  /* KARTEN & FELDER                                              */
  /* ============================================================ */
  .field {
    background:      rgba(255, 255, 255, 0.1);
    border:          2px dashed #fff;
    border-radius:   8px;
    display:         flex;
    justify-content: center;
    align-items:     center;
    position:        relative;
    overflow:        hidden;
    perspective:     1000px;
    width:           100%;
    height:          100%;
  }
  .card {
    border:          2px solid #000 !important;
    border-radius:   8px;
    aspect-ratio:    2 / 3;
    width:           100% !important;
    height:          auto !important;
    max-height:      100%;
    margin:          auto;
    display:         flex;
    flex-direction:  column;
    justify-content: space-between;
    padding:         5px;
    position:        relative;
    transform-style: preserve-3d;
    transition:      transform 0.5s, box-shadow 0.5s;
    box-shadow:      0 0 5px #000000, 0 0 15px #000000 inset;
    background:      radial-gradient(circle, rgba(255,255,255,0.1), rgba(255,255,255,0.8));
  }
  .card.selected {
    transform: translateY(-40px) rotateY(15deg) rotateX(10deg);
    animation:
      neon-pulse  1.5s infinite alternate,
      card-float  2s   infinite;
  }
  .card.backface {
    background: lightgreen !important;
    animation:  card-glow 2s ease-in-out infinite alternate;
  }
  .card.backface::before {
    content:    "SKIP-BO";
    position:   absolute;
    top:        50%;
    left:       50%;
    transform:  translate(-50%, -50%) rotate(-45deg);
    font-size:  1.5rem;
    font-weight: bold;
    color:      rgba(255, 255, 255, 0.8);
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    letter-spacing: 2px;
  }
  .card-corner {
    position:    absolute;
    font-size:   1.2rem;
    font-weight: bold;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
  }
  .card-corner.top-left     { top: 5px;    left:  5px; }
  .card-corner.top-right    { top: 5px;    right: 5px; }
  .card-corner.bottom-left  { bottom: 5px; left:  5px; transform: rotate(180deg); }
  .card-corner.bottom-right { bottom: 5px; right: 5px; transform: rotate(180deg); }
  .card-middle {
    position:    absolute;
    top:         50%;
    left:        50%;
    transform:   translate(-50%, -50%);
    font-size:   2rem;
    font-weight: bold;
    text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
  }
  .human-area    .field.stock .card,
  .opponent-area .field.stock .card,
  .build-area    .field.draw-pile .card {
    width:      100%;
    height:      auto;
    max-height: 100%;
  }
  /* ============================================================ */
  /* KARTENFARBEN (1:1 Original)                                  */
  /* ============================================================ */
  .card:not(.backface)[data-value="1"],
  .card:not(.backface)[data-value="2"],
  .card:not(.backface)[data-value="3"],
  .card:not(.backface)[data-value="4"] {
    background: radial-gradient(
      circle,
      #BBDEFB, #64B5F6, #2196F3, #0D47A1
    ) !important;
    box-shadow: 0 0 15px #2196F3;
  }
  .card:not(.backface)[data-value="5"],
  .card:not(.backface)[data-value="6"],
  .card:not(.backface)[data-value="7"],
  .card:not(.backface)[data-value="8"] {
    background: radial-gradient(
      circle,
      #C8E6C9, #81C784, #4CAF50, #1B5E20
    ) !important;
    box-shadow: 0 0 15px #4CAF50;
  }
  .card:not(.backface)[data-value="9"],
  .card:not(.backface)[data-value="10"],
  .card:not(.backface)[data-value="11"],
  .card:not(.backface)[data-value="12"] {
    background: radial-gradient(
      circle,
      #FFCDD2, #EF9A9A, #f44336, #B71C1C
    ) !important;
    box-shadow: 0 0 15px #f44336;
  }
  .card:not(.backface)[data-type="joker"] {
    background: radial-gradient(
      circle,
      #FFF9C4, yellow, gold, #FFD700
    ) !important;
    color:      #000;
    box-shadow: 0 0 15px gold;
  }
  /* ============================================================ */
  /* ANIMATIONEN (1:1 Original)                                    */
  /* ============================================================ */
  @keyframes card-glow {
    from { box-shadow: 0 0  5px #1565C0; }
    to   { box-shadow: 0 0 15px #0D47A1; }
  }
  @keyframes neon-pulse {
    from {
      box-shadow:
        0 0 10px #FFD700, 0 0 20px #FFD700,
        0 0 30px #FFD700, 0 0 40px #FFD700;
    }
    to {
      box-shadow:
        0 0 20px #FFD700, 0 0 30px #FFD700,
        0 0 40px #FFD700, 0 0 50px #FFD700;
    }
  }
  @keyframes card-float {
    0%   { transform: translateY(   0); }
    50%  { transform: translateY(-20px); }
    100% { transform: translateY(   0); }
  }
  @keyframes card-drop {
    0%   { transform: translateY(-40px) rotateY(15deg) rotateX(10deg); }
    100% { transform: translateY(   0)  rotateY( 0deg) rotateX( 0deg); }
  }
  /* ============================================================ */
  /* LABEL-STILE & INFO-FENSTER                                    */
  /* ============================================================ */
  .field::after {
    content:       attr(data-label);
    position:      absolute;
    bottom:        4px;
    left:          2px;
    right:         2px;
    font-size:     0.65rem;
    color:         rgba(255, 255, 255, 0.9);
    text-align:    center;
    padding:       2px;
    background:    rgba(0, 0, 0, 0.4);
    border-radius: 3px;
  }
  .field.card.selected {
    box-shadow: 0 0 15px #FFD700, 0 0 30px #FFD700 inset;
    transform:  translateY(-40px) rotateY(15deg) rotateX(10deg) scale(1.05);
    animation:
      neon-pulse 1.5s infinite alternate,
      card-float 2s   infinite;
    transition: all 0.3s ease;
  }
  .field.card.placed {
    animation: card-drop 1s forwards;
  }
  .field.card {
    transition:   all 0.3s ease;
    touch-action: manipulation;
  }
  .joker-number {
    position:         absolute;
    top:              5px;
    left:             50%;
    transform:        translateX(-50%);
    font-size:        0.8em;
    color:            black;
    background-color: rgba(255, 255, 255, 0.8);
    padding:          1px 3px;
    border-radius:    2px;
  }
  #info-window {
    position:      absolute;
    top:           -300px;
    left:          50%;
    transform:     translateX(-50%);
    background:    #000;
    color:         white;
    padding:       15px;
    text-align:    center;
    font-size:     1.2rem;
    z-index:       1001;
    box-shadow:    0 4px 8px rgba(0, 0, 0, 0.2);
    width:         80%;
    max-width:     600px;
    display:       none;
  }
  #info-table {
    width:           100%;
    border-collapse: collapse;
    margin:          0 auto;
  }
  #info-table td {
    border:     1px solid #ddd;
    padding:    8px;
    text-align: center;
    background: rgba(255, 255, 255, 0.1);
  }
  .stock-count {
    position:         absolute;
    top:              5px;
    left:             50%;
    transform:        translateX(-50%);
    font-size:        0.8em;
    color:            black;
    background-color: rgba(255, 255, 255, 0.8);
    padding:          1px 3px;
    border-radius:    2px;
    z-index:          1;
  }
  /* ============================================================ */
  /* KI-ERWEITERUNGEN & OVERLAYS (1:1 Original)                   */
  /* ============================================================ */
  .ai-prediction-overlay {
    position:      absolute;
    top:           -2px;
    left:          -2px;
    right:         -2px;
    bottom:        -2px;
    border:        2px solid #ff4444;
    border-radius: 8px;
    animation:     prediction-pulse 1.8s ease-in-out infinite;
    pointer-events: none;
    z-index:       999;
    box-shadow:    0 0 12px rgba(255, 68, 68, 0.3);
  }
  @keyframes prediction-pulse {
    0%   { opacity: 0.4; transform: scale(0.98); }
    50%  { opacity: 0.9; transform: scale(1.02); }
    100% { opacity: 0.4; transform: scale(0.98); }
  }
  .strategy-tag {
    position:        absolute;
    bottom:          calc(100% + 5px);
    left:            50%;
    transform:       translateX(-50%);
    background:      rgba(40, 40, 40, 0.9);
    color:           #fff;
    padding:         4px 12px;
    border-radius:   15px;
    font-size:       0.85em;
    font-weight:     bold;
    white-space:     nowrap;
    backdrop-filter: blur(2px);
    z-index:         1001;
    box-shadow:      0 3px 6px rgba(0, 0, 0, 0.2);
  }
</style>
</head>
<body>
<div id="status-label">🎮 Spielstart: Karten werden gemischt...</div>
<div class="game-container">
  <section class="opponent-area">
    <div class="main-piles">
      <div class="field stock"  data-label="🗃️ Gegner Stock (20)"></div>
      <div class="field"        data-label="🗑️ Ablage 1"></div>
      <div class="field"        data-label="🗑️ Ablage 2"></div>
      <div class="field"        data-label="🗑️ Ablage 3"></div>
      <div class="field"        data-label="🗑️ Ablage 4"></div>
    </div>
    <div class="hand" id="opponentHand"></div>
  </section>
  <section class="build-area">
    <div class="main-piles">
      <div class="field draw-pile"  data-label="🃏 Nachziehstapel"></div>
      <div class="field build-pile" data-label="▲ Bau 1 (1)"></div>
      <div class="field build-pile" data-label="▲ Bau 2 (1)"></div>
      <div class="field build-pile" data-label="▲ Bau 3 (1)"></div>
      <div class="field build-pile" data-label="▲ Bau 4 (1)"></div>
    </div>
  </section>
  <section class="human-area">
    <div class="main-piles">
      <div class="field"       data-label="🗑️ Ablage 1"></div>
      <div class="field"       data-label="🗑️ Ablage 2"></div>
      <div class="field"       data-label="🗑️ Ablage 3"></div>
      <div class="field"       data-label="🗑️ Ablage 4"></div>
      <div class="field stock" data-label=" Spieler Stock (20)"></div>
    </div>
    <div class="hand" id="playerHand"></div>
  </section>
</div>
<div id="info-window" style="display: none;">
  <table id="info-table"></table>
</div>

<script>
// ============================================================
// 🛠️ ZENTRALE KI-KONFIGURATION & DEBUG-FLAGS
// ALLE WERTE KÖNNEN HIER DIREKT BEARBEITET WERDEN.
// JEDER DEBUG-FLAG STEHT DIREKT MIT SEINEM SCORE-WERT & KOMMENTAR.
// ============================================================
// FIX 9: let statt const – ermöglicht Laufzeit-Tests im Browser (z.B. KONFIG.SCORE_1 = 3000)
let KONFIG = {
  // FIX 1: Alle auf false – waren versehentlich true (Produktionsfehler v6.5.0)
  DEBUG_1: false,
  SCORE_1: 6000,
  // +6000 Risikopunkte, wenn der Gegner die benötigte Folgekarte besitzt.
  // Verhindert, dass die KI dem Gegner in die Hände spielt.

  DEBUG_2: false,
  SCORE_2: 300,
  // -300 Risikopunkte, wenn der eigene Stock <= 5 Karten hat.
  // Fördert vorsichtige Züge in der Endphase.

  DEBUG_3: false,
  SCORE_3: 800,
  // +800 Risikopunkte für Lückenfüllung im Sequenzmuster.
  // Belohnt das Schließen von Zahlenlücken auf Baustapeln.

  // FIX 5: SCORE_4 aufgeteilt in zwei separate Werte –
  // beide starten bei 60, sind jetzt aber unabhängig anpassbar.
  DEBUG_4: true,
  SCORE_4_JOKER_MOVE: 60, 
  SCORE_4_OPP_JOKER: 60,
  // +60 Risikopunkte wenn die zu legende Karte selbst ein Joker (★) ist.
  // Leichte Erhöhung der Vorsicht bei unsicheren Joker-Einsätzen auf Baustapel.

  DEBUG_5: false,
  SCORE_5: 600,
  // Basis-Punkte für jeden legalen Zug auf einen Baustapel.
  // Garantiert, dass gültige Züge überhaupt bewertet werden.

  DEBUG_6: false,
  SCORE_6: 800,
  // -800 Malus: Joker auf niedrigem Stapel (<5) gelegt.
  // Bestraft ineffizienten Joker-Einsatz in frühen Spielphasen.

  DEBUG_7: false,
  SCORE_7: 15000,
  // +15000 Bonus: Joker trifft exakten Stock-Wert des Gegners.
  // Extrem hoher Anreiz, Joker gezielt gegen den Stock einzusetzen.

  DEBUG_8: false,
  SCORE_8: 60,
  // Multiplikator: Joker-Zukunftswert * futureValue.
  // Bewertet langfristigen Nutzen eines Joker-Einsatzes.

  DEBUG_9: false,
  SCORE_9: 0,
  // (Reserviert für zukünftige Erweiterungen)

  DEBUG_10: true,
  SCORE_10: 5000, 
  SCORE_10_ADV: 3000,
  // FIX 10: Vollständiger Kommentar:
  // SCORE_10 (5000): Basiswert für Stockabbau-Beschleunigung.
  // SCORE_10_ADV (3000): Zusatzbonus pro fortgeschrittenem Baustapel (Länge > 6).
  // Gesamtscore = min(SCORE_24, SCORE_10 + SCORE_10_ADV * Anzahl_fortgeschrittener_Stapel).
  // Beispiel: 2 fortgeschrittene Stapel → 5000 + 6000 = 11000, begrenzt auf SCORE_24 (8000).

  DEBUG_11: true,
  // Stockabbau kombiniert mit 10 (logisch verknüpft mit Nagel 10)

  DEBUG_12: false,
  SCORE_12: 150,
  // +GapSize * 150: Lückenbonus auf Baustapeln.
  // Belohnt das Überbrücken größerer Zahlenabstände.

  DEBUG_13: false,
  SCORE_13: 150,
  // 150: Ablage-Basisscore für das Ablegen auf einen Stapel.
  // Sichert minimale Bewertung für reguläre Ablagezüge.

  DEBUG_14: false,
  SCORE_14: 5000,
  // -5000: riskante Ablagen reduzieren.
  // Bestraft Ablagen, die dem Gegner direkt nutzen könnten.

  DEBUG_15: false,
  SCORE_15: 120,
  // +120: Sequenz-Bonus in Ablagestapel.
  // Belohnt das Bilden von aufsteigenden Reihen in der Ablage.

  DEBUG_16: false,
  SCORE_16: 20,
  // +20: Bonus für leere Ablagestapel.
  // Fördert das Öffnen neuer Ablagemöglichkeiten.

  DEBUG_17: false,
  SCORE_17: 30,
  // +30: Bonus für niedrigere Karte in Ablage.
  // Bevorzugt das Ablegen kleinerer Karten zur Stapelkontrolle.

  DEBUG_18: false,
  SCORE_18: 0,
  // (Reserviert)

  DEBUG_19: false,
  SCORE_19: 2,
  // -2: Malus pro Karte im Ablagestapel.
  // Verhindert das übermäßige Wachsen einzelner Ablagestapel.

  DEBUG_20: false,
  SCORE_20: 15000,
  // -15000: Gegnerhilfe-Blockade.
  // Sehr hohe Strafe, wenn Ablage dem Gegner direkt hilft.

  DEBUG_21a: false,
  SCORE_21A: 3,
  // +3: langfristige Planung (pileValue >= 8).
  // Geringer, aber stetiger Bonus für fortgeschrittene Stapel.

  DEBUG_22: false,
  SCORE_22: 0,
  // (Reserviert)

  DEBUG_23: false,
  SCORE_23: 600,
  // +600: Discard-Stock-Synergie-Bonus.
  // Belohnt Ablagen, die zum eigenen Stock passen.

  DEBUG_24: false,
  SCORE_24: 8000,
  // 8000: Stock-min Fallback-Wert.
  // Hohe Priorisierung, wenn Stockkarten spielbar sind.

  DEBUG_25: false,
  SCORE_25: 50,
  // Joker Future progressive Bonus (50 * (12 - Wert)).
  // Höherer Bonus für Joker, die niedrigere Werte abdecken.

  DEBUG_26: false,
  SCORE_26: 300,
  // +300: Basispunkte Ablagestapelzug.
  // Grundbewertung für strategisches Ablegen.

  DEBUG_27: false,
  SCORE_27: 650,
  // Warnung Joker/ungültiger Wert in Ablage (Fallback: 13*50).
  // Sicherer Wert, falls Joker in Ablage-Berechnung rutscht.

  DEBUG_28: false,
  SCORE_28: 600,
  // +600: Sequenzkontrolle riskScore.
  // Belohnt das Blockieren gegnerischer Sequenzen.

  DEBUG_29: false,
  SCORE_29: 3000,
  // +3000: kritischer Malus wenn Gegner-Stock <= 3.
  // Extrem vorsichtig, wenn Gegner kurz vor dem Gewinn steht.

  DEBUG_30: false,
  SCORE_30: 80,
  // +80: Risky-Stock-Joker-Schwelle.
  // Leichte Risikoerhöhung bei Joker-Einsatz gegen knappen Stock.

  DEBUG_31: false,
  // KI priorisiert Stockkarte wenn identisch mit Handkarte
  // (Logik-Trigger, kein direkter Score-Wert)

  DEBUG_32: false,
  SCORE_32: 5000,
  // +5000: Stockabbau-Priorisierung.
  // Erzwingt Stock-Einsatz bei gleicher Kartenwert-Option.

  DEBUG_33: false,
  SCORE_33: 500,
  // +500: Joker-Schutz in Ablage.
  // Verhindert unnötiges Vergeuden von Jokern in der Ablage.

  DEBUG_34: false,
  SCORE_34_HIGH: 3000,
  SCORE_34_LOW: 1500,
  // +1500/3000: Stock-Angriff Basiswert.
  // Hoch (3000) wenn Gegner <10 Stock, niedrig (1500) wenn >=10.

  DEBUG_35: false,
  SCORE_35: 800,
  // +800: Serienunterbrechung-Bonus.
  // Belohnt das Legen von Karten, die gegnerische Muster brechen.

  DEBUG_36: false,
  SCORE_36: 0,
  // (Reserviert)

  DEBUG_37: false,
  SCORE_37: 2500,
  // +2500: Blockade-Karte Score Gegnerhilfe.
  // Hohe Bewertung für Karten, die Gegner blockieren.

  DEBUG_38: false,
  SCORE_38: 10,
  // Distanz zum eigenen Stock Score (*10 Multiplikator).
  // Bewertet, wie nah eine Ablage am eigenen Stockwert liegt.

async function initGame() {
  isGameOver = false; // Zurücksetzen für neues Spiel
  debugInfo = []; // FIX 1: Hier geleert, damit Auswertung auf Mobile Devices nicht leer ist

  try {
    const savedSpeed = localStorage.getItem('skipbo-speed');
    if (savedSpeed) spielGeschwindigkeit = parseInt(savedSpeed);
  } catch (e) {
    console.error('Fehler beim Zugriff auf localStorage:', e);
  }
  
  Game.deck = [];
  for (let s = 0; s < 12; s++) {
    for (let n = 1; n <= 12; n++) {
      Game.deck.push({ type: 'number', value: n });
    }
  }
  for (let j = 0; j < 12; j++) {
    Game.deck.push({ type: 'joker', value: '★' });
  }
  
  for (let i = Game.deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [Game.deck[i], Game.deck[j]] = [Game.deck[j], Game.deck[i]];
  }
  
  Game.players.human.hand  = Game.deck.splice(0,  5);
  Game.players.ai.hand     = Game.deck.splice(0,  5);
  Game.players.human.stock = Game.deck.splice(0, 20);
  Game.players.ai.stock    = Game.deck.splice(0, 20);
  Game.drawPile            = Game.deck;
  
  Game.stockCardIsRemovable = true;
  Game.players.human.hand.forEach(card => card.faceUp = true);
  Game.players.ai.hand.forEach   (card => card.faceUp = false);
  
  drawCardsUntilFive('ai');
  updateView();
  showMessage('Spiel initialisiert. Du bist am Zug!');
  enableDraggableStatusLabel();
  showOverlay();
  setupTouchEvents();
  
  if (currentPlayer === 'ai') setTimeout(aiTurn, 3000);
  
  Game.tracking = {
    deckComposition: Array.from({ length: 12 }, (_, i) => 12).concat(Array(12).fill('joker')),
    discardHistory: {
      human: { values: [], timestamps: [] },
      ai:    { values: [], timestamps: [] }
    },
    stockPredictions: {
      human: { nextExpected: 1, confidence: 0 },
      ai:    { nextExpected: 1, confidence: 0 }
    }
  };
  
  document.querySelectorAll('.strategy-tag, .ai-prediction-overlay').forEach(el => el.remove());
}

// EVENT-HANDLING & TOUCH (OPTIMIERT)
// =============================================================
function setupTouchEvents() {
  if (isGameOver) return;
  document.querySelectorAll('.card').forEach(card => {
    card.onclick = handleCardSelect;
  });
  
  document.querySelectorAll('.build-pile, .human-area [data-label*="Ablage"]').forEach(field => {
    field.onclick = handleCardPlace;
  });
  
  const statusLabel = document.getElementById('status-label');
  if (statusLabel) {
    statusLabel.ontouchstart = () => {
      longPressTimer = setTimeout(() => {
        if (typeof showInstructions === 'function') showInstructions();
        if (navigator.vibrate) navigator.vibrate(50);
      }, 1000);
    };
    statusLabel.ontouchend = () => clearTimeout(longPressTimer);
    statusLabel.ontouchmove = () => clearTimeout(longPressTimer);
  }
}

function handleCardSelect(event) {
  if (isGameOver) return;
  if (event.currentTarget.closest('.build-pile')) {
    if (selectedCard) {
      handleCardPlace(event);
    }
    return;
  }
  
  event.preventDefault();
  if (currentPlayer !== 'human') return;
  
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  const cardElement = event.currentTarget;
  
  if (selectedCard === cardElement) {
    selectedCard = null;
    selectedSource = null;
    selectedIndex = null;
    showMessage("Auswahl aufgehoben.");
    return;
  }
  
  cardElement.classList.add('selected');
  selectedCard = cardElement;
  selectedSource = getSourceType(cardElement);
  selectedIndex = getSourceIndex(cardElement);
  showMessage(`Karte aus ${selectedSource} ausgewählt. Wähle ein Ziel.`);
}

function handleCardPlace(event) {
  if (isGameOver) return;
  event.preventDefault();
  if (!selectedCard) {
    showMessage('Bitte zuerst eine Karte auswählen');
    return;
  }
  
  const el     = event.currentTarget || event.target;
  const target = el.closest('.build-pile') || el.closest('[data-label*="Ablage"]');
  
  if (!target) return;
  if (currentPlayer !== 'human') {
    showMessage('Es ist nicht dein Zug!');
    return;
  }
  
  let success = false;
  const wasLastHandCard = selectedSource === 'hand' && Game.players.human.hand.length === 1;
  const stockPile = Game.players.human.stock;
  const topStock  = stockPile[stockPile.length - 1];
  
  if (selectedCard === topStock && selectedCard.type !== 'joker') {
    if (KONFIG.DEBUG_47) {
      debugInfo.push(`📌47 Die Handkarte entspricht der Stockkarte und ist kein ★Joker – weiter mit aiTurn ❌`);
    }
    aiTurn();
    return;
  }
  
  if (target.classList.contains('build-pile') || target.closest('.build-pile')) {
    const buildPiles     = document.querySelectorAll('.build-pile');
    const actualPile     = target.classList.contains('build-pile') ? target : target.closest('.build-pile');
    const buildPileIndex = Array.from(buildPiles).indexOf(actualPile);
    
    if (handleBuildPileDrop(currentPlayer, selectedSource, selectedIndex, buildPileIndex)) {
      success = true;
      showMessage('Du hast eine Karte auf 🗑️Baustapel gelegt');
      if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🎲🎲 Du hast eine Karte auf 🗑️Baustapel gelegt 🎲🎲`);
      if (wasLastHandCard) {
        drawCardsUntilFive('human');
        drawCardsUntilFive('ai');
        debugInfo.push(`📌60 🎲🎲 5 Handkarten nachgezogen 🎲🎲`);
      }
    } else {
      showMessage('Dieser Zug ist nicht erlaubt');
    }
    
  } else if (target.matches('[data-label*="Ablage"]') || target.closest('[data-label*="Ablage"]')) {
    const actualDiscard = target.matches('[data-label*="Ablage"]') ? target : target.closest('[data-label*="Ablage"]');
    const discardPiles     = document.querySelectorAll('.human-area [data-label*="Ablage"]');
    const discardPileIndex = Array.from(discardPiles).indexOf(actualDiscard);
    
    if (handleDiscardPileDrop(currentPlayer, selectedSource, selectedIndex, discardPileIndex)) {
      success = true;
      showMessage('Du hast eine Karte auf Ablagestapel gelegt');
      if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🎲🎲 Du hast eine Karte auf Ablagestapel gelegt 🎲🎲`);
      switchPlayer();
      showMessage('Karte auf Ablagestapel gelegt, Spieler wechselt');
    }
  }
  
  if (success) {
    selectedCard   = null;
    selectedSource = null;
    selectedIndex  = null;
    document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
    updateView();
    if (checkForWinner()) return; // FIX 3: Sofortiger Check nach einem erfolgreichen Build-Move
    setupTouchEvents();
  }
}

// =============================================================
// SPIELLOGIK & ZUGREGELN
// =============================================================
function getSourceType(element) {
  if (element.closest('.hand'))                return 'hand';
  if (element.closest('.stock'))               return 'stock';
  if (element.closest('[data-label*="Ablage"]')) return 'discard';
  return null;
}

function getSourceIndex(element) {
  if (element.closest('.hand')) {
    return Array.from(element.parentElement.children).indexOf(element);
  }
  if (element.closest('[data-label*="Ablage"]')) {
    const discardPiles = document.querySelectorAll('.human-area [data-label*="Ablage"]');
    return Array.from(discardPiles).indexOf(element.closest('[data-label*="Ablage"]'));
  }
  return 0.01;
}

function getJokerValue(buildPile, jokerPosition) {
  if (jokerPosition === 0) return 1;
  const previousCard = buildPile[jokerPosition - 1];
  return previousCard.type === 'joker'
    ? jokerPosition + 1
    : parseInt(previousCard.value) + 1;
}

function handleBuildPileDrop(player, sourceType, sourceIndex, buildPileIndex) {
  let card, sourceArray;
  
  switch (sourceType) {
    case 'hand':
      sourceArray = Game.players[player].hand;
      card        = sourceArray[sourceIndex];
      break;
    case 'stock':
      sourceArray = Game.players[player].stock;
      card        = sourceArray[sourceArray.length - 1];
      break;
    case 'discard':
      sourceArray = Game.players[player].discards[sourceIndex];
      if (sourceArray?.length > 0) {
        card = sourceArray[sourceArray.length - 1];
        if (KONFIG.DEBUG_46) {
          debugInfo.push(`📌46 Ablagestapel ${sourceIndex + 1}: ${card.value} gefunden`);
        }
      } else {
        if (KONFIG.DEBUG_46) {
          debugInfo.push(`📌46 Ablagestapel ${sourceIndex + 1} ist leer`);
        }
        return false;
      }
      break;
    default:
      if (KONFIG.DEBUG_46) {
        debugInfo.push(`📌46 Ungültiger sourceType ❌ Abbruch in Ablagestapel ${sourceIndex + 1}`);
      }
      return false;
  }
  
  if (!card) return false;
  if (isValidBuildMove(card, buildPileIndex)) {
    Game.buildPiles[buildPileIndex].push(card);
    if (sourceType === 'hand') sourceArray.splice(sourceIndex, 1);
    else sourceArray.pop();
    
    if (isBuildPileComplete(buildPileIndex)) clearBuildPile(buildPileIndex);
    return true;
  }
  return false;
}

function handleDiscardPileDrop(player, sourceType, sourceIndex, discardPileIndex) {
  if (!selectedCard && player === 'ai') {
    if (Game.players[player].hand.length > 0) {
      const criticalNumbers = getOpponentCriticalNumbers();
      let safestIndex = 0, lowestScore = Infinity;
      
      Game.players[player].hand.forEach((card, i) => {
        let score = 0;
        score += criticalNumbers.includes(card.value + 1) ? KONFIG.SCORE_37 : 0;
        
        if (KONFIG.DEBUG_37) {
          debugInfo.push(`📌37 🔒Blockade Karte: ${card.value} (${card.type}) Score⬆️+${KONFIG.SCORE_37} Gegnerhilfe ges.=🎉 ${score}`);
        }
        
        const stockTop = Game.players[player].stock.slice(-1)[0]?.value || 0;
        try {
          let calculatedValue = Math.abs(card.value - stockTop) * KONFIG.SCORE_38;
          if (!isNaN(calculatedValue) && isFinite(calculatedValue)) score += calculatedValue;
        } catch (error) {
          console.error('Fehler bei der Berechnung des Scores:', error);
        }
        
        if (KONFIG.DEBUG_38) {
          debugInfo.push(`📌38 Distanz↔️ zum eigenen Stock: Karte: ${card.value} (Stock-Top: ${stockTop}) Score-ges.=🎉 ${score}`);
        }
        
        try {
          let bonusValue = (card.type === 'joker') ? KONFIG.SCORE_33 : 0;
          if (!isNaN(bonusValue) && isFinite(bonusValue)) score += bonusValue;
        } catch (error) {
          console.error('Fehler bei der Berechnung des Joker-Bonus:', error);
        }
        
        if (KONFIG.DEBUG_33) {
          debugInfo.push(`📌33 Joker-Schutz: Karte: ${card.value} (Typ: ${card.type}) Score⬆️+${KONFIG.SCORE_33} ges.=🎉 ${score}`);
        }
        
        score += getDiscardSequenceBonus(player, discardPileIndex, card);
        if (score < lowestScore) { lowestScore = score; safestIndex = i; }
      });
      
      selectedCard = Game.players[player].hand[safestIndex];
      showMessage(`Automatische Ablage: Unnötigste Karte (${selectedCard.value}) gewählt.`);
      if (KONFIG.DEBUG_43) {
        debugInfo.push(`📌43 🎲🎲 Automatische Ablage: Unnötigste Karte (${selectedCard.value}) gewählt. 🎲🎲`);
      }
    } else {
      showMessage('Keine Karte verfügbar zum Ablegen.');
      return false;
    }
  }
  
  let card, sourceArray;
  switch (sourceType) {
    case 'hand':
      sourceArray = Game.players[player].hand;
      card        = sourceArray[sourceIndex];
      break;
    case 'stock':
      showMessage(`${player === 'human' ? 'Du' : 'KI'} kann keine Stockkarten in die Ablage legen.`);
      if (KONFIG.DEBUG_43) {
        debugInfo.push(`📌43 🎲🎲 ${player === 'human' ? 'Du' : 'KI'} kann keine Stockkarten in die Ablage legen. 🎲🎲`);
      }
      return false;
    default:
      return false;
  }
  
  if (card) {
    if (!Game.players[player].discards[discardPileIndex]) {
      Game.players[player].discards[discardPileIndex] = [];
    }
    Game.players[player].discards[discardPileIndex].push(card);
    if (sourceType === 'hand') sourceArray.splice(sourceIndex, 1);
    else sourceArray.pop();
    
    if (player === 'human') {
      trackGameObservations('opponentDiscard', { cardValue: card.value });
    }
    
    try {
      if (card?.value || card?.type === 'joker') {
        const key = card.type === 'joker' ? 'joker' : card.value;
        if (Game.tracking.deckComposition[key] > 0) Game.tracking.deckComposition[key]--;
        Game.tracking.discardHistory[player].values.push(key);
        Game.tracking.discardHistory[player].timestamps.push(Date.now());
      }
    } catch (e) {
      console.error('Discard Tracking Error:', e);
    }
    return true;
  }
  
  showMessage(`${player === 'human' ? 'Du' : 'KI'} konnte keine Karte ablegen.`);
  return false;
}

function drawCardsUntilFive(player) {
  while (Game.players[player].hand.length < 5 && Game.drawPile.length > 0) {
    const card  = Game.drawPile.pop();
    card.faceUp = player === 'human';
    Game.players[player].hand.push(card);
  }
  updateView();
}

function neededForStock(jokerValue) {
  return Game.players.ai.stock.some(
    card => card.type === 'number' && card.value === jokerValue
  );
}

function getOpponentCriticalNumbers() {
  const criticalNumbers = [];
  const humanStock      = Game.players.human.stock;
  if (humanStock.length > 0) {
    const topStockCard = humanStock[humanStock.length - 1];
    criticalNumbers.push(parseInt(topStockCard.value) + 1);
  }
  Game.players.human.discards.forEach(pile => {
    if (pile.length > 0) {
      const topDiscard = pile[pile.length - 1];
      criticalNumbers.push(parseInt(topDiscard.value) + 1);
    }
  });
  return [...new Set(criticalNumbers)];
}

async function evaluateAndSelectMove(player) {
  if (isGameOver) return false;
  const candidates = evaluateMoveCandidates(player);
  if (candidates.length === 0) return false;
  candidates.sort((a, b) => b.score - a.score);
  const bestCandidate = candidates[0];
  
  showMessage(
    `KI wählt Zug: Karte (${bestCandidate.card.value}) von ${bestCandidate.sourceType} ` +
    `für 🗑️Baustapel ${bestCandidate.buildPileIndex + 1} mit Score ${bestCandidate.score}.`
  );
  if (KONFIG.DEBUG_43) {
    debugInfo.push(`📌43 🎲🎲 KI wählt Zug: Karte (${bestCandidate.card.value}) von ${bestCandidate.sourceType} für 🗑️Baustapel ${bestCandidate.buildPileIndex + 1} mit Score ${bestCandidate.score}. 🎲🎲`);
  }
  
  await pauseForSeconds();
  if (isGameOver) return false;
  handleBuildPileDrop(player, bestCandidate.sourceType, bestCandidate.sourceIndex, bestCandidate.buildPileIndex);
  updateView();
  return true;
}

function canRemoveStockCard() {
  try {
    if (!Game?.players?.ai) return false;
    const stock = Game.players.ai.stock;
    if (!Array.isArray(stock) || stock.length === 0) return false;
    const topCard = stock[stock.length - 1];
    if (!topCard || !('value' in topCard)) return false;
    if (typeof topCard.removable === 'boolean' && !topCard.removable) return false;
    if (topCard.type === 'number') {
      const value = parseInt(topCard.value, 10);
      if (isNaN(value) || value < 1 || value > 12) return false;
    }
    if (typeof Game.stockCardIsRemovable === 'boolean' && Game.stockCardIsRemovable !== true) return false;
    return true;
  } catch (err) {
    return false;
  }
}

function evaluateMoveCandidates(player) {
  const humanStockPressure = Game.players.human.stock.length / 30;
  const remainingJokers    = Game.tracking.deckComposition.joker || 0;
  const nagel40 = KONFIG.SCORE_40, nagel41 = KONFIG.SCORE_41, nagel42 = KONFIG.SCORE_42;
  
  if (KONFIG.DEBUG_40) debugInfo.push(`📌40 ★Joker-Schwellenwert ges.=🎉 ${nagel40}`);
  if (KONFIG.DEBUG_41) debugInfo.push(`📌41 1500 Mindestbewertung bei nur ★Joker-Zügen ges.=🎉 ${nagel41}`);
  if (KONFIG.DEBUG_42) debugInfo.push(`📌42 0.8 ★Joker-Gewichtung⚖️ ges.=🎉 ${nagel42}`);
  
  const blockedStock = Math.max(0, 16 - Game.players.human.stock.length);
  const Nagel44      = KONFIG.SCORE_44 * Math.sqrt(blockedStock);
  if (KONFIG.DEBUG_44) {
    debugInfo.push(`📌44 Erhöht den Malus⬆️${KONFIG.SCORE_44}* flex wenn der Gegner wenig Karten♠️hat`);
    debugInfo.push(`📌44  Malus44 =🎉 ${Nagel44} 🎉`);
  }
  
  const candidates = [];
  const stockSize  = Game.players[player].stock.length;
  const stockTop   = Game.players[player].stock.slice(-1)[0]?.value;

  Game.players[player].hand.forEach((card, i) => {
    Game.buildPiles.forEach((pile, pileIndex) => {
      if (!isValidBuildMove(card, pileIndex)) return;
      let score = KONFIG.SCORE_5;
      if (KONFIG.DEBUG_5) {
        debugInfo.push(`📌5  Grundbonus gesetzt⬆️Grundbonus =🎉 ${score} 🎉`);
      }
      const gapSize   = calculateGapSize(pile, card) || 0;
      const futureRisk = calculateFutureRisk(card, pileIndex) || 0;
      let riskScore    = getOpponentBlockingPotential(card, pileIndex);
      
      if (KONFIG.DEBUG_50) {
        debugInfo.push(`📌50 RiskScore-ges.🔥: ${riskScore} von Karte ${card.value} 🟠🟢`);
        debugInfo.push(`📌50 Score-ges.🔥: ${score} von Karte ${card.value} 🟠🟢`);
        debugInfo.push(`📌50 🟢🟠Joker gelegt.🔥: ${Joker_auf_Ablage} 🟠🟢`);
      }
      if (card.value === '★') {
        if (KONFIG.DEBUG_50) debugInfo.push(`📌50a ★★Joker★★ Es wurde eine Karte ${card.value} erkannt.`);
        riskScore += KONFIG.SCORE_4_JOKER_MOVE;
      } else {
        if (KONFIG.DEBUG_50) debugInfo.push(`📌50a Kein Joker erkannt. Normale Punkteberechnung.`);
      }
      
      score += gapSize * KONFIG.SCORE_12;
      if (KONFIG.DEBUG_12) {
        debugInfo.push(`📌12 Score ⬆️+=GapSize*${KONFIG.SCORE_12} ⬆️Bonus pro 🗑️Lücke`);
        debugInfo.push(`📌12 🎉 Score-ges.=🎉 ${score} GapSize=🎉 ${gapSize} 🎉 futureRisk=🎉 ${futureRisk} 🎉 riskScore=🎉 ${riskScore} 🎉`);
      }
      score -= futureRisk;
      score -= riskScore;
      if (KONFIG.DEBUG_12) debugInfo.push(`📌12a 🎉 neuer Score-ges.=🎉 ${score}`);

      if (card.type === 'joker') {
        const jokerValue  = pile.length === 0 ? 1 : pile[pile.length - 1].value + 1;
        const matchesStock = stockTop && (jokerValue === stockTop || stockTop === undefined);
        if (pile.length < 5 && stockSize > 12 && !matchesStock) {
          try {
            if (canRemoveStockCard()) {
              riskScore -= KONFIG.SCORE_39;
              if (KONFIG.DEBUG_39) {
                debugInfo.push(`📌39 riskScore🔥⚠️ ⬇️-= ${KONFIG.SCORE_39}; Stockabbau Vorrang RiskScore-ges. = ${riskScore} ⚠️🟢`);
              }
            } else {
              const dynamicMalus = KONFIG.SCORE_6 * (1 - (Game.players.ai.stock.length / 20));
              score -= dynamicMalus;
              if (KONFIG.DEBUG_6) {
                debugInfo.push(`📌6  score ⬇️-= ${KONFIG.SCORE_6} Malus sinkt linear mit Stockabbau Score-ges =🎉 ${score}`);
              }
            }
          } catch (error) {
            console.error('Fehler in canRemoveStockCard (nagel39):', error);
            const dynamicMalus = KONFIG.SCORE_6 * (1 - (Game.players.ai.stock.length / 20));
            score -= dynamicMalus;
          }
        }
        if (matchesStock && (pile.length >= 5 || stockSize <= 10)) {
          const topHumanStock = Game.players.human.stock[Game.players.human.stock.length - 1]?.value || 1;
          score += (KONFIG.SCORE_7 + (2000 * (12 - topHumanStock)));
          if (KONFIG.DEBUG_7) debugInfo.push(`📌7 ⬆️+= ${KONFIG.SCORE_7} ✅ Score-ges. =🎉 ${score} 🎉`);
        }
        const futureValue = calculateJokerFutureValue(card, pileIndex) || 0;
        if (futureValue > 0) {
          score += futureValue * KONFIG.SCORE_8;
          if (KONFIG.DEBUG_8) {
            debugInfo.push(`📌8 future=🎉 ${futureValue} * ${KONFIG.SCORE_8}⬆️ Score-ges.=🎉 ${score}`);
          }
        }
      }
      candidates.push({ sourceType: 'hand', sourceIndex: i, card, buildPileIndex: pileIndex, score });
    });
  });

  const uniqueHandCandidates = [];
  const seenHandCandidates   = {};
  for (const candidate of candidates) {
    if (candidate.sourceType === 'hand') {
      const key = candidate.sourceIndex;
      if (!seenHandCandidates.hasOwnProperty(key) || seenHandCandidates[key].score < candidate.score) {
        seenHandCandidates[key] = candidate;
      }
    } else {
      uniqueHandCandidates.push(candidate);
    }
  }
  for (const key in seenHandCandidates) uniqueHandCandidates.push(seenHandCandidates[key]);
  const dedupedCandidates = uniqueHandCandidates;

  const stockCard = Game.players[player].stock.slice(-1)[0];
  if (stockCard) {
    Game.buildPiles.forEach((pile, pileIndex) => {
      if (isValidBuildMove(stockCard, pileIndex)) {
        const advancedPiles = Game.buildPiles.filter(p => p.length > 6).length;
        let score           = Math.min(KONFIG.SCORE_24, KONFIG.SCORE_10 + (KONFIG.SCORE_10_ADV * advancedPiles));
        if (KONFIG.DEBUG_10) {
          debugInfo.push(`📌10 📌11 Stockabbau beschleunigen Score-ges.=🎉 ${score} 🎉`);
        }
        dedupedCandidates.push({
          sourceType:    'stock',
          sourceIndex:   0,
          card:          stockCard,
          buildPileIndex: pileIndex,
          score
        });
      }
    });
  }

  Game.players[player].discards.forEach((pile, discardIndex) => {
    if (pile.length === 0) return;
    const card = pile[pile.length - 1];
    Game.buildPiles.forEach((buildPile, buildIndex) => {
      if (!isValidBuildMove(card, buildIndex)) return;
      let score       = KONFIG.SCORE_26;
      if (KONFIG.DEBUG_26) {
        debugInfo.push(`📌26 ⬆️= ${KONFIG.SCORE_26} Basispunkte für 🗄️Ablagestapelzug Score-ges.=🎉 ${score}`);
      }
      const Wertgroese = card.value;
      try {
        if (!isNaN(Wertgroese) && isFinite(Wertgroese)) {
          score += Wertgroese * 50;
        } else {
          score += KONFIG.SCORE_27;
          if (KONFIG.DEBUG_27) debugInfo.push(`📌27 Warnung: Joker oder ungültiger Wert. Jokerwert angewandt.`);
        }
        if (Wertgroese === '★' && KONFIG.DEBUG_27) {
          debugInfo.push(`📌27★ Wegen ★ wurde der Jokerwert angewandt`);
        }
      } catch (error) {
        score += KONFIG.SCORE_27;
      }
      if (Game.players[player].stock.some(s => s.value === card.value + 1)) {
        score += KONFIG.SCORE_23;
        if (KONFIG.DEBUG_23) {
          debugInfo.push(`📌23 ⬆️+= ${KONFIG.SCORE_23}; Discard-Stock-Synergy-Bonus🎉 Score-ges.=🎉 ${score}`);
        }
      }
      dedupedCandidates.push({
        sourceType:     'discard',
        sourceIndex:    discardIndex,
        card,
        buildPileIndex: buildIndex,
        score
      });
    });
  });

  const averageScore      = dedupedCandidates.reduce((sum, m) => sum + m.score, 0) / (dedupedCandidates.length || 1);
  const dynamicThreshold  = averageScore * nagel40;
  dedupedCandidates.forEach(move => { if (move.card.type === 'joker') move.score *= nagel42; });

  const hasValidNonJokerMove = dedupedCandidates.some(move => move.card.type !== 'joker' && move.score > 0);
  const filteredCandidates   = hasValidNonJokerMove
    ? dedupedCandidates.filter(move => {
        if (move.card.type === 'joker' && move.score < dynamicThreshold) {
          if (KONFIG.DEBUG_45) {
            debugInfo.push(`❌ ★Joker-Zug wird ignoriert – Wertung zu niedrig: ${move.score} Schwelle: ${dynamicThreshold}`);
          }
          return false;
        }
        return true;
      })
    : dedupedCandidates;

  if (!hasValidNonJokerMove && filteredCandidates.length > 0) {
    const onlyJoker    = filteredCandidates.every(move => move.card.type === 'joker');
    const bestJokerScore = Math.max(...filteredCandidates.map(move => move.score));
    if (onlyJoker && bestJokerScore < nagel41) {
      if (KONFIG.DEBUG_45) {
        debugInfo.push(`⏭ KI beendet ihren Zug – Kein sinnvoller ★Joker-Zug gefunden (beste Bewertung: ${bestJokerScore} Schwelle: ${dynamicThreshold})`);
      }
      Joker_auf_Ablage = true;
      if (KONFIG.DEBUG_51) debugInfo.push(`📌51 ★Joker in Ablage🗑️ gelegt`);
      return [];
    }
  }

  const enemyAnalysis = predictEnemyStock('human');
  const priorities    = calculateDynamicPriorities();
  filteredCandidates.forEach(move => {
    if (move.card.value === enemyAnalysis.nextExpected) {
      const nagel34 = Game.players.human.stock.length < 10 ? KONFIG.SCORE_34_HIGH : KONFIG.SCORE_34_LOW;
      move.score   += nagel34 * priorities.stockAttack;
      if (KONFIG.DEBUG_34) debugInfo.push(' 📌34 Erhöhung⬆️ von Stock-Angriff Basiswert ');
    }
    if (detectConsecutiveDiscards('human').includes(move.card.value)) {
      move.score += Math.round(KONFIG.SCORE_35 * priorities.seriesDisrupt);
      if (KONFIG.DEBUG_35) debugInfo.push(`📌35 🔗Serienunterbrechung🔗 Bonus =🎉 ${move.score}`);
    }
    move.score = Math.round(move.score * priorities.riskTaking);
  });
  
  return filteredCandidates.sort((a, b) => b.score - a.score);
}

function calculateJokerFutureValue(card, buildPileIndex) {
  let futureValue = 0;
  const buildPile = Game.buildPiles[buildPileIndex];
  let pileValue   = 1;
  
  if (buildPile.length > 0) {
    const topCard = buildPile[buildPile.length - 1];
    if (topCard) {
      pileValue = topCard.type === 'joker' ? buildPile.length : parseInt(topCard.value) + 1;
    } else {
      console.error('topCard ist undefiniert');
      pileValue = 1;
    }
  }
  
  if (isNaN(pileValue)) { console.error('Ungültiger pileValue:', pileValue); return 0.01; }
  const currentJokerValue = card.type === 'joker'
    ? getJokerValue(buildPile, buildPile.length)
    : pileValue;
    
  if (neededForStock(currentJokerValue)) {
    const progressiveBonus = KONFIG.SCORE_25 * (12 - currentJokerValue);
    futureValue += progressiveBonus;
    if (KONFIG.DEBUG_25) {
      debugInfo.push(`🟢("📌25") JOKER FUTURE: ${currentJokerValue} (+${progressiveBonus})`);
    }
  }
  
  for (let i = 1; i <= 5; i++) {
    const futureCardValue = pileValue + i;
    if (futureCardValue <= 12) futureValue++;
  }
  
  if (pileValue >= 8) {
    futureValue += KONFIG.SCORE_21A;
    if (KONFIG.DEBUG_21a) {
      debugInfo.push(`📌21a langfristige Planung ⬆️+= ${KONFIG.SCORE_21A} Future-ges.=🌟 ${futureValue}`);
    }
  }
  return futureValue;
}

async function playInDiscardPiles(player) {
  if (isGameOver) return;
  if (Game.players[player].hand.length === 0) {
    showMessage('KI hat keine Handkarten zum Ablegen.');
    await pauseForSeconds(1);
    return;
  }
  
  const opponentCritical = [
    Game.players.human.stock.slice(-1)[0]?.value,
    ...Game.players.human.discards.map(p => p[p.length - 1]?.value)
  ].filter(v => v !== undefined);
  
  const stockTop     = Game.players[player].stock.length > 0
    ? Game.players[player].stock[Game.players[player].stock.length - 1].value
    : null;
  const handCards    = Game.players[player].hand;
  const discardPiles = Game.players[player].discards;
  let bestDiscardIndex = -1, bestScore = -Infinity, mainMoveSuccess = false;
  const cardToPlay     = handCards[handCards.length - 1];
  const sourceIndex    = handCards.length - 1;
  const isJoker        = String(cardToPlay.value).toUpperCase() === 'JOKER';
  const isDangerousCard = opponentCritical.includes(cardToPlay.value);

  for (let i = 0; i < discardPiles.length; i++) {
    const pile    = discardPiles[i];
    const topCard = pile.length > 0 ? pile[pile.length - 1] : null;
    let score     = KONFIG.SCORE_13;
    
    if (KONFIG.DEBUG_13) {
      debugInfo.push(`📌13 Score = ${KONFIG.SCORE_13}; Fördert ⬆️🗑️Baustapel-Nutzung Score-ges.=🎉 ${score}`);
    }
    if (isDangerousCard) {
      score -= KONFIG.SCORE_14;
      if (KONFIG.DEBUG_14) debugInfo.push(`📌14 score ⬇️= ${KONFIG.SCORE_14} riskante Ablagen reduzieren Score-ges.=🎉 ${score}`);
      if (KONFIG.DEBUG_45) debugInfo.push(`DISCARD BLOCK: ${cardToPlay.value} ist gefährlich (📌14)`);
    }
    if (!topCard) {
      score += KONFIG.SCORE_16;
      if (KONFIG.DEBUG_16) {
        debugInfo.push(`📌16 Score ⬆️+= ${KONFIG.SCORE_16}; Bonus🎉 für leere 🗄️Ablagestapel Score-ges.=🎉 ${score}`);
      }
      if (stockTop && cardToPlay.value === stockTop - 1) score += 50;
    } else if (cardToPlay.value < topCard.value) {
      score += KONFIG.SCORE_17;
      if (KONFIG.DEBUG_17) {
        debugInfo.push(`📌17 score ⬆️+= ${KONFIG.SCORE_17}; Bonus🎉 für niedrigere Karten Score-ges.=🎉 ${score}`);
      }
      if (stockTop && cardToPlay.value === stockTop - 1) score += 50;
    }
    if (topCard && (cardToPlay.value === topCard.value - 1)) {
      score += KONFIG.SCORE_15;
      if (KONFIG.DEBUG_15) {
        debugInfo.push(`DISCARD SEQ: ${cardToPlay.value}→${topCard.value} (+${KONFIG.SCORE_15} um⬆️+20 ("📌15") Score-ges.=🎉 ${score}`);
      }
    }
    if (stockTop && cardToPlay.value === stockTop + 1) score += 300;
    score -= pile.length * KONFIG.SCORE_19;
    if (KONFIG.DEBUG_19) {
      debugInfo.push(`📌19 ⬇️-= * ${KONFIG.SCORE_19}; Malus pro 🗄️Ablagekarte macht große Stapel unattraktiv Score-ges.=🎉 ${score}`);
    }
    const pileHelpsOpponent = pile.some(c => opponentCritical.includes(c.value));
    if (pileHelpsOpponent) {
      const criticalStockPenalty = Game.players.human.stock.length <= 5 ? 3000 : 0;
      score -= KONFIG.SCORE_20 + criticalStockPenalty;
      if (Game.players.human.stock.length < 5) score -= KONFIG.SCORE_20;
      if (KONFIG.DEBUG_20) {
        debugInfo.push(`📌20 GEGNERHILFE: Stapel ⬇️🗑️ ${i + 1} (-${KONFIG.SCORE_20} ⛔ Score-ges.=🎉 ${score}`);
      }
    }
    if (score > bestScore) { bestScore = score; bestDiscardIndex = i; }
  }

  if (bestDiscardIndex >= 0 && handleDiscardPileDrop(player, 'hand', sourceIndex, bestDiscardIndex)) {
    mainMoveSuccess = true;
    showMessage(`KI legt ${cardToPlay.value} in Ablage ${bestDiscardIndex + 1}`);
    if (KONFIG.DEBUG_43) {
      debugInfo.push(`📌43 🎲🎲 KI legt ${cardToPlay.value} in Ablage ${bestDiscardIndex + 1} 🎲🎲`);
    }
    await pauseForSeconds(1);
    updateView();
    trackGameObservations('discardStrategy', {
      cardValue:       cardToPlay.value,
      wasDangerous:    isDangerousCard,
      stockFollowup:   (stockTop && cardToPlay.value === stockTop + 1),
      createdSequence: discardPiles[bestDiscardIndex]?.slice(-1)[0]?.value
    });
    if (checkForWinner()) return;
  } else {
    showMessage('Ablage fehlgeschlagen!');
    await pauseForSeconds(1);
  }

  if (mainMoveSuccess && !isGameOver) {
    const jokerIndex = Game.players[player].hand.findIndex(
      card => String(card.value).toUpperCase() === 'JOKER'
    );
    if (jokerIndex !== -1) {
      if (handleDiscardPileDrop(player, 'hand', jokerIndex, 3)) {
        showMessage(`KI legt zusätzlichen ★Joker in Ablage 4`);
        await pauseForSeconds(1);
        updateView();
        trackGameObservations('jokerAdditional', { cardValue: 'JOKER' });
        if (checkForWinner()) return;
      } else {
        showMessage('Ablage des zusätzlichen Jokers fehlgeschlagen!');
        await pauseForSeconds(1);
      }
    }
  }
}

async function aiTurn(rekursionstiefe = 0) {
  if (isGameOver) return; // FIX 2: Sofortiger Abbruch wenn das Spiel bereits beendet ist
  if (rekursionstiefe > 15) {
    console.warn('aiTurn: Maximale Rekursionstiefe (15) erreicht – Zug wird abgebrochen.');
    switchPlayer();
    return;
  }
  drawCardsUntilFive('ai');
  showMessage('KI bereitet Zug vor...');
  if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🎲🎲 KI bereitet Zug vor... 🎲🎲`);
  await pauseForSeconds(0.8);
  if (isGameOver) return;

  let score = 0;
  let moved = false, moveCount = 0, kein_zug_mehr = 0;
  showMessage('KI berechnet Zug...');
  await pauseForSeconds(0.5);
  if (isGameOver) return;

  const enemyAnalysis = predictEnemyStock('human');
  const priorities    = calculateDynamicPriorities();
  Game.buildPiles.forEach((pile, i) => {
    const element = document.querySelector(`.build-pile:nth-child(${i + 1})`);
    if (pile.slice(-1)[0]?.value === enemyAnalysis.nextExpected) {
      element.classList.add('ai-prediction-overlay');
      const tag           = document.createElement('div');
      tag.className       = 'strategy-tag';
      tag.textContent     = `⛔ Blockade ${enemyAnalysis.nextExpected} (${Math.round(enemyAnalysis.confidence * 100)}%)`;
      element.appendChild(tag);
    }
  });

  try {
    if (enemyAnalysis.confidence > 0.6) {
      moved = await executeStockAttack(enemyAnalysis.nextExpected);
      if (isGameOver) return;
    }
  } catch (e) {
    console.error('Stock Attack Failed:', e);
  }

  do {
    showMessage('KI analysiert mögliche Züge...');
    await pauseForSeconds(0.5);
    if (isGameOver) return;
    const candidates = evaluateMoveCandidates('ai');
    if (candidates.length === 0) {
      const stockCard     = Game.players.ai.stock.slice(-1)[0];
      let stockPlayable   = false;
      if (stockCard) {
        for (let j = 0; j < Game.buildPiles.length; j++) {
          if (!isValidBuildMove(stockCard, j)) continue;
          stockPlayable = true;
          showMessage(`KI legt Stockkarte (${stockCard.value}) auf Bau🗑️ ${j + 1}`);
          if (KONFIG.DEBUG_43) {
            debugInfo.push(`📌43 🎲🎲 KI legt Stockkarte (${stockCard.value}) auf Bau🗑️ ${j + 1} 🎲🎲`);
          }
          if (KONFIG.DEBUG_24) {
            debugInfo.push(` 📌24 score: ${KONFIG.SCORE_24} Stock-min`);
            debugInfo.push(`📌24-1 score ⬆️+= ${KONFIG.SCORE_24} Stockabbau Score-ges.=🎉 ${score}`);
          }
          await pauseForSeconds(1.2);
          if (isGameOver) return;
          if (handleBuildPileDrop('ai', 'stock', 0, j)) {
            moved = true;
            moveCount++;
            trackGameObservations('kiMove', {
              sourceType:     'stock',
              cardValue:      stockCard.value,
              cardType:       stockCard.type,
              buildPileIndex: j,
              score:          KONFIG.SCORE_24
            });
            if (moveCount >= 2) {
              showMessage('KI führt Kombinationszug aus...');
              if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🎲🎲 KI führt Kombinationszug aus... 🎲🎲`);
              await pauseForSeconds(0.8);
            }
          }
          break;
        }
      }
      if (!stockPlayable) {
        kein_zug_mehr = 1;
        if (stockCard && Game.buildPiles.some(pile => isValidBuildMove(stockCard, Game.buildPiles.indexOf(pile)))) {
          trackGameObservations('missedStock', { stockCardValue: stockCard.value });
        }
      }
      break;
    }
    candidates.sort((a, b) => b.score - a.score);
    const best      = candidates[0];
    const stockCard = Game.players.ai.stock.length > 0
      ? Game.players.ai.stock[Game.players.ai.stock.length - 1]
      : null;

    if (
      best.sourceType !== 'stock' &&
      stockCard &&
      stockCard.type !== 'joker' &&
      stockCard.value === best.card.value
    ) {
      if (KONFIG.DEBUG_31) {
        debugInfo.push(`📌31 KI priorisiert 🟢🟢🟢Stockkarte, da sie identisch ist mit der gewählten Karte aus ${best.sourceType}`);
      }
      if (handleBuildPileDrop('ai', 'stock', 0, best.buildPileIndex)) {
        if (KONFIG.DEBUG_32) {
          debugInfo.push(`📌32-1 score ⬆️+= ${KONFIG.SCORE_32}🟢🟢🟢 Stockabbau Score-ges.=🎉 ${score}`);
        }
        moved = true;
        moveCount++;
        trackGameObservations('kiMove', {
          sourceType:     'stock',
          cardValue:      stockCard.value,
          cardType:       stockCard.type,
          buildPileIndex: best.buildPileIndex,
          score:          KONFIG.SCORE_32
        });
        showMessage(`KI legt Stockkarte (${stockCard.value}) auf Bau🗑️ ${best.buildPileIndex + 1}`);
        if (KONFIG.DEBUG_43) {
          debugInfo.push(`📌43 🎲🎲 KI legt Stockkarte (${stockCard.value}) auf Bau🗑️ ${best.buildPileIndex + 1} 🎲🎲`);
        }
        if (KONFIG.DEBUG_32) {
          debugInfo.push(`📌32-2 score ⬆️+= ${KONFIG.SCORE_32}🟢🟢🟢 Stockabbau Score-ges.=🎉 ${score}`);
        }
        await pauseForSeconds(1.2);
      }
      if (isGameOver) return;
      aiTurn(rekursionstiefe + 1);
      return;
    }

    let sourceText = '';
    switch (best.sourceType) {
      case 'hand':    sourceText = `Handposition ${best.sourceIndex + 1}`; break;
      case 'stock':   sourceText = 'Stock-Stapel';                          break;
      case 'discard': sourceText = `Ablagestapel ${best.sourceIndex + 1}`; break;
    }
    showMessage(`KI spielt ${best.card.type === 'joker' ? '★Joker' : best.card.value} von ${sourceText} auf Bau🗑️ ${best.buildPileIndex + 1} (Strategie-Score: ${best.score})`);
    if (KONFIG.DEBUG_43) {
      debugInfo.push(`📌43 🎲🎲 KI spielt ${best.card.type === 'joker' ? '★Joker' : best.card.value} von ${sourceText} auf Bau🗑️ ${best.buildPileIndex + 1} (Strategie-Score: ${best.score}) 🎲🎲`);
    }
    await pauseForSeconds(1.2);
    if (isGameOver) return;
    if (handleBuildPileDrop('ai', best.sourceType, best.sourceIndex, best.buildPileIndex)) {
      moved = true;
      moveCount++;
      trackGameObservations('kiMove', {
        sourceType:     best.sourceType,
        cardValue:      best.card.value,
        cardType:       best.card.type,
        buildPileIndex: best.buildPileIndex,
        score:          best.score
      });
      if (moveCount >= 2) {
        showMessage('KI führt Kombinationszug aus...');
        if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🎲🎲 KI führt Kombinationszug aus... 🎲🎲`);
        await pauseForSeconds(0.8);
      }
    } else {
      kein_zug_mehr = 1;
      break;
    }
  } while (!kein_zug_mehr && !isGameOver);

  if (isGameOver) return;
  if (Game.players.ai.hand.length > 0) {
    showMessage('KI legt eine Karte auf den Ablagestapel...');
    if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🎲🎲 KI legt eine Karte auf den Ablagestapel.. 🎲🎲`);
    await pauseForSeconds(1);
    await playInDiscardPiles('ai');
  } else {
    showMessage('KI hat keine Handkarten zum Ablegen!');
  }
  
  if (isGameOver) return;
  if (Game.players.ai.hand.length < 5) {

    await pauseForSeconds(0.5);

  if (isGameOver) return;

  await pauseForSeconds(0.5);
  switchPlayer();
  document.querySelectorAll('.ai-prediction-overlay, .strategy-tag').forEach(el => el.remove());
  updateView();
}

async function executeStockAttack(targetValue) {
  if (isGameOver) return false;
  try {
    const validPiles = Game.buildPiles
      .map((pile, i) => ({ index: i, current: pile.slice(-1)[0]?.value || 0 }))
      .filter(pile => targetValue === 1 ? pile.current === 0 : pile.current === targetValue - 1);
      
    if (validPiles.length === 0) return false;
    const bestPile = validPiles.reduce((a, b) => a.current < b.current ? a : b);
    
    const validCards = [
      ...Game.players.ai.hand.map((c, i) => ({ card: c, type: 'hand', index: i })),
      { card: Game.players.ai.stock.slice(-1)[0], type: 'stock', index: 0 }
    ].filter(({ card }) => card && (card.value === targetValue || card.type === 'joker'));
    
    if (validCards.length === 0) return false;
    const bestCard = validCards.reduce((a, b) =>
      (a.card.type === 'joker' ? 1 : 0) - (b.card.type === 'joker' ? 1 : 0) ||
      b.card.value - a.card.value
    );
    
    const result = handleBuildPileDrop('ai', bestCard.type, bestCard.index, bestPile.index);
    debugInfo.push(`☢️💣 executeStockAttack Ergebnis: ${JSON.stringify(result)}`);
    return result === true;
  } catch (e) {
    console.error('Stock Attack Error:', e);
    return false;
  }
}

function calculateGapSize(pile, card) {
  if (!card || !card.value) return 0.01;
  const cardValue = parseInt(card.value, 10);
  if (!pile || pile.length === 0) return cardValue;
  const lastCard  = pile[pile.length - 1];
  const lastValue = parseInt(lastCard.value, 10);
  const gap       = cardValue - lastValue;
  return gap > 0 ? gap : 0;
}

function getDiscardSequenceBonus(player, discardIndex, newCard) {
  const pile = Game.players[player].discards[discardIndex];
  if (pile.length === 0) return 0.01;
  const topValue = pile[pile.length - 1].value;
  return (newCard.value === topValue - 1) ? 100 : 0;
}

function getOpponentBlockingPotential(card, buildPileIndex) {
  const opponentVisible  = [
    ...Game.players.human.stock.slice(-1),
    ...Game.players.human.discards.flat()
  ];
  let riskScore          = 0;
  const opponentStockSize = Game.players.human.stock.length;
  
  opponentVisible.forEach(oppCard => {
    if (oppCard.value === card.value + 1) {
      const stockFactor      = 1 - (Game.players.ai.stock.length / 20);
      const humanStockImpact = 1 + (15 - Game.players.human.stock.length) / 15;
      riskScore += KONFIG.SCORE_1 * stockFactor * humanStockImpact;
      if (KONFIG.DEBUG_1) {
        debugInfo.push(`📌1 riskScore⚠️ ⬆️+= ${KONFIG.SCORE_1} RiskScore-ges. = ${riskScore} 🟢`);
      }
      if (Game.players.ai.stock.length <= 5) {
        riskScore -= KONFIG.SCORE_2 * (6 - Game.players.ai.stock.length);
      }
      if (KONFIG.DEBUG_2) {
        debugInfo.push(`📌2  riskScore⚠️ ⬇️-= ${KONFIG.SCORE_2} RiskScore-ges. = ${riskScore} 🟢`);
      }
    }
    if (oppCard.value === card.value - 1) {
      riskScore += KONFIG.SCORE_28;
      if (KONFIG.DEBUG_28) {
        debugInfo.push(`📌28 riskScore⚠️ ⬆️+= ${KONFIG.SCORE_28}; Sequenzkontrolle RiskScore-ges. = ${riskScore} 🟢`);
      }
      if (opponentStockSize <= 3) riskScore += KONFIG.SCORE_29;
      if (KONFIG.DEBUG_29) {
        debugInfo.push(`📌29 riskScore⚠️ ⬆️+= ${KONFIG.SCORE_29}; Kritischer Malus RiskScore-ges. = ${riskScore} 🟢`);
      }
    }
    if (oppCard.type === 'joker' && card.value >= 5) {
      riskScore += KONFIG.SCORE_4_OPP_JOKER;
      if (KONFIG.DEBUG_4) {
        debugInfo.push(`📌4  riskScore⚠️ ⬆️+= ${KONFIG.SCORE_4_OPP_JOKER}; ★Joker-Risk-Malus (Gegner-Joker) RiskScore-ges. = ${riskScore} 🟢`);
      }
      if (opponentStockSize <= 3) riskScore += KONFIG.SCORE_30;
      if (KONFIG.DEBUG_30) {
        debugInfo.push(`📌30 riskScore⚠️ ⬆️+= ${KONFIG.SCORE_30}; Risky-Stock-★Joker-Schwelle RiskScore-ges. = ${riskScore} 🟢`);
      }
    }
  });

  opponentVisible.forEach((cardA, i) => {
    opponentVisible.slice(i + 1).forEach(cardB => {
      if (Math.abs(cardA.value - cardB.value) === 2) {
        if (card.value === (cardA.value + cardB.value) / 2) {
          riskScore += KONFIG.SCORE_3;
          if (KONFIG.DEBUG_3) {
            debugInfo.push(`📌3  riskScore⚠️ ⬆️+= ${KONFIG.SCORE_3} RiskScore-ges. = ${riskScore} 🟢`);
          }
        }
      }
    });
  });

  if (Joker_auf_Ablage === true) {
    delayWithCallback(10, () => {
      try {
        riskScore -= KONFIG.SCORE_49;
        if (KONFIG.DEBUG_49) {
          debugInfo.push('📌49 🔥⚠️In Ablage-Karte liegt ein Joker🔥🔥🔥');
          debugInfo.push(`📌49 riskScore🔥⚠️ ⬇️-= ${KONFIG.SCORE_49}; Stockabbau Vorrang RiskScore-ges. = ${riskScore} ⚠️🟢`);
        }
        Joker_auf_Ablage = false;
      } catch (error) {
        console.error('Ein Fehler ist bei getOpponentBlockingPotential aufgetreten:', error);
        debugInfo.push(`📌49 Fehler in getOpponentBlockingPotential: ${error.message}`);
        Joker_auf_Ablage = false;
      }
    });
  }
  if (KONFIG.DEBUG_50) {
    debugInfo.push(`📌50 Rücksprung aus Funktion RiskScore-ges.🔥: ${riskScore} von Karte ${card.value} 🟠🟢`);
  }
  return riskScore;
}

function calculateFutureRisk(card, pileIndex) {
  if (!card || !card.value) return 0.01;
  const cardValue  = parseInt(card.value, 10);
  const basisFaktor = 5;
  const indexFaktor = (pileIndex !== undefined) ? pileIndex : 0;
  return (12 - cardValue) * (basisFaktor + indexFaktor);
}

function enableDraggableStatusLabel() {
  const label = document.getElementById('status-label');
  label.style.fontSize   = '1.5rem';
  label.style.color      = 'black';
  label.style.textShadow = '-1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff';
  let isDragging = false, startY = 0, startTop = 0;
  
  function disableTransition() { label.style.transition = 'none'; }
  function enableTransition()  { label.style.transition = 'top 0.3s ease-out, transform 0.3s ease-out'; }
  function bounceEffect() {
    label.style.transform = 'scale(1.15)';
    setTimeout(() => { label.style.transform = 'scale(1)'; }, 300);
  }
  
  label.addEventListener('mousedown', function (e) {
    isDragging = true;
    startY     = e.clientY;
    startTop   = parseInt(window.getComputedStyle(label).top) || 0;
    disableTransition();
    e.preventDefault();
  });
  document.addEventListener('mousemove', function (e) {
    if (!isDragging) return;
    label.style.top = (startTop + (e.clientY - startY)) + 'px';
  });
  document.addEventListener('mouseup', function () {
    if (isDragging) { enableTransition(); bounceEffect(); }
    isDragging = false;
  });
  label.addEventListener('touchstart', function (e) {
    isDragging = true;
    startY     = e.touches[0].clientY;
    startTop   = parseInt(window.getComputedStyle(label).top) || 0;
    disableTransition();
    e.preventDefault();
  });
  document.addEventListener('touchmove', function (e) {
    if (!isDragging) return;
    label.style.top = (startTop + (e.touches[0].clientY - startY)) + 'px';
  });
  document.addEventListener('touchend', function () {
    if (isDragging) { enableTransition(); bounceEffect(); }
    isDragging = false;
  });
}

function pauseForSeconds(multiplier = 1) {
  return new Promise(resolve => {
    setTimeout(resolve, spielGeschwindigkeit * multiplier * 1000);
  });
}

function showMessage(message) {
  const statusLabel    = document.getElementById('status-label');
  statusLabel.textContent = message;
  statusLabel.style.minHeight = '40px';
}

document.addEventListener('DOMContentLoaded', () => {
  initGame();
  setupTouchEvents();
});

function isValidBuildMove(card, buildPileIndex) {
  const buildPile = Game.buildPiles[buildPileIndex];
  if (buildPile.length === 0) return card.type === 'joker' || parseInt(card.value) === 1;
  const topCard   = buildPile[buildPile.length - 1];
  const topValue  = topCard.type === 'joker' ? buildPile.length : parseInt(topCard.value);
  const cardValue = parseInt(card.value);
  return card.type === 'joker' || cardValue === (topValue + 1);
}

function isBuildPileComplete(buildPileIndex) {
  const buildPile = Game.buildPiles[buildPileIndex];
  if (buildPile.length === 0) return false;
  const topCard   = buildPile[buildPile.length - 1];
  return topCard.value === 12 || (topCard.type === 'joker' && buildPile.length === 12);
}

function clearBuildPile(buildPileIndex) {
  if (isBuildPileComplete(buildPileIndex)) {
    const clearedCards = Game.buildPiles[buildPileIndex];
    Game.buildPiles[buildPileIndex] = [];
    Game.drawPile = Game.drawPile.concat(clearedCards);
    shuffleDrawPile();
  }
}

function shuffleDrawPile() {
  for (let i = Game.drawPile.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [Game.drawPile[i], Game.drawPile[j]] = [Game.drawPile[j], Game.drawPile[i]];
  }
}

function showInfoWindow(event, discardPileIndex, player) {
  const infoWindow = document.getElementById('info-window');
  const infoTable  = document.getElementById('info-table');
  infoTable.innerHTML = '';
  const cards = Game.players[player].discards[discardPileIndex];
  
  if (cards && cards.length > 0) {
    cards.reverse().forEach(card => {
      const row  = document.createElement('tr');
      const cell = document.createElement('td');
      cell.textContent = card.type === 'joker' ? '*' : card.value;
      row.appendChild(cell);
      infoTable.appendChild(row);
    });
    const rect = event.target.getBoundingClientRect();
    infoWindow.style.left    = `${rect.left + window.scrollX}px`;
    infoWindow.style.top     = `${rect.top + window.scrollY - infoWindow.offsetHeight - 10}px`;
    infoWindow.style.display = 'block';
    setTimeout(() => { infoWindow.style.display = 'none'; }, 5000);
  }
}

function handleLongPress(event, discardPileIndex, player) {
  pressTimer = setTimeout(() => { showInfoWindow(event, discardPileIndex, player); }, 1000);
}
function handleRelease() { clearTimeout(pressTimer); }

function endGame(winner, loser, points) {
  if (isGameOver) return; // FIX 2: Doppelte End-Game Aufrufe verhindern
  isGameOver = true;
  const analysis = trackGameObservations('gameEnd', {
    winner:        winner,
    loserStockSize: Game.players[loser === 'KI' ? 'ai' : 'human'].stock.length
  });
  showEndGameMessage(winner, loser, points, analysis);
  const gc = document.querySelector('.game-container');
  if (gc) gc.style.pointerEvents = 'none';
}

function checkForWinner() {
  if (isGameOver) return true; // Wenn bereits beendet, True zurückgeben
  if (Game.players.human.stock.length === 0) {
    const aiPoints = Game.players.ai.stock.length * 5;
    endGame(playerName, 'KI', aiPoints);
    return true;
  }
  if (Game.players.ai.stock.length === 0) {
    const humanPoints = Game.players.human.stock.length * 5;
    endGame('KI', playerName, humanPoints);
    return true;
  }
  return false;
}

// =============================================================
// TRACKING & ANALYSE
// =============================================================
function trackGameObservations(eventType, data) {
  let storedData = JSON.parse(localStorage.getItem('skipbo_observations')) || { games: [], count: 0 };
  const maxGames = 10;
  let observations = { gameId: currentGameId };
  
  switch (eventType) {
    case 'discardStrategy':
      observations.type             = 'discardStrategy';
      observations.cardValue      = data.cardValue;
      observations.dangerous      = data.wasDangerous;
      observations.sequenceValue  = data.createdSequence;
      observations.timestamp      = Date.now();
      break;
    case 'jokerStrategicUse':
      observations.type        = 'jokerStrategicUse';
      observations.jokerValue  = data.jokerValue;
      observations.usedForStock = data.usedForStock;
      observations.buildPile   = data.buildPileIndex;
      observations.timestamp   = Date.now();
      break;
    case 'opponentBlock':
      observations.type         = 'opponentBlock';
      observations.blockedValue = data.blockedValue;
      observations.kiStockSize  = Game.players.ai.stock.length;
      observations.timestamp    = Date.now();
      break;
    case 'opponentDiscard':
      observations.type               = 'opponentDiscard';
      observations.cardValue         = data.cardValue;
      observations.opponentStockSize = Game.players.human.stock.length;
      observations.kiNextNeeded      = calculateKINextNeeded();
      observations.timestamp         = Date.now();
      break;
    case 'kiMove':
      observations.type            = 'kiMove';
      observations.sourceType      = data.sourceType;
      observations.cardValue       = data.cardValue;
      observations.isJoker         = data.cardType === 'joker';
      observations.buildPileIndex  = data.buildPileIndex;
      observations.stockSize       = Game.players.ai.stock.length;
      observations.timestamp       = Date.now();
      observations.helpedOpponent  =
        Game.players.human.stock.slice(-1)[0]?.value === data.cardValue + 1 ||
        Game.players.human.discards.some(p => p[p.length - 1]?.value === data.cardValue + 1);
      if (observations.isJoker) {
        if (KONFIG.DEBUG_48) {
          debugInfo.push(`📌48★ Joker gelegt auf Bau🗑️ ${observations.buildPileIndex + 1} (Score: ${data.score})`);
        }
      }
      if (observations.helpedOpponent) {
        if (KONFIG.DEBUG_48) {
          debugInfo.push(`Gegnerhilfe: KI legte ${observations.cardValue}, Gegner könnte ${observations.cardValue + 1} nutzen`);
        }
      }
      break;
    case 'missedStock':
      observations.type            = 'missedStock';
      observations.stockCardValue  = data.stockCardValue;
      observations.timestamp       = Date.now();
      if (KONFIG.DEBUG_45) {
        debugInfo.push(`Verpasster Stockzug: Stockkarte ${data.stockCardValue} hätte gelegt werden können`);
      }
      break;
    case 'gameEnd':
      observations.type          = 'gameEnd';
      observations.winner        = data.winner;
      observations.loserStockSize = data.loserStockSize;
      observations.timestamp     = Date.now();
      storedData.games.push(observations);
      storedData.count++;
      break;
    default:
      return null;
  }
  
  if (eventType !== 'gameEnd') storedData.games.push(observations);
  localStorage.setItem('skipbo_observations', JSON.stringify(storedData));
  
  if (eventType === 'gameEnd') {
    const currentGame      = storedData.games.filter(g => g.gameId === currentGameId);
    const currentAnalysis  = generateCurrentGameAnalysis(currentGame);
    const overallAnalysis  = generateOverallAnalysis(storedData.games);
    const debugSection     = generateDebugInfo();
    
    if (storedData.count >= maxGames) {
      localStorage.setItem('skipbo_observations', JSON.stringify({ games: [], count: 0 }));
    }
    currentGameId = Date.now();
    // FIX 1: debugInfo = []; wurde hier entfernt und stattdessen in initGame() platziert!
    return `${currentAnalysis}\n${overallAnalysis}\n${debugSection}`;
  }
  return null;
}

function calculateKINextNeeded() {
  return Game.buildPiles.map(pile => {
    if (pile.length === 0) return 1;
    return pile[pile.length - 1].type === 'joker'
      ? pile.length + 1
      : pile[pile.length - 1].value + 1;
  });
}

function predictEnemyStock(opponent) {
  try {
    const visible = [
      ...Game.players[opponent].discards.flat(),
      ...Game.buildPiles.flat(),
      ...Game.players[opponent].hand
    ]
    .filter(c => c)
    .map(c => c.type === 'joker' ? 'joker' : c.value);
    
    const total  = 144 - visible.length;
    const probs  = Object.entries(Game.tracking.deckComposition).map(([k, v]) => ({
      value: k,
      prob:  (v - visible.filter(x => x == k).length) / total
    }));
    const best   = probs.reduce((a, b) => a.prob > b.prob ? a : b);
    return {
      nextExpected: best.value === 'joker' ? null : parseInt(best.value),
      confidence:   best.prob
    };
  } catch {
    return { nextExpected: 1, confidence: 0.5 };
  }
}

function detectConsecutiveDiscards(player) {
  const values = Game.tracking.discardHistory[player].values
    .filter(v => v !== 'joker' && typeof v === 'number');
  const series = [];
  for (let i = 0; i < values.length - 2; i++) {
    if (values[i + 1] === values[i] + 1 && values[i + 2] === values[i] + 2) {
      series.push(values[i] + 1);
    }
  }
  return [...new Set(series)];
}

function calculateDynamicPriorities() {
  const phase      = 1 - (Game.drawPile.length / 144);
  const enemyStock = Game.players.human.stock.slice(-1)[0]?.value || 1;
  return {
    stockAttack:  Math.min(1.5, (12 - enemyStock) / 10 * phase),
    seriesDisrupt: 0.4 + (Game.tracking.discardHistory.human.values.length * 0.03),
    riskTaking:   phase < 0.3 ? 0.8 : phase < 0.7 ? 1.0 : 1.3
  };
}

function generateCurrentGameAnalysis(currentGame) {
  let analysis      = 'Auswertung des aktuellen Spiels:\n';
  const blocks      = currentGame.filter(g =>
    g.type === 'opponentDiscard' && g.kiNextNeeded.includes(g.cardValue)
  ).length;
  analysis         += `Gegnerblockaden: ${blocks} Mal hat der Gegner eine benötigte Karte gelegt.\n`;
  const jokerUses  = currentGame.filter(g => g.type === 'kiMove' && g.isJoker).length;
  const earlyJoker = currentGame.filter(g => g.type === 'kiMove' && g.isJoker && g.buildPileIndex < 2).length;
  analysis        += `Joker-Nutzung: ${jokerUses} Mal eingesetzt, davon ${earlyJoker} auf niedrigen Stapeln (< 2).\n`;
  const stockMoves  = currentGame.filter(g => g.type === 'kiMove' && g.sourceType === 'stock').length;
  analysis         += `Stockabbau: ${stockMoves} Stockkarten erfolgreich gelegt.\n`;
  const missedStock = currentGame.filter(g => g.type === 'missedStock').length;
  analysis         += `Verpasste Stockzüge: ${missedStock} Mal hätte eine Stockkarte gelegt werden können.\n`;
  const helpedOpponent = currentGame.filter(g => g.type === 'kiMove' && g.helpedOpponent).length;
  analysis            += `Gegnerhilfe: ${helpedOpponent} Mal hat die KI dem Gegner geholfen.\n`;
  const gameEnd = currentGame.find(g => g.type === 'gameEnd');
  analysis     += `Ergebnis: ${gameEnd.winner} hat gewonnen, Verlierer hatte ${gameEnd.loserStockSize} Stockkarten.\n`;
  return analysis;
}

function generateOverallAnalysis(games) {
  let analysis      = 'Gesamtbewertung (bisherige Spiele):\n';
  const blocks      = games.filter(g =>
    g.type === 'opponentDiscard' && g.kiNextNeeded.includes(g.cardValue)
  ).length;
  analysis         += `Gegnerblockaden: ${blocks} Mal hat der Gegner eine benötigte Karte gelegt.\n`;
  const jokerUses  = games.filter(g => g.type === 'kiMove' && g.isJoker).length;
  const earlyJoker = games.filter(g => g.type === 'kiMove' && g.isJoker && g.buildPileIndex < 2).length;
  analysis        += `Joker-Nutzung: ${jokerUses} Mal eingesetzt, davon ${earlyJoker} auf niedrigen Stapeln (< 2).\n`;
  const stockMoves  = games.filter(g => g.type === 'kiMove' && g.sourceType === 'stock').length;
  analysis         += `Stockabbau: ${stockMoves} Stockkarten erfolgreich gelegt.\n`;
  const missedStock = games.filter(g => g.type === 'missedStock').length;
  analysis         += `Verpasste Stockzüge: ${missedStock} Mal hätte eine Stockkarte gelegt werden können.\n`;
  const helpedOpponent = games.filter(g => g.type === 'kiMove' && g.helpedOpponent).length;
  analysis            += `Gegnerhilfe: ${helpedOpponent} Mal hat die KI dem Gegner geholfen.\n`;
  const totalGames = games.filter(g => g.type === 'gameEnd').length;
  const wins       = games.filter(g => g.type === 'gameEnd' && g.winner === 'KI').length;
  analysis        += `Spiele gewonnen: ${wins} von ${totalGames} (max. 10).\n`;
  return analysis;
}

function generateDebugInfo() {
  let debugSection = 'Debug-Informationen (aktuelles Spiel):\n';
  if (debugInfo.length === 0) {
    debugSection += 'Keine spezifischen Debug-Informationen verfügbar.\n';
  } else {
    debugInfo.forEach(info => { debugSection += `- ${info}\n`; });
  }
  return debugSection;
}

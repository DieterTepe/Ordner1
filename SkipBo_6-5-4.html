<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
             user-scalable=no, viewport-fit=cover"
  >
  <meta name="theme-color"                             content="#1B5E20">
  <meta name="apple-mobile-web-app-capable"            content="yes">
  <meta name="apple-mobile-web-app-status-bar-style"   content="black-translucent">
  <title>Skip-Bo Mobile v6.5.4</title>

  <style>
    /* ============================================================ */
    /* BASIS-RESET & BOX-SIZING                                     */
    /* ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin:      0;
      padding:     0;
      height:      100%;
      width:       100%;
      background:  #1B5E20;
      color:       white;
      font-family: Arial, sans-serif;
      overflow:    hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ============================================================ */
    /* INFOLABEL – vollbreitig, fixiert, verschiebbar               */
    /* ============================================================ */
    #status-label {
      position:        fixed;
      top:             0;
      left:            0;
      width:           100%;
      max-width:       100%;
      background:      rgba(46, 125, 50, 0.94);
      padding:         8px 10px;
      text-align:      center;
      font-size:       0.95rem;
      font-weight:     500;
      z-index:         1000;
      cursor:          grab;
      user-select:     none;
      box-shadow:      0 3px 8px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      border-bottom:   1px solid rgba(255, 255, 255, 0.2);
      border-radius:   0 0 8px 8px;
      white-space:     nowrap;
      overflow:        hidden;
      text-overflow:   ellipsis;
      transform:       none;
    }

    #status-label:active {
      cursor: grabbing;
    }

    /* ============================================================ */
    /* GAME CONTAINER – 9:16-Proportion, responsive                 */
    /* ============================================================ */
    .game-container {
      aspect-ratio:    9 / 16;
      height:          100dvh;
      width:           min(100vw, calc(100dvh * 9 / 16));
      margin:          0 auto;
      background:      transparent;
      display:         flex;
      flex-direction:  column;
      overflow:        hidden;
      padding-top:     42px; /* Platz für fixierten Infobalken */
      position:        relative;
    }

    /* ============================================================ */
    /* BEREICHE – exakte Flex-Verteilung für 5 gleiche Kartenreihen */
    /* ============================================================ */
    .opponent-area {
      flex:           2;
      display:        flex;
      flex-direction: column;
      gap:            4px;
      padding:        4px 4px 2px;
      min-height:     0;
    }

    .build-area {
      flex:             1;
      display:          flex;
      flex-direction:   column;
      justify-content:  center;
      padding:          4px;
      min-height:       0;
    }

    .human-area {
      flex:           2;
      display:        flex;
      flex-direction: column;
      gap:            4px;
      padding:        2px 4px 4px;
      min-height:     0;
    }

    /* ============================================================ */
    /* REIHEN & HÄNDE – je 1/5 der verfügbaren Höhe                 */
    /* ============================================================ */
    .main-piles,
    .hand {
      flex:                    1;
      min-height:              0;
      display:                 grid;
      grid-template-columns:   repeat(5, 1fr);
      gap:                     4px;
      align-items:             center;
      justify-items:           center;
      width:                   100%;
    }

    /* ============================================================ */
    /* KARTEN & FELDER                                              */
    /* ============================================================ */
    .field {
      background:      rgba(255, 255, 255, 0.1);
      border:          2px dashed #fff;
      border-radius:   8px;
      display:         flex;
      justify-content: center;
      align-items:     center;
      position:        relative;
      overflow:        hidden;
      perspective:     1000px;
      width:           100%;
      height:          100%;
    }

    .card {
      border:          2px solid #000 !important;
      border-radius:   8px;
      aspect-ratio:    2 / 3;
      width:           100% !important;
      height:          auto !important;
      max-height:      100%;
      margin:          auto;
      display:         flex;
      flex-direction:  column;
      justify-content: space-between;
      padding:         5px;
      position:        relative;
      transform-style: preserve-3d;
      transition:      transform 0.5s, box-shadow 0.5s;
      box-shadow:      0 0 5px #000000, 0 0 15px #000000 inset;
      background:      radial-gradient(circle, rgba(255,255,255,0.1), rgba(255,255,255,0.8));
    }

    .card.selected {
      transform: translateY(-40px) rotateY(15deg) rotateX(10deg);
      animation:
        neon-pulse  1.5s infinite alternate,
        card-float  2s   infinite;
    }

    .card.backface {
      background: lightgreen !important;
      animation:  card-glow 2s ease-in-out infinite alternate;
    }

    .card.backface::before {
      content:         "SKIP-BO";
      position:        absolute;
      top:             50%;
      left:            50%;
      transform:       translate(-50%, -50%) rotate(-45deg);
      font-size:       1.5rem;
      font-weight:     bold;
      color:           rgba(255, 255, 255, 0.8);
      text-shadow:     2px 2px 4px rgba(0, 0, 0, 0.5);
      letter-spacing:  2px;
    }

    .card-corner {
      position:    absolute;
      font-size:   1.2rem;
      font-weight: bold;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }
    .card-corner.top-left     { top: 5px;    left:  5px; }
    .card-corner.top-right    { top: 5px;    right: 5px; }
    .card-corner.bottom-left  { bottom: 5px; left:  5px; transform: rotate(180deg); }
    .card-corner.bottom-right { bottom: 5px; right: 5px; transform: rotate(180deg); }

    .card-middle {
      position:    absolute;
      top:         50%;
      left:        50%;
      transform:   translate(-50%, -50%);
      font-size:   2rem;
      font-weight: bold;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
    }

    .human-area    .field.stock .card,
    .opponent-area .field.stock .card,
    .build-area    .field.draw-pile .card {
      width:      100%;
      height:     auto;
      max-height: 100%;
    }

    /* ============================================================ */
    /* KARTENFARBEN                                                  */
    /* ============================================================ */
    .card:not(.backface)[data-value="1"],
    .card:not(.backface)[data-value="2"],
    .card:not(.backface)[data-value="3"],
    .card:not(.backface)[data-value="4"] {
      background: radial-gradient(
        circle,
        #BBDEFB, #64B5F6, #2196F3, #0D47A1
      ) !important;
      box-shadow: 0 0 15px #2196F3;
    }

    .card:not(.backface)[data-value="5"],
    .card:not(.backface)[data-value="6"],
    .card:not(.backface)[data-value="7"],
    .card:not(.backface)[data-value="8"] {
      background: radial-gradient(
        circle,
        #C8E6C9, #81C784, #4CAF50, #1B5E20
      ) !important;
      box-shadow: 0 0 15px #4CAF50;
    }

    .card:not(.backface)[data-value="9"],
    .card:not(.backface)[data-value="10"],
    .card:not(.backface)[data-value="11"],
    .card:not(.backface)[data-value="12"] {
      background: radial-gradient(
        circle,
        #FFCDD2, #EF9A9A, #f44336, #B71C1C
      ) !important;
      box-shadow: 0 0 15px #f44336;
    }

    .card:not(.backface)[data-type="joker"] {
      background: radial-gradient(
        circle,
        #FFF9C4, yellow, gold, #FFD700
      ) !important;
      color:      #000;
      box-shadow: 0 0 15px gold;
    }

    /* ============================================================ */
    /* ANIMATIONEN                                                   */
    /* ============================================================ */
    @keyframes card-glow {
      from { box-shadow: 0 0  5px #1565C0; }
      to   { box-shadow: 0 0 15px #0D47A1; }
    }

    @keyframes neon-pulse {
      from {
        box-shadow:
          0 0 10px #FFD700, 0 0 20px #FFD700,
          0 0 30px #FFD700, 0 0 40px #FFD700;
      }
      to {
        box-shadow:
          0 0 20px #FFD700, 0 0 30px #FFD700,
          0 0 40px #FFD700, 0 0 50px #FFD700;
      }
    }

    @keyframes card-float {
      0%   { transform: translateY(   0); }
      50%  { transform: translateY(-20px); }
      100% { transform: translateY(   0); }
    }

    @keyframes card-drop {
      0%   { transform: translateY(-40px) rotateY(15deg) rotateX(10deg); }
      100% { transform: translateY(   0)  rotateY( 0deg) rotateX( 0deg); }
    }

    /* ============================================================ */
    /* LABEL-STILE & INFO-FENSTER                                    */
    /* ============================================================ */
    .field::after {
      content:       attr(data-label);
      position:      absolute;
      bottom:        4px;
      left:          2px;
      right:         2px;
      font-size:     0.65rem;
      color:         rgba(255, 255, 255, 0.9);
      text-align:    center;
      padding:       2px;
      background:    rgba(0, 0, 0, 0.4);
      border-radius: 3px;
    }

    .field.card.selected {
      box-shadow: 0 0 15px #FFD700, 0 0 30px #FFD700 inset;
      transform:  translateY(-40px) rotateY(15deg) rotateX(10deg) scale(1.05);
      animation:
        neon-pulse 1.5s infinite alternate,
        card-float 2s   infinite;
      transition: all 0.3s ease;
    }

    .field.card.placed {
      animation: card-drop 1s forwards;
    }

    .field.card {
      transition:   all 0.3s ease;
      touch-action: manipulation;
    }

    .joker-number {
      position:         absolute;
      top:              5px;
      left:             50%;
      transform:        translateX(-50%);
      font-size:        0.8em;
      color:            black;
      background-color: rgba(255, 255, 255, 0.8);
      padding:          1px 3px;
      border-radius:    2px;
    }

    #info-window {
      position:      absolute;
      top:           -300px;
      left:          50%;
      transform:     translateX(-50%);
      background:    #000;
      color:         white;
      padding:       15px;
      text-align:    center;
      font-size:     1.2rem;
      z-index:       1001;
      box-shadow:    0 4px 8px rgba(0, 0, 0, 0.2);
      width:         80%;
      max-width:     600px;
      display:       none;
    }

    #info-table {
      width:           100%;
      border-collapse: collapse;
      margin:          0 auto;
    }

    #info-table td {
      border:     1px solid #ddd;
      padding:    8px;
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
    }

    .stock-count {
      position:         absolute;
      top:              5px;
      left:             50%;
      transform:        translateX(-50%);
      font-size:        0.8em;
      color:            black;
      background-color: rgba(255, 255, 255, 0.8);
      padding:          1px 3px;
      border-radius:    2px;
      z-index:          1;
    }

    /* ============================================================ */
    /* KI-OVERLAYS & STRATEGIE-TAGS                                  */
    /* ============================================================ */
    .ai-prediction-overlay {
      position:       absolute;
      top:            -2px;
      left:           -2px;
      right:          -2px;
      bottom:         -2px;
      border:         2px solid #ff4444;
      border-radius:  8px;
      animation:      prediction-pulse 1.8s ease-in-out infinite;
      pointer-events: none;
      z-index:        999;
      box-shadow:     0 0 12px rgba(255, 68, 68, 0.3);
    }

    @keyframes prediction-pulse {
      0%   { opacity: 0.4; transform: scale(0.98); }
      50%  { opacity: 0.9; transform: scale(1.02); }
      100% { opacity: 0.4; transform: scale(0.98); }
    }

    .strategy-tag {
      position:        absolute;
      bottom:          calc(100% + 5px);
      left:            50%;
      transform:       translateX(-50%);
      background:      rgba(40, 40, 40, 0.9);
      color:           #fff;
      padding:         4px 12px;
      border-radius:   15px;
      font-size:       0.85em;
      font-weight:     bold;
      white-space:     nowrap;
      backdrop-filter: blur(2px);
      z-index:         1001;
      box-shadow:      0 3px 6px rgba(0, 0, 0, 0.2);
    }

</head>

// ================================================================

// ================================================================

/**
 * initGame() – Haupteinstiegspunkt für ein neues Spiel.
 * Ruft alle Initialisierungsfunktionen in der richtigen Reihenfolge auf.
 * Setzt alle globalen Variablen zurück, baut das Deck auf und verteilt Karten.
 */
async function initGame() {
  resetGameState();
  loadSavedSpeed();
  buildDeck();
  shuffleDeck(Game.deck);
  dealCards();
  initTracking();

  // KI-Startkarten ziehen (5 Handkarten)
  drawCardsUntilFive('ai');

  // UI aufbauen und erste Anzeige
  updateView();
  showMessage('🎮 Spiel gestartet – du bist am Zug!');
  enableDraggableStatusLabel();
  showOverlay();
  setupTouchEvents();

  // Alte Strategie-Overlays entfernen
  document.querySelectorAll('.strategy-tag, .ai-prediction-overlay').forEach(el => el.remove());

  // Falls KI als erstes dran ist (derzeit immer 'human' zuerst)
  if (currentPlayer === 'ai') setTimeout(() => aiTurn(0), 3000);
}

/**
 * loadSavedSpeed() – Gespeicherte Spielgeschwindigkeit aus localStorage laden.
 */
function loadSavedSpeed() {
  try {
    const savedSpeed = localStorage.getItem('skipbo-speed');
    if (savedSpeed) spielGeschwindigkeit = parseInt(savedSpeed);
  } catch (e) {
    console.error('⚠️ Fehler beim Laden der Spielgeschwindigkeit:', e);
  }
}

/**
 * buildDeck() – Deck aufbauen: 12 Sätze × 12 Zahlenkarten + 12 Joker.
 * Gesamtkarten: 144 + 12 = 156 Karten.
 */
function buildDeck() {
  Game.deck = [];
  // 12 Sätze mit je den Werten 1-12
  for (let s = 0; s < 12; s++) {
    for (let n = 1; n <= 12; n++) {
      Game.deck.push({ type: 'number', value: n });
    }
  }
  // 12 Joker-Karten
  for (let j = 0; j < 12; j++) {
    Game.deck.push({ type: 'joker', value: '★' });
  }
}

/**
 * shuffleDeck(arr) – Fisher-Yates Algorithmus für zuverlässiges Mischen.
 * Mischt das übergebene Array in-place.
 * @param {Array} arr – Das zu mischende Array
 */
function shuffleDeck(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/**
 * dealCards() – Karten an Spieler verteilen.
 * Spieler: 5 Handkarten + 20 Stockkarten.
 * KI: 5 Handkarten + 20 Stockkarten.
 * Rest: Nachziehstapel.
 */
function dealCards() {
  Game.players.human.hand  = Game.deck.splice(0,  5);
  Game.players.ai.hand     = Game.deck.splice(0,  5);
  Game.players.human.stock = Game.deck.splice(0, 20);
  Game.players.ai.stock    = Game.deck.splice(0, 20);
  Game.drawPile            = Game.deck; // Rest = Nachziehstapel

  // Sichtbarkeit: Spieler sieht seine Karten, KI-Karten sind verdeckt
  Game.players.human.hand.forEach(card => card.faceUp = true);
  Game.players.ai.hand.forEach(card   => card.faceUp = false);
}

/**
 * initTracking() – KI-Tracking-Struktur initialisieren.
 * Verfolgt Deck-Zusammensetzung und Ablage-Historie für KI-Vorhersagen.
 */
function initTracking() {
  Game.tracking = {
    // Verbleibende Karten im Nachziehstapel (Wahrscheinlichkeitsrechnung)
    deckComposition: Array.from({ length: 12 }, () => 12).concat(Array(12).fill('joker')),
    // Ablage-Historie beider Spieler (für detectConsecutiveDiscards)
    discardHistory: {
      human: { values: [], timestamps: [] },
      ai:    { values: [], timestamps: [] }
    },
    // Stock-Vorhersagen (für predictEnemyStock)
    stockPredictions: {
      human: { nextExpected: 1, confidence: 0 },
      ai:    { nextExpected: 1, confidence: 0 }
    }
  };
}

/**
 * enableDraggableStatusLabel() – Infozeile per Touch und Maus verschiebbar machen.
 * Bounce-Effekt beim Loslassen. Funktioniert auf Mobile und Desktop.
 */
function enableDraggableStatusLabel() {
  const label = document.getElementById('status-label');
  if (!label) return;

  label.style.fontSize   = '1.5rem';
  label.style.color      = 'black';
  label.style.textShadow = '-1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff';

  let isDragging = false, startY = 0, startTop = 0;

  const disableTransition = () => { label.style.transition = 'none'; };
  const enableTransition  = () => { label.style.transition = 'top 0.3s ease-out, transform 0.3s ease-out'; };
  const bounceEffect      = () => {
    label.style.transform = 'scale(1.15)';
    setTimeout(() => { label.style.transform = 'scale(1)'; }, 300);
  };

  // Maus-Events
  label.addEventListener('mousedown', e => {
    isDragging = true;
    startY     = e.clientY;
    startTop   = parseInt(window.getComputedStyle(label).top) || 0;
    disableTransition();
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    label.style.top = (startTop + (e.clientY - startY)) + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (isDragging) { enableTransition(); bounceEffect(); }
    isDragging = false;
  });

  // Touch-Events
  label.addEventListener('touchstart', e => {
    isDragging = true;
    startY     = e.touches[0].clientY;
    startTop   = parseInt(window.getComputedStyle(label).top) || 0;
    disableTransition();
    e.preventDefault();
  });
  document.addEventListener('touchmove', e => {
    if (!isDragging) return;
    label.style.top = (startTop + (e.touches[0].clientY - startY)) + 'px';
  });
  document.addEventListener('touchend', () => {
    if (isDragging) { enableTransition(); bounceEffect(); }
    isDragging = false;
  });
}

    - Karte antippen = Karte auswählen (leuchtet auf).<br>

    - Zielstapel antippen = Karte dorthin legen.<br>
    - Infoleiste verschieben für optimale Sicht.</p>

    <p><strong>7. Spielgeschwindigkeit:</strong><br>
    - Schieberegler: 0s (sehr schnell) bis 20s (sehr langsam).<br>
    - Standard: 4s. Für KI-Analyse empfehlen sich 6–10s.</p>

    <p><strong>8. Spielende:</strong><br>
    - Wer zuerst seinen Stock leer hat, gewinnt.<br>
    - Verlierer erhält 5 Punkte pro verbleibender Stockkarte.</p>

    <p><strong>9. Hinweise:</strong><br>
    - 5 Sekunden drücken: Dieses Info-Fenster erneut öffnen.<br>
    - Infoleiste nach unten schieben für mehr Platz.</p>
  `;
}

  document.addEventListener('touchend',   () => { clearTimeout(pressTimer); });

/**
 * setupTouchEvents() – Karten-Klick und Ablage-Events binden.
 * Wird nach jedem Spielzug erneut aufgerufen da die DOM-Elemente
 * durch innerHTML-Erneuerung ihre Event-Listener verlieren.
 * Wird nicht ausgeführt wenn das Spiel bereits beendet ist.
 */
function setupTouchEvents() {
  if (isGameOver) return;

  // Alle Karten: Klick zum Auswählen
  document.querySelectorAll('.card').forEach(card => {
    card.onclick = handleCardSelect;
  });

  // Baustapel und Spieler-Ablagestapel: Klick zum Ablegen
  document.querySelectorAll('.build-pile, .human-area [data-label*="Ablage"]').forEach(field => {
    field.onclick = handleCardPlace;
  });

  // Status-Label: Long-Press für Info-Overlay (1 Sekunde)
  const statusLabel = document.getElementById('status-label');
  if (statusLabel) {
    statusLabel.ontouchstart = () => {
      longPressTimer = setTimeout(() => {
        showOverlay();
        if (navigator.vibrate) navigator.vibrate(50);
      }, 1000);
    };
    statusLabel.ontouchend  = () => clearTimeout(longPressTimer);
    statusLabel.ontouchmove = () => clearTimeout(longPressTimer);
  }
}

/**
 * handleCardSelect(event) – Karte des Spielers auswählen oder Auswahl aufheben.
 * Verhindert Auswahl von Baustapel-Karten (diese werden direkt als Ziel behandelt).
 * @param {Event} event – Click oder Touch-Event
 */
function handleCardSelect(event) {
  if (isGameOver) return;

  // Klick auf Baustapel-Karte → als Ablege-Ziel behandeln wenn Karte ausgewählt
  if (event.currentTarget.closest('.build-pile')) {
    if (selectedCard) handleCardPlace(event);
    return;
  }

  event.preventDefault();
  if (currentPlayer !== 'human') return;

  // Alle Markierungen entfernen
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));

  const cardElement = event.currentTarget;

  // Gleiche Karte nochmals antippen → Auswahl aufheben
  if (selectedCard === cardElement) {
    selectedCard  = null;
    selectedSource = null;
    selectedIndex  = null;
    showMessage('❌ Auswahl aufgehoben');
    return;
  }

  // Karte markieren und Quelle ermitteln
  cardElement.classList.add('selected');
  selectedCard   = cardElement;
  selectedSource = getSourceType(cardElement);
  selectedIndex  = getSourceIndex(cardElement);

  const sourceLabel = selectedSource === 'hand'    ? '✋ Hand'
                    : selectedSource === 'stock'   ? '🗃️ Stock'
                    : selectedSource === 'discard' ? '🗑️ Ablage'
                    : selectedSource;
  showMessage(`✅ ${cardElement.dataset.value} aus ${sourceLabel} gewählt – Ziel antippen`);
}

/**
 * handleCardPlace(event) – Ausgewählte Karte auf Bau- oder Ablagestapel legen.
 * Enthält alle Validierungen (Spieler am Zug, gültiger Zug, etc.).
 * @param {Event} event – Click oder Touch-Event
 */
function handleCardPlace(event) {
  if (isGameOver) return;
  event.preventDefault();

  if (!selectedCard) {
    showMessage('⚠️ Bitte zuerst eine Karte auswählen');
    return;
  }

  const el     = event.currentTarget || event.target;
  const target = el.closest('.build-pile') || el.closest('[data-label*="Ablage"]');
  if (!target) return;

  if (currentPlayer !== 'human') {
    showMessage('⏳ Warte – KI ist am Zug!');
    return;
  }

  let success = false;
  const wasLastHandCard = selectedSource === 'hand' && Game.players.human.hand.length === 1;
  const stockPile = Game.players.human.stock;
  const topStock  = stockPile[stockPile.length - 1];

  // Nagel 47: Hand/Stock-Kollision verhindern
  if (selectedCard === topStock && selectedCard.type !== 'joker') {
    if (KONFIG.DEBUG_47) {
      debugInfo.push(`📌47 ⚠️ Handkarte = Stockkarte (kein Joker) – KI-Zug wird ausgelöst`);
    }
    aiTurn(0);
    return;
  }

  // Ziel: Baustapel
  if (target.classList.contains('build-pile') || target.closest('.build-pile')) {
    const buildPiles     = document.querySelectorAll('.build-pile');
    const actualPile     = target.classList.contains('build-pile') ? target : target.closest('.build-pile');
    const buildPileIndex = Array.from(buildPiles).indexOf(actualPile);

    if (handleBuildPileDrop(currentPlayer, selectedSource, selectedIndex, buildPileIndex)) {
      success = true;
      showMessage(`✅ Karte ${selectedCard.dataset.value} → 🏗️ Bau ${buildPileIndex + 1}`);
      if (KONFIG.DEBUG_43) debugInfo.push(`📌43 ✅ Spieler legt auf Bau ${buildPileIndex + 1}`);

      // Nach letzter Handkarte: beide Spieler nachziehen
      if (wasLastHandCard) {
        drawCardsUntilFive('human');
        drawCardsUntilFive('ai');
        if (KONFIG.DEBUG_43) debugInfo.push(`📌60 🃏 Handkarten aufgefüllt (war letzte Handkarte)`);
      }
    } else {
      showMessage('❌ Dieser Zug ist nicht erlaubt');
    }

  // Ziel: Ablagestapel
  } else if (target.matches('[data-label*="Ablage"]') || target.closest('[data-label*="Ablage"]')) {
    const actualDiscard    = target.matches('[data-label*="Ablage"]') ? target : target.closest('[data-label*="Ablage"]');
    const discardPiles     = document.querySelectorAll('.human-area [data-label*="Ablage"]');
    const discardPileIndex = Array.from(discardPiles).indexOf(actualDiscard);

    if (handleDiscardPileDrop(currentPlayer, selectedSource, selectedIndex, discardPileIndex)) {
      success = true;
      showMessage(`✅ Karte ${selectedCard.dataset.value} → 🗑️ Ablage ${discardPileIndex + 1} – KI am Zug`);
      if (KONFIG.DEBUG_43) debugInfo.push(`📌43 ✅ Spieler legt auf Ablage ${discardPileIndex + 1}`);
      switchPlayer();
    }
  }

  // Aufräumen nach erfolgreichem Zug
  if (success) {
    selectedCard   = null;
    selectedSource = null;
    selectedIndex  = null;
    document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
    updateView();
    if (checkForWinner()) return;
    setupTouchEvents();
  }
}

/**
 * getSourceType(element) – Ermittelt woher eine Karte kommt.
 * @param {HTMLElement} element – DOM-Element der Karte
 * @returns {string|null} 'hand', 'stock', 'discard' oder null
 */
function getSourceType(element) {
  if (element.closest('.hand'))                  return 'hand';
  if (element.closest('.stock'))                 return 'stock';
  if (element.closest('[data-label*="Ablage"]')) return 'discard';
  return null;
}

/**
 * getSourceIndex(element) – Index der Quelle in der Datenstruktur ermitteln.
 * Für Hand: Position in der Hand-Reihe.
 * Für Ablage: Index des Ablagestapels (0-3).
 * Für Stock: Immer 0.01 (Spezialwert für Stockkarte).
 * @param {HTMLElement} element – DOM-Element der Karte
 * @returns {number} Index
 */
function getSourceIndex(element) {
  if (element.closest('.hand')) {
    return Array.from(element.parentElement.children).indexOf(element);
  }
  if (element.closest('[data-label*="Ablage"]')) {
    const discardPiles = document.querySelectorAll('.human-area [data-label*="Ablage"]');
    return Array.from(discardPiles).indexOf(element.closest('[data-label*="Ablage"]'));
  }
  return 0.01; // Sonderfall: Stockkarte (Wert 0.01 als Markierung)
}

/**
 * isValidBuildMove(card, buildPileIndex) – Prüft ob eine Karte auf einen Baustapel darf.
 * Regeln: Leerer Stapel → nur 1 oder Joker. Sonst: Karte = topCard + 1 oder Joker.
 * @param {Object} card – Kartenobjekt {type, value}
 * @param {number} buildPileIndex – Index des Ziel-Baustapels (0-3)
 * @returns {boolean}
 */
function isValidBuildMove(card, buildPileIndex) {
  const buildPile = Game.buildPiles[buildPileIndex];
  if (buildPile.length === 0) {
    return card.type === 'joker' || parseInt(card.value) === 1;
  }
  const topCard   = buildPile[buildPile.length - 1];
  const topValue  = topCard.type === 'joker' ? buildPile.length : parseInt(topCard.value);
  const cardValue = parseInt(card.value);
  return card.type === 'joker' || cardValue === (topValue + 1);
}

/**
 * isBuildPileComplete(buildPileIndex) – Prüft ob ein Baustapel vollständig ist (1-12).
 * @param {number} buildPileIndex – Index des Baustapels (0-3)
 * @returns {boolean}
 */
function isBuildPileComplete(buildPileIndex) {
  const buildPile = Game.buildPiles[buildPileIndex];
  if (buildPile.length === 0) return false;
  const topCard = buildPile[buildPile.length - 1];
  return topCard.value === 12 || (topCard.type === 'joker' && buildPile.length === 12);
}

/**
 * clearBuildPile(buildPileIndex) – Vollständigen Baustapel leeren und Karten mischen.
 * Die geleerten Karten werden dem Nachziehstapel hinzugefügt und neu gemischt.
 * @param {number} buildPileIndex – Index des Baustapels (0-3)
 */
function clearBuildPile(buildPileIndex) {
  if (isBuildPileComplete(buildPileIndex)) {
    const clearedCards = Game.buildPiles[buildPileIndex];
    Game.buildPiles[buildPileIndex] = [];
    Game.drawPile = Game.drawPile.concat(clearedCards);
    shuffleDrawPile();
  }
}

/**
 * shuffleDrawPile() – Nachziehstapel neu mischen (Fisher-Yates).
 */
function shuffleDrawPile() {
  shuffleDeck(Game.drawPile);
}

/**
 * getJokerValue(buildPile, jokerPosition) – Ermittelt welchen Wert ein Joker vertritt.
 * Position 0 → Wert 1. Sonst: Vorgängerkarte + 1.
 * @param {Array} buildPile – Der Baustapel-Array
 * @param {number} jokerPosition – Position des Jokers im Stapel
 * @returns {number} Effektiver Wert des Jokers
 */
function getJokerValue(buildPile, jokerPosition) {
  if (jokerPosition === 0) return 1;
  const previousCard = buildPile[jokerPosition - 1];
  return previousCard.type === 'joker'
    ? jokerPosition + 1
    : parseInt(previousCard.value) + 1;
}

/**
 * handleBuildPileDrop(player, sourceType, sourceIndex, buildPileIndex)
 * Legt eine Karte auf einen Baustapel (Datenlogik, kein UI-Update).
 * Prüft Gültigkeit und entfernt Karte aus der Quelle.
 * @returns {boolean} true wenn erfolgreich
 */
function handleBuildPileDrop(player, sourceType, sourceIndex, buildPileIndex) {
  let card, sourceArray;

  // Quelle ermitteln
  switch (sourceType) {
    case 'hand':
      sourceArray = Game.players[player].hand;
      card        = sourceArray[sourceIndex];
      break;
    case 'stock':
      sourceArray = Game.players[player].stock;
      card        = sourceArray[sourceArray.length - 1]; // Immer oberste Stockkarte
      break;
    case 'discard':
      sourceArray = Game.players[player].discards[sourceIndex];
      if (sourceArray?.length > 0) {
        card = sourceArray[sourceArray.length - 1]; // Immer oberste Ablagekarte
        if (KONFIG.DEBUG_46) debugInfo.push(`📌46 🗄️ Ablage ${sourceIndex + 1}: Karte ${card.value} wird gelegt`);
      } else {
        if (KONFIG.DEBUG_46) debugInfo.push(`📌46 ❌ Ablage ${sourceIndex + 1} ist leer`);
        return false;
      }
      break;
    default:
      if (KONFIG.DEBUG_46) debugInfo.push(`📌46 ❌ Ungültiger sourceType: ${sourceType}`);
      return false;
  }

  if (!card) return false;

  // Gültigkeit prüfen und Karte legen
  if (isValidBuildMove(card, buildPileIndex)) {
    Game.buildPiles[buildPileIndex].push(card);
    if (sourceType === 'hand') sourceArray.splice(sourceIndex, 1);
    else sourceArray.pop();

    // Baustapel voll? → leeren und mischen
    if (isBuildPileComplete(buildPileIndex)) clearBuildPile(buildPileIndex);
    return true;
  }
  return false;
}

/**
 * handleDiscardPileDrop(player, sourceType, sourceIndex, discardPileIndex)
 * Legt eine Karte auf einen Ablagestapel (Datenlogik, kein UI-Update).
 * Für KI: Auto-Auswahl der besten Ablagekarte wenn keine ausgewählt.
 * Für Spieler: selectedCard muss gesetzt sein (kein Auto-Modus).
 * @returns {boolean} true wenn erfolgreich
 */
function handleDiscardPileDrop(player, sourceType, sourceIndex, discardPileIndex) {
  // KI-Auto-Auswahl: Beste Karte für Ablage automatisch wählen
  if (!selectedCard && player === 'ai') {
    if (Game.players[player].hand.length > 0) {
      const criticalNumbers = getOpponentCriticalNumbers();
      let safestIndex = 0, lowestScore = Infinity;

      Game.players[player].hand.forEach((card, i) => {
        let score = 0;

        // Gefährliche Karten (helfen dem Gegner) hoch bestrafen
        score += criticalNumbers.includes(card.value + 1) ? KONFIG.SCORE_37 : 0;
        if (KONFIG.DEBUG_37) debugInfo.push(`📌37 🔒 Karte ${card.value}: Blockade-Score +${KONFIG.SCORE_37} = ${score}`);

        // Distanz zum eigenen Stockwert
        const stockTop = Game.players[player].stock.slice(-1)[0]?.value || 0;
        try {
          const dist = Math.abs(card.value - stockTop) * KONFIG.SCORE_38;
          if (!isNaN(dist) && isFinite(dist)) score += dist;
        } catch (e) { console.error('Distanz-Berechnung Fehler:', e); }
        if (KONFIG.DEBUG_38) debugInfo.push(`📌38 ↔️ Karte ${card.value} Distanz-Score = ${score}`);

        // Joker schützen (hohen Wert für Joker → nicht leichtfertig ablegen)
        try {
          const jokerBonus = card.type === 'joker' ? KONFIG.SCORE_33 : 0;
          if (!isNaN(jokerBonus)) score += jokerBonus;
        } catch (e) { console.error('Joker-Bonus Fehler:', e); }
        if (KONFIG.DEBUG_33) debugInfo.push(`📌33 ★ Joker-Schutz Karte ${card.value}: Score = ${score}`);

        score += getDiscardSequenceBonus(player, discardPileIndex, card);
        if (score < lowestScore) { lowestScore = score; safestIndex = i; }
      });

      selectedCard = Game.players[player].hand[safestIndex];
      showMessage(`🤖 KI wählt Karte ${selectedCard.value} zum Ablegen`);
      if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🤖 Auto-Ablage: Karte ${selectedCard.value} gewählt (Score: ${lowestScore})`);
    } else {
      showMessage('⚠️ KI hat keine Handkarten zum Ablegen');
      return false;
    }
  }

  let card, sourceArray;
  switch (sourceType) {
    case 'hand':
      sourceArray = Game.players[player].hand;
      card        = sourceArray[sourceIndex];
      break;
    case 'stock':
      // Stockkarten dürfen NICHT auf Ablagestapel gelegt werden (Spielregel!)
      showMessage(`❌ ${player === 'human' ? 'Du' : 'KI'}: Stockkarten darf nicht abgelegt werden!`);
      if (KONFIG.DEBUG_43) debugInfo.push(`📌43 ❌ Stockkarte-Ablage verhindert für ${player}`);
      return false;
    default:
      return false;
  }

  if (!card) return false;

  // Karte ablegen
  if (!Game.players[player].discards[discardPileIndex]) {
    Game.players[player].discards[discardPileIndex] = [];
  }
  Game.players[player].discards[discardPileIndex].push(card);
  if (sourceType === 'hand') sourceArray.splice(sourceIndex, 1);
  else sourceArray.pop();

  // Spieler-Ablage tracken (für KI-Analyse)
  if (player === 'human') {
    trackGameObservations('opponentDiscard', { cardValue: card.value });
  }

  // Deck-Komposition aktualisieren
  try {
    if (card?.value || card?.type === 'joker') {
      const key = card.type === 'joker' ? 'joker' : card.value;
      if (Game.tracking.deckComposition[key] > 0) Game.tracking.deckComposition[key]--;
      Game.tracking.discardHistory[player].values.push(key);
      Game.tracking.discardHistory[player].timestamps.push(Date.now());
    }
  } catch (e) { console.error('Tracking-Fehler:', e); }

  return true;
}

/**
 * drawCardsUntilFive(player) – Karten nachziehen bis die Hand 5 Karten hat.
 * Spieler-Karten werden face-up, KI-Karten face-down gezogen.
 * @param {string} player – 'human' oder 'ai'
 */
function drawCardsUntilFive(player) {
  while (Game.players[player].hand.length < 5 && Game.drawPile.length > 0) {
    const card  = Game.drawPile.pop();
    card.faceUp = (player === 'human');
    Game.players[player].hand.push(card);
  }
  updateView();
}

/**
 * getOpponentCriticalNumbers() – Welche Kartenwerte dem menschlichen Gegner direkt helfen.
 * Gibt die direkten Folgekarten des Gegner-Stocks und der Gegner-Ablagestapel zurück.
 * @returns {number[]} Array von kritischen Kartenwerten
 */
function getOpponentCriticalNumbers() {
  const criticalNumbers = [];
  const humanStock = Game.players.human.stock;

  // Stock-Top: die Karte direkt über dem Stock hilft dem Gegner
  if (humanStock.length > 0) {
    criticalNumbers.push(parseInt(humanStock[humanStock.length - 1].value) + 1);
  }

  // Ablagestapel-Tops: Folgekarten der obersten Ablagekarten
  Game.players.human.discards.forEach(pile => {
    if (pile.length > 0) {
      criticalNumbers.push(parseInt(pile[pile.length - 1].value) + 1);
    }
  });

  return [...new Set(criticalNumbers)]; // Duplikate entfernen
}

/**
 * getDiscardSequenceBonus(player, discardIndex, newCard) – Bonus für Sequenz auf Ablage.
 * +100 wenn neue Karte direkt unter die oberste Ablagekarte passt.
 * @returns {number} Bonus-Score
 */
function getDiscardSequenceBonus(player, discardIndex, newCard) {
  const pile = Game.players[player].discards[discardIndex];
  if (pile.length === 0) return 0.01;
  const topValue = pile[pile.length - 1].value;
  return (newCard.value === topValue - 1) ? 100 : 0;
}

/**
 * aiTurn(rekursionstiefe) – KI-Hauptfunktion.
 * Steuert den kompletten KI-Zug in mehreren Phasen.
 * Rekursionsschutz: max. 15 Aufrufe, dann switchPlayer().
 * isGameOver-Check: Sofortiger Abbruch wenn Spiel beendet.
 * @param {number} rekursionstiefe – Aktueller Rekursionszähler (Standard: 0)
 */
async function aiTurn(rekursionstiefe = 0) {
  // Sicherheitsprüfungen
  if (isGameOver) return;
  if (rekursionstiefe > 15) {
    console.warn('⚠️ aiTurn: Max. Rekursionstiefe (15) erreicht – Spielerwechsel erzwungen');
    switchPlayer();
    return;
  }

  // Phase 1: Vorbereitung
  await aiTurn_prepare();
  if (isGameOver) return;

  // Phase 2: Zugschleife (alle möglichen Züge ausführen)
  await aiTurn_executeMoves(rekursionstiefe);
  if (isGameOver) return;

  // Phase 3: Abschluss (Ablegen, Nachziehen, Wechseln)
  await aiTurn_finish();
}

/**
 * aiTurn_prepare() – KI-Vorbereitung: Karten ziehen, Vorhersage, Overlays setzen.
 */
async function aiTurn_prepare() {
  // Handkarten auffüllen
  drawCardsUntilFive('ai');
  showMessage('🤖 KI bereitet Zug vor...');
  if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🤖 KI-Zug startet – Hand: ${Game.players.ai.hand.length} Karten, Stock: ${Game.players.ai.stock.length}`);
  await pauseForSeconds(0.8);
  if (isGameOver) return;

  // Gegner-Vorhersage berechnen
  const enemyAnalysis = predictEnemyStock('human');
  const priorities    = calculateDynamicPriorities();

  showMessage('🔍 KI analysiert Spielfeld...');
  await pauseForSeconds(0.5);

  // Blockade-Overlays auf Baustapeln anzeigen
  Game.buildPiles.forEach((pile, i) => {
    const element = document.querySelector(`.build-pile:nth-child(${i + 1})`);
    if (!element) return;
    if (pile.slice(-1)[0]?.value === enemyAnalysis.nextExpected) {
      element.classList.add('ai-prediction-overlay');
      const tag       = document.createElement('div');
      tag.className   = 'strategy-tag';
      tag.textContent = `⛔ Blockade ${enemyAnalysis.nextExpected} (${Math.round(enemyAnalysis.confidence * 100)}%)`;
      element.appendChild(tag);
    }
  });

  // Gezielte Stock-Attacke wenn hohe Konfidenz
  if (enemyAnalysis.confidence > 0.6 && enemyAnalysis.nextExpected) {
    try {
      showMessage(`⚔️ KI plant Blockade gegen Wert ${enemyAnalysis.nextExpected}...`);
      await executeStockAttack(enemyAnalysis.nextExpected);
      if (isGameOver) return;
      updateView(); // Spielfeld sofort aktualisieren nach Stock-Attack
      await pauseForSeconds(0.3);
    } catch (e) {
      console.error('Stock-Attack Fehler:', e);
    }
  }
}

/**
 * aiTurn_executeMoves(rekursionstiefe) – KI-Zugschleife.
 * Führt alle möglichen Züge aus bis keine mehr möglich sind.
 * Nach jedem Einzelzug: updateView() + kurze Pause (Züge sichtbar machen).
 * @param {number} rekursionstiefe – Weitergabe für möglichen Rekursionsaufruf
 */
async function aiTurn_executeMoves(rekursionstiefe) {
  let kein_zug_mehr = 0;
  let moveCount     = 0;
  let score         = 0; // Lokale score-Variable für Debug-Outputs

  do {
    if (isGameOver) return;
    showMessage('🧠 KI berechnet besten Zug...');
    await pauseForSeconds(0.5);

    const candidates = evaluateMoveCandidates('ai');

    if (candidates.length === 0) {
      // Keine Kandidaten → versuche Stockkarte direkt
      const stockPlayed = await aiTurn_stockFallback(score);
      if (!stockPlayed) kein_zug_mehr = 1;
      break;
    }

    // Besten Kandidaten auswählen
    candidates.sort((a, b) => b.score - a.score);
    const best      = candidates[0];
    const stockCard = Game.players.ai.stock.length > 0
      ? Game.players.ai.stock[Game.players.ai.stock.length - 1]
      : null;

    // Stockkarte priorisieren wenn gleichwertiger Kandidat
    const didStockPriority = await aiTurn_stockPriority(best, stockCard, rekursionstiefe, score);
    if (didStockPriority) return; // Rekursiver Neustart nach Stockpriorität

    // Besten Kandidaten spielen
    const moved = await aiTurn_playBestCandidate(best, score);
    if (!moved) {
      kein_zug_mehr = 1;
      break;
    }
    moveCount++;

    // Spielfeld sofort aktualisieren (Kombinationszüge sichtbar machen)
    updateView();
    setupTouchEvents(); // Event-Listener nach DOM-Update erneuern

    if (moveCount >= 2) {
      showMessage(`🔄 KI Kombinationszug #${moveCount} – ${best.card.type === 'joker' ? '★ Joker' : best.card.value}`);
      await pauseForSeconds(0.4);
    }

    await pauseForSeconds(1.0); // Pause zwischen Zügen für Sichtbarkeit

  } while (!kein_zug_mehr && !isGameOver);
}

/**
 * aiTurn_stockFallback(score) – Fallback: Stockkarte direkt auf Baustapel legen.
 * Wird aufgerufen wenn evaluateMoveCandidates() keine Kandidaten liefert.
 * @param {number} score – Aktueller Score-Wert (für Debug)
 * @returns {boolean} true wenn Stockkarte gespielt wurde
 */
async function aiTurn_stockFallback(score) {
  const stockCard = Game.players.ai.stock.slice(-1)[0];
  if (!stockCard) return false;

  for (let j = 0; j < Game.buildPiles.length; j++) {
    if (!isValidBuildMove(stockCard, j)) continue;

    showMessage(`🗃️ KI legt Stockkarte ${stockCard.value} → 🏗️ Bau ${j + 1}`);
    if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🗃️ Fallback: Stockkarte ${stockCard.value} → Bau ${j + 1}`);
    if (KONFIG.DEBUG_24) {
      debugInfo.push(`📌24 💰 Stock-Fallback Score: ${KONFIG.SCORE_24}`);
      debugInfo.push(`📌24-1 ⬆️ score += ${KONFIG.SCORE_24} (Stockabbau, ges. = ${score})`);
    }

    await pauseForSeconds(1.2);
    if (isGameOver) return false;

    if (handleBuildPileDrop('ai', 'stock', 0, j)) {
      trackGameObservations('kiMove', {
        sourceType:     'stock',
        cardValue:      stockCard.value,
        cardType:       stockCard.type,
        buildPileIndex: j,
        score:          KONFIG.SCORE_24
      });
      updateView(); // Sofort sichtbar machen
      return true;
    }
    break;
  }

  // Stockkarte wäre spielbar aber wurde nicht gespielt → loggen
  if (KONFIG.DEBUG_45 && stockCard) {
    if (Game.buildPiles.some(pile => isValidBuildMove(stockCard, Game.buildPiles.indexOf(pile)))) {
      trackGameObservations('missedStock', { stockCardValue: stockCard.value });
    }
  }
  return false;
}

/**
 * aiTurn_playBestCandidate(best, score) – Besten Kandidaten aus der Liste spielen.
 * Zeigt detaillierte Statusmeldung und führt den Zug aus.
 * @param {Object} best – Bester Kandidat aus evaluateMoveCandidates()
 * @param {number} score – Aktueller Score-Wert (für Debug)
 * @returns {boolean} true wenn Zug erfolgreich
 */
async function aiTurn_playBestCandidate(best, score) {
  const sourceLabel = best.sourceType === 'hand'    ? `✋ Hand-${best.sourceIndex + 1}`
                    : best.sourceType === 'stock'   ? '🗃️ Stock'
                    : `🗑️ Ablage-${best.sourceIndex + 1}`;
  const cardLabel   = best.card.type === 'joker' ? '★ Joker' : `${best.card.value}`;

  showMessage(`🤖 KI: ${cardLabel} von ${sourceLabel} → 🏗️ Bau ${best.buildPileIndex + 1} (Score: ${best.score})`);
  if (KONFIG.DEBUG_43) {
    debugInfo.push(`📌43 🎯 KI spielt: ${cardLabel} | Quelle: ${best.sourceType} | Bau: ${best.buildPileIndex + 1} | Score: ${best.score}`);
  }

  await pauseForSeconds(1.2);
  if (isGameOver) return false;

  if (handleBuildPileDrop('ai', best.sourceType, best.sourceIndex, best.buildPileIndex)) {
    trackGameObservations('kiMove', {
      sourceType:     best.sourceType,
      cardValue:      best.card.value,
      cardType:       best.card.type,
      buildPileIndex: best.buildPileIndex,
      score:          best.score
    });

/**
 * aiTurn_stockPriority(best, stockCard, rekursionstiefe, score) – Stockkarte priorisieren.
 * Wenn Stockkarte denselben Wert hat wie der beste Kandidat → Stock bevorzugen.
 * Löst rekursiven aiTurn-Aufruf aus wenn Stockkarte gespielt wurde.
 * @returns {boolean} true wenn Stockkarte gespielt wurde (rekursiver Neustart)
 */
async function aiTurn_stockPriority(best, stockCard, rekursionstiefe, score) {
  if (!stockCard) return false;
  if (best.sourceType === 'stock') return false; // Schon Stockkarte geplant
  if (stockCard.type === 'joker') return false;  // Joker im Stock nicht priorisieren
  if (stockCard.value !== best.card.value) return false; // Verschiedene Werte

  // Stockkarte hat gleichen Wert → Stock bevorzugen
  if (KONFIG.DEBUG_31) {
    debugInfo.push(`📌31 🟢 Stockkarte ${stockCard.value} priorisiert (gleicher Wert wie ${best.sourceType}-Karte)`);
  }

  showMessage(`🗃️ KI priorisiert Stockkarte ${stockCard.value} → 🏗️ Bau ${best.buildPileIndex + 1}`);
  if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🗃️ Stock-Priorität: ${stockCard.value} → Bau ${best.buildPileIndex + 1}`);

  await pauseForSeconds(1.2);
  if (isGameOver) return false;

  if (handleBuildPileDrop('ai', 'stock', 0, best.buildPileIndex)) {
    if (KONFIG.DEBUG_32) {
      debugInfo.push(`📌32 ⬆️ Score += ${KONFIG.SCORE_32} (Stockabbau-Priorisierung, ges. = ${score})`);
    }
    trackGameObservations('kiMove', {
      sourceType:     'stock',
      cardValue:      stockCard.value,
      cardType:       stockCard.type,
      buildPileIndex: best.buildPileIndex,
      score:          KONFIG.SCORE_32
    });
    updateView(); // Sofort sichtbar machen
  }

  // Rekursiver Neustart für Folgezüge
  if (!isGameOver) aiTurn(rekursionstiefe + 1);
  return true;
}

/**
 * aiTurn_finish() – KI-Abschluss: Ablegen, Nachziehen, Spielerwechsel.
 */
async function aiTurn_finish() {
  if (isGameOver) return;

  // Karte auf Ablagestapel legen (Pflichtzug wenn Handkarten vorhanden)
  if (Game.players.ai.hand.length > 0) {
    showMessage('🤖 KI legt Karte auf Ablagestapel...');
    if (KONFIG.DEBUG_43) debugInfo.push(`📌43 📤 KI legt ab – Hand: ${Game.players.ai.hand.length}`);
    await pauseForSeconds(1);
    await playInDiscardPiles('ai');
    updateView(); // Nach Ablegen sofort aktualisieren
  } else {
    showMessage('ℹ️ KI hat keine Handkarten mehr – kein Pflichtablegen');
  }

  if (isGameOver) return;

  // Handkarten auffüllen falls nötig
  if (Game.players.ai.hand.length < 5) {
    showMessage('🃏 KI zieht Karten nach...');
    if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🃏 KI zieht nach: ${5 - Game.players.ai.hand.length} Karten`);
    await pauseForSeconds(0.5);
    drawCardsUntilFive('ai');
  }

  if (isGameOver) return;

  // Strategie-Tags und Overlays entfernen
  document.querySelectorAll('.ai-prediction-overlay, .strategy-tag').forEach(el => el.remove());

  showMessage('✅ KI beendet Zug – Spielerwechsel');
  await pauseForSeconds(0.5);
  updateView();
  switchPlayer();
}

/**
 * switchPlayer() – Spielerwechsel verwalten.
 * Wechselt currentPlayer und startet den nächsten Zug.
 */
async function switchPlayer() {
  if (isGameOver || checkForWinner()) return;

  if (currentPlayer === 'human') {
    currentPlayer = 'ai';
    showMessage('🤖 KI ist am Zug...');
    if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🔄 Spielerwechsel → KI`);
    await pauseForSeconds(1.2);
    if (isGameOver) return;
    aiTurn(0);
  } else {
    currentPlayer = 'human';
    showMessage('👤 Dein Zug! – Karte auswählen');
    if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🔄 Spielerwechsel → Spieler`);
    await pauseForSeconds(0.5);
    if (isGameOver) return;
    drawCardsUntilFive('human');
    setupTouchEvents();
    showMessage('✋ Wähle eine Karte aus deiner Hand, Stock oder Ablage');
    await pauseForSeconds(1.5);
  }
}

/**
 * executeStockAttack(targetValue) – Gezielter Angriff auf Gegner-Stockwert.
 * Versucht eine Karte zu spielen die den Gegner beim Stockabbau blockiert.
 * @param {number} targetValue – Zielwert für den Angriff
 * @returns {boolean} true wenn Angriff erfolgreich
 */
async function executeStockAttack(targetValue) {
  if (isGameOver) return false;
  try {
    // Gültige Baustapel finden (targetValue - 1 muss oben liegen)
    const validPiles = Game.buildPiles
      .map((pile, i) => ({ index: i, current: pile.slice(-1)[0]?.value || 0 }))
      .filter(pile => targetValue === 1 ? pile.current === 0 : pile.current === targetValue - 1);

    if (validPiles.length === 0) return false;
    const bestPile = validPiles.reduce((a, b) => a.current < b.current ? a : b);

    // Passende Karte finden (exakter Wert oder Joker)
    const validCards = [
      ...Game.players.ai.hand.map((c, i) => ({ card: c, type: 'hand', index: i })),
      { card: Game.players.ai.stock.slice(-1)[0], type: 'stock', index: 0 }
    ].filter(({ card }) => card && (card.value === targetValue || card.type === 'joker'));

    if (validCards.length === 0) return false;

    // Nicht-Joker bevorzugen (Joker schützen)
    const bestCard = validCards.reduce((a, b) =>
      (a.card.type === 'joker' ? 1 : 0) - (b.card.type === 'joker' ? 1 : 0) ||
      b.card.value - a.card.value
    );

    const result = handleBuildPileDrop('ai', bestCard.type, bestCard.index, bestPile.index);
    debugInfo.push(`⚔️ executeStockAttack(${targetValue}): ${result ? '✅ Erfolg' : '❌ Fehlgeschlagen'}`);
    return result === true;
  } catch (e) {
    console.error('executeStockAttack Fehler:', e);
    return false;
  }
}

/**
 * playInDiscardPiles(player) – KI legt eine Karte auf den besten Ablagestapel.
 * Bewertet jeden Ablagestapel und wählt den mit dem höchsten Score.
 * Nach erfolgreichem Ablegen: versucht zusätzlich Joker abzulegen.
 * @param {string} player – 'human' oder 'ai'
 */
async function playInDiscardPiles(player) {
  if (isGameOver) return;
  if (Game.players[player].hand.length === 0) {
    showMessage('⚠️ Keine Handkarten zum Ablegen');
    await pauseForSeconds(1);
    return;
  }

  const opponentCritical = [
    Game.players.human.stock.slice(-1)[0]?.value,
    ...Game.players.human.discards.map(p => p[p.length - 1]?.value)
  ].filter(v => v !== undefined);

  const stockTop    = Game.players[player].stock.length > 0
    ? Game.players[player].stock[Game.players[player].stock.length - 1].value
    : null;
  const handCards   = Game.players[player].hand;
  const discards    = Game.players[player].discards;

  let bestDiscardIndex = -1, bestScore = -Infinity, mainMoveSuccess = false;
  const cardToPlay  = handCards[handCards.length - 1];
  const sourceIndex = handCards.length - 1;
  const isDangerous = opponentCritical.includes(cardToPlay.value);

  // Jeden Ablagestapel bewerten
  for (let i = 0; i < discards.length; i++) {
    const pile    = discards[i];
    const topCard = pile.length > 0 ? pile[pile.length - 1] : null;
    let score     = KONFIG.SCORE_13;

    if (KONFIG.DEBUG_13) debugInfo.push(`📌13 🗑️ Ablage ${i + 1} Basis-Score = ${KONFIG.SCORE_13}`);

    // Gefährliche Karten stark bestrafen
    if (isDangerous) {
      score -= KONFIG.SCORE_14;
      if (KONFIG.DEBUG_14) debugInfo.push(`📌14 ⛔ Karte ${cardToPlay.value} ist gefährlich, -${KONFIG.SCORE_14}`);
    }

    // Leerer Stapel bevorzugen
    if (!topCard) {
      score += KONFIG.SCORE_16;
      if (KONFIG.DEBUG_16) debugInfo.push(`📌16 ✨ Leerer Stapel ${i + 1} +${KONFIG.SCORE_16}`);
      if (stockTop && cardToPlay.value === stockTop - 1) score += 50;
    } else if (cardToPlay.value < topCard.value) {
      score += KONFIG.SCORE_17;
      if (KONFIG.DEBUG_17) debugInfo.push(`📌17 ⬇️ Niedrigere Karte ${cardToPlay.value} < ${topCard.value} +${KONFIG.SCORE_17}`);
      if (stockTop && cardToPlay.value === stockTop - 1) score += 50;
    }

    // Sequenz-Bonus
    if (topCard && cardToPlay.value === topCard.value - 1) {
      score += KONFIG.SCORE_15;
      if (KONFIG.DEBUG_15) debugInfo.push(`📌15 🔗 Sequenz ${cardToPlay.value}→${topCard.value} +${KONFIG.SCORE_15}`);
    }

    // Stock-Folge-Bonus
    if (stockTop && cardToPlay.value === stockTop + 1) score += 300;

    // Große Stapel unattraktiv machen
    score -= pile.length * KONFIG.SCORE_19;
    if (KONFIG.DEBUG_19) debugInfo.push(`📌19 ⬇️ Stapelgröße-Malus: -${pile.length * KONFIG.SCORE_19}`);

    // Gegnerhilfe stark bestrafen
    const helpsOpponent = pile.some(c => opponentCritical.includes(c.value));
    if (helpsOpponent) {
      const criticalPenalty = Game.players.human.stock.length <= 5 ? 3000 : 0;
      score -= KONFIG.SCORE_20 + criticalPenalty;
      if (Game.players.human.stock.length < 5) score -= KONFIG.SCORE_20;
      if (KONFIG.DEBUG_20) debugInfo.push(`📌20 🚫 Gegnerhilfe Stapel ${i + 1}: -${KONFIG.SCORE_20}`);
    }

    if (score > bestScore) { bestScore = score; bestDiscardIndex = i; }
  }

  // Beste Ablage ausführen
  if (bestDiscardIndex >= 0 && handleDiscardPileDrop(player, 'hand', sourceIndex, bestDiscardIndex)) {
    mainMoveSuccess = true;
    showMessage(`🤖 KI legt ${cardToPlay.value} → 🗑️ Ablage ${bestDiscardIndex + 1}`);
    if (KONFIG.DEBUG_43) debugInfo.push(`📌43 📤 KI legt ab: ${cardToPlay.value} → Ablage ${bestDiscardIndex + 1} (Score: ${bestScore})`);
    await pauseForSeconds(1);
    updateView(); // Sofort sichtbar machen
    trackGameObservations('discardStrategy', {
      cardValue:       cardToPlay.value,
      wasDangerous:    isDangerous,
      stockFollowup:   stockTop && cardToPlay.value === stockTop + 1,
      createdSequence: discards[bestDiscardIndex]?.slice(-1)[0]?.value
    });
    if (checkForWinner()) return;
  } else {
    showMessage('⚠️ Ablage fehlgeschlagen!');
    await pauseForSeconds(1);
  }

  // Zusätzlicher Joker ablegen wenn vorhanden
  if (mainMoveSuccess && !isGameOver) {
    const jokerIndex = Game.players[player].hand.findIndex(
      c => String(c.value).toUpperCase() === 'JOKER' || c.type === 'joker'
    );
    if (jokerIndex !== -1) {
      if (handleDiscardPileDrop(player, 'hand', jokerIndex, 3)) {
        showMessage('★ KI legt Joker sicher → 🗑️ Ablage 4');
        if (KONFIG.DEBUG_43) debugInfo.push(`📌43 ★ KI legt Joker auf Ablage 4`);
        await pauseForSeconds(1);
        updateView(); // Joker-Ablage sofort sichtbar
        trackGameObservations('jokerAdditional', { cardValue: 'JOKER' });
        if (checkForWinner()) return;
      }
    }
  }
}

/**
 * evaluateAndSelectMove(player) – Besten Zug auswählen und ausführen.
 * Hilfsfunktion für direkten Aufruf (z.B. aus handleCardPlace).
 * @param {string} player – 'human' oder 'ai'
 * @returns {boolean} true wenn Zug erfolgreich
 */
async function evaluateAndSelectMove(player) {
  if (isGameOver) return false;
  const candidates = evaluateMoveCandidates(player);
  if (candidates.length === 0) return false;

  candidates.sort((a, b) => b.score - a.score);
  const best = candidates[0];

  showMessage(`🎯 ${player === 'ai' ? 'KI' : 'Spieler'}: Karte ${best.card.value} → Bau ${best.buildPileIndex + 1} (Score: ${best.score})`);
  if (KONFIG.DEBUG_43) debugInfo.push(`📌43 🎯 evaluateAndSelectMove: ${best.card.value} → Bau ${best.buildPileIndex + 1}`);

  await pauseForSeconds();
  if (isGameOver) return false;
  handleBuildPileDrop(player, best.sourceType, best.sourceIndex, best.buildPileIndex);
  updateView();
  return true;
}

// GRUPPE G – KI BEWERTUNG & SCORING
// ================================================================

/**
 * evaluateMoveCandidates(player) – Alle möglichen Züge bewerten und sortieren.
 * Hauptfunktion der KI-Scoring-Engine.
 * Bewertet: Handkarten, Stockkarte, Ablagestapelkarten.
 * Gibt sortierte Liste von Kandidaten zurück (bester zuerst).
 * @param {string} player – 'ai' oder 'human'
 * @returns {Array} Sortierte Kandidatenliste [{sourceType, sourceIndex, card, buildPileIndex, score}]
 */
function evaluateMoveCandidates(player) {
  // Globale Spielzustand-Parameter
  const nagel40    = KONFIG.SCORE_40;  // Joker-Schwellenwert
  const nagel41    = KONFIG.SCORE_41;  // Joker-Mindestbewertung
  const nagel42    = KONFIG.SCORE_42;  // Joker-Gewichtung
  const stockSize  = Game.players[player].stock.length;
  const stockTop   = Game.players[player].stock.slice(-1)[0]?.value;

  if (KONFIG.DEBUG_40) debugInfo.push(`📌40 ★ Joker-Schwellenwert: ${nagel40}`);
  if (KONFIG.DEBUG_41) debugInfo.push(`📌41 ★ Joker-Mindestbewertung: ${nagel41}`);
  if (KONFIG.DEBUG_42) debugInfo.push(`📌42 ★ Joker-Gewichtung: ${nagel42}`);

  // Adaptiver Blockade-Parameter (Nagel44)
  const blockedStock = Math.max(0, 16 - Game.players.human.stock.length);
  const Nagel44      = KONFIG.SCORE_44 * Math.sqrt(blockedStock);
  if (KONFIG.DEBUG_44) {
    debugInfo.push(`📌44 🛡️ Blockade-Malus: ${KONFIG.SCORE_44} × √${blockedStock} = ${Nagel44.toFixed(1)}`);
  }

  let candidates = [];

  // --- Handkarten bewerten ---
  candidates = candidates.concat(evalScore_hand(player, stockSize, stockTop));

  // --- Duplikate entfernen (besten Score pro Handkarten-Index behalten) ---
  candidates = evalScore_dedup(candidates);

  // --- Stockkarte bewerten ---
  candidates = candidates.concat(evalScore_stock(player));

  // --- Ablagestapelkarten bewerten ---
  candidates = candidates.concat(evalScore_discard(player));

  // --- Joker-Filter und dynamische Prioritäten anwenden ---
  return evalScore_filter(candidates, player, nagel40, nagel41, nagel42);
}

/**
 * evalScore_hand(player, stockSize, stockTop) – Handkarten auf Baustapel bewerten.
 * Für jede Handkarte × jeden Baustapel wird ein Score berechnet.
 * @returns {Array} Kandidatenliste für Handkarten
 */
function evalScore_hand(player, stockSize, stockTop) {
  const candidates = [];

  Game.players[player].hand.forEach((card, i) => {
    Game.buildPiles.forEach((pile, pileIndex) => {
      if (!isValidBuildMove(card, pileIndex)) return;

      let score    = KONFIG.SCORE_5; // Grundbonus
      if (KONFIG.DEBUG_5) debugInfo.push(`📌5 ✅ Grundbonus ${KONFIG.SCORE_5} für Karte ${card.value} → Bau ${pileIndex + 1}`);

      const gapSize    = calculateGapSize(pile, card) || 0;
      const futureRisk = calculateFutureRisk(card, pileIndex) || 0;
      let riskScore    = getOpponentBlockingPotential(card, pileIndex);

      if (KONFIG.DEBUG_50) {
        debugInfo.push(`📌50 🔥 Karte ${card.value}: riskScore=${riskScore}, score=${score}, Joker_auf_Ablage=${Joker_auf_Ablage}`);
      }

      // Joker-Sonderbewertung wenn Karte ein Joker ist
      if (card.value === '★' || card.type === 'joker') {
        if (KONFIG.DEBUG_50) debugInfo.push(`📌50a ★ Joker erkannt: riskScore += ${KONFIG.SCORE_4_JOKER_MOVE}`);
        riskScore += KONFIG.SCORE_4_JOKER_MOVE;
      } else {
        if (KONFIG.DEBUG_50) debugInfo.push(`📌50a 🃏 Keine Joker, normale Bewertung`);
      }

      // Lückenbonus
      score += gapSize * KONFIG.SCORE_12;
      if (KONFIG.DEBUG_12) {
        debugInfo.push(`📌12 📏 Lücke: ${gapSize} × ${KONFIG.SCORE_12} = +${gapSize * KONFIG.SCORE_12}`);
        debugInfo.push(`📌12 📊 Score: ${score}, Gap: ${gapSize}, Risk: ${futureRisk}, RiskScore: ${riskScore}`);
      }

      // Risiken abziehen
      score -= futureRisk;
      score -= riskScore;
      if (KONFIG.DEBUG_12) debugInfo.push(`📌12a 📊 Score nach Risiko-Abzug: ${score}`);

      // Joker-Speziallogik
      if (card.type === 'joker') {
        score = evalScore_jokerOnBuild(score, riskScore, pile, pileIndex, stockSize, stockTop, card);
      }

      candidates.push({ sourceType: 'hand', sourceIndex: i, card, buildPileIndex: pileIndex, score });
    });
  });

  return candidates;
}

/**
 * evalScore_jokerOnBuild(score, riskScore, pile, pileIndex, stockSize, stockTop, card)
 * Joker-Speziallogik beim Bewerten eines Baustapel-Zugs.
 * Berücksichtigt Stockabbau-Vorrang, Gegner-Blockade und Zukunftswert.
 * @returns {number} Angepasster Score
 */
function evalScore_jokerOnBuild(score, riskScore, pile, pileIndex, stockSize, stockTop, card) {
  const jokerValue   = pile.length === 0 ? 1 : pile[pile.length - 1].value + 1;
  const matchesStock = stockTop && (jokerValue === stockTop || stockTop === undefined);

  // Joker auf niedrigem Stapel ohne Stockabbau-Vorteil: bestrafen
  if (pile.length < 5 && stockSize > 12 && !matchesStock) {
    try {
      if (canRemoveStockCard()) {
        // Stockabbau möglich → Joker kann doch gespielt werden
        riskScore -= KONFIG.SCORE_39;
        score     += KONFIG.SCORE_39; // Kompensation
        if (KONFIG.DEBUG_39) debugInfo.push(`📌39 🟢 Stockabbau möglich: riskScore -= ${KONFIG.SCORE_39}`);
      } else {
        const dynamicMalus = KONFIG.SCORE_6 * (1 - (Game.players.ai.stock.length / 20));
        score -= dynamicMalus;
        if (KONFIG.DEBUG_6) debugInfo.push(`📌6 ⬇️ Joker-Malus (niedriger Stapel): -${dynamicMalus.toFixed(0)}`);
      }
    } catch (error) {
      console.error('evalScore_jokerOnBuild Fehler:', error);
      const dynamicMalus = KONFIG.SCORE_6 * (1 - (Game.players.ai.stock.length / 20));
      score -= dynamicMalus;
    }
  }

  // Joker trifft exakten Gegner-Stockwert: Superbonus
  if (matchesStock && (pile.length >= 5 || stockSize <= 10)) {
    const topHumanStock = Game.players.human.stock[Game.players.human.stock.length - 1]?.value || 1;
    const bonus         = KONFIG.SCORE_7 + (2000 * (12 - topHumanStock));
    score += bonus;
    if (KONFIG.DEBUG_7) debugInfo.push(`📌7 ⭐ Joker-Superbonus: +${bonus} (Gegner-Stock: ${topHumanStock})`);
  }

  // Zukunftswert des Jokers
  const futureValue = calculateJokerFutureValue(card, pileIndex) || 0;
  if (futureValue > 0) {
    score += futureValue * KONFIG.SCORE_8;
    if (KONFIG.DEBUG_8) debugInfo.push(`📌8 🔮 Joker-Zukunftswert: ${futureValue} × ${KONFIG.SCORE_8} = +${futureValue * KONFIG.SCORE_8}`);
  }

  return score;
}

/**
 * evalScore_stock(player) – Stockkarte auf Baustapel bewerten.
 * Stockkarten haben grundsätzlich höhere Priorität da Stockabbau das Spielziel ist.
 * @returns {Array} Kandidatenliste für Stockkarte
 */
function evalScore_stock(player) {
  const candidates = [];
  const stockCard  = Game.players[player].stock.slice(-1)[0];
  if (!stockCard) return candidates;

  Game.buildPiles.forEach((pile, pileIndex) => {
    if (!isValidBuildMove(stockCard, pileIndex)) return;

    const advancedPiles = Game.buildPiles.filter(p => p.length > 6).length;
    let score           = Math.min(KONFIG.SCORE_24, KONFIG.SCORE_10 + (KONFIG.SCORE_10_ADV * advancedPiles));

    if (KONFIG.DEBUG_10) {
      debugInfo.push(`📌10 🗃️ Stock ${stockCard.value} → Bau ${pileIndex + 1}: Score=${score} (${advancedPiles} fortg. Stapel)`);
    }

    candidates.push({
      sourceType:     'stock',
      sourceIndex:    0,
      card:           stockCard,
      buildPileIndex: pileIndex,
      score
    });
  });

  return candidates;
}

/**
 * evalScore_discard(player) – Ablagestapelkarten auf Baustapel bewerten.
 * Nur die oberste Karte jedes Ablagestapels wird bewertet.
 * @returns {Array} Kandidatenliste für Ablagestapelkarten
 */
function evalScore_discard(player) {
  const candidates = [];

  Game.players[player].discards.forEach((pile, discardIndex) => {
    if (pile.length === 0) return;
    const card = pile[pile.length - 1];

    Game.buildPiles.forEach((buildPile, buildIndex) => {
      if (!isValidBuildMove(card, buildIndex)) return;

      let score = KONFIG.SCORE_26;
      if (KONFIG.DEBUG_26) debugInfo.push(`📌26 🗄️ Ablage ${discardIndex + 1} Basis: ${KONFIG.SCORE_26}`);

      // Kartenwert-Bonus
      const wert = card.value;
      try {
        if (!isNaN(wert) && isFinite(wert)) {
          score += wert * 50;
        } else {
          score += KONFIG.SCORE_27; // Joker-Fallback
          if (KONFIG.DEBUG_27) debugInfo.push(`📌27 ★ Joker-Fallback in Ablage: +${KONFIG.SCORE_27}`);
        }
        if (wert === '★' && KONFIG.DEBUG_27) debugInfo.push(`📌27★ Joker in Ablage: +${KONFIG.SCORE_27}`);
      } catch (e) { score += KONFIG.SCORE_27; }

      // Stock-Synergie-Bonus
      if (Game.players[player].stock.some(s => s.value === card.value + 1)) {
        score += KONFIG.SCORE_23;
        if (KONFIG.DEBUG_23) debugInfo.push(`📌23 🔗 Stock-Synergie +${KONFIG.SCORE_23} für Karte ${card.value}`);
      }

      candidates.push({
        sourceType:     'discard',
        sourceIndex:    discardIndex,
        card,
        buildPileIndex: buildIndex,
        score
      });
    });
  });

  return candidates;
}

/**
 * evalScore_dedup(candidates) – Duplikate entfernen: besten Score pro Handkarten-Index.
 * Verhindert dass dieselbe Handkarte mehrfach mit demselben Baustapel bewertet wird.
 * @param {Array} candidates – Rohe Kandidatenliste
 * @returns {Array} Deduplizierte Kandidatenliste
 */
function evalScore_dedup(candidates) {
  const unique    = [];
  const seenHand  = {};

  for (const c of candidates) {
    if (c.sourceType === 'hand') {
      const key = c.sourceIndex;
      if (!seenHand.hasOwnProperty(key) || seenHand[key].score < c.score) {
        seenHand[key] = c;
      }
    } else {
      unique.push(c);
    }
  }

  for (const key in seenHand) unique.push(seenHand[key]);
  return unique;
}

/**
 * evalScore_filter(candidates, player, nagel40, nagel41, nagel42) – Joker-Filter anwenden.
 * Filtert Joker-Züge mit zu niedrigem Score heraus.
 * Wendet dynamische Prioritäten (Stockangriff, Serienunterbrechung) an.
 * @returns {Array} Gefilterte und sortierte Kandidatenliste
 */
function evalScore_filter(candidates, player, nagel40, nagel41, nagel42) {
  if (candidates.length === 0) return [];

  // Joker-Gewichtung anwenden
  const avgScore         = candidates.reduce((s, m) => s + m.score, 0) / candidates.length;
  const dynamicThreshold = avgScore * nagel40;
  candidates.forEach(m => { if (m.card.type === 'joker') m.score *= nagel42; });

  // Joker-Züge unter Schwellenwert filtern
  const hasNonJoker      = candidates.some(m => m.card.type !== 'joker' && m.score > 0);
  const filtered         = hasNonJoker
    ? candidates.filter(m => {
        if (m.card.type === 'joker' && m.score < dynamicThreshold) {
          if (KONFIG.DEBUG_45) debugInfo.push(`📌45 ❌ Joker ${m.card.value} ignoriert (Score: ${m.score.toFixed(0)} < Schwelle: ${dynamicThreshold.toFixed(0)})`);
          return false;
        }
        return true;
      })
    : candidates;

  // Wenn nur Joker-Züge und alle unter Mindestbewertung → Joker auf Ablage
  if (!hasNonJoker && filtered.length > 0) {
    const onlyJoker      = filtered.every(m => m.card.type === 'joker');
    const bestJokerScore = Math.max(...filtered.map(m => m.score));
    if (onlyJoker && bestJokerScore < nagel41) {
      if (KONFIG.DEBUG_45) debugInfo.push(`📌45 ⏭️ Kein sinnvoller Joker-Zug (Best: ${bestJokerScore.toFixed(0)} < Min: ${nagel41})`);
      Joker_auf_Ablage = true;
      if (KONFIG.DEBUG_51) debugInfo.push(`📌51 ★ Joker_auf_Ablage = true`);
      return [];
    }
  }

  // Dynamische Prioritäten anwenden
  const enemyAnalysis = predictEnemyStock('human');
  const priorities    = calculateDynamicPriorities();

  filtered.forEach(move => {
    // Stock-Angriff Bonus
    if (move.card.value === enemyAnalysis.nextExpected) {
      const n34    = Game.players.human.stock.length < 10 ? KONFIG.SCORE_34_HIGH : KONFIG.SCORE_34_LOW;
      move.score  += n34 * priorities.stockAttack;
      if (KONFIG.DEBUG_34) debugInfo.push(`📌34 ⚔️ Stock-Angriff +${(n34 * priorities.stockAttack).toFixed(0)}`);
    }

    // Serienunterbrechung Bonus
    if (detectConsecutiveDiscards('human').includes(move.card.value)) {
      move.score += Math.round(KONFIG.SCORE_35 * priorities.seriesDisrupt);
      if (KONFIG.DEBUG_35) debugInfo.push(`📌35 🔗 Serienunterbrechung +${Math.round(KONFIG.SCORE_35 * priorities.seriesDisrupt)}`);
    }

    // Risiko-Gewichtung nach Spielphase
    move.score = Math.round(move.score * priorities.riskTaking);
  });

  return filtered.sort((a, b) => b.score - a.score);
}

/**
 * calculateJokerFutureValue(card, buildPileIndex) – Zukunftswert eines Joker-Zugs.
 * Bewertet wie viele zukünftige Züge durch diesen Joker ermöglicht werden.
 * @returns {number} Zukunftswert
 */
function calculateJokerFutureValue(card, buildPileIndex) {
  let futureValue = 0;
  const buildPile = Game.buildPiles[buildPileIndex];
  let pileValue   = 1;

  if (buildPile.length > 0) {
    const topCard = buildPile[buildPile.length - 1];
    if (topCard) {
      pileValue = topCard.type === 'joker' ? buildPile.length : parseInt(topCard.value) + 1;
    } else {
      console.error('calculateJokerFutureValue: topCard undefiniert');
      pileValue = 1;
    }
  }

  if (isNaN(pileValue)) { console.error('Ungültiger pileValue:', pileValue); return 0.01; }

  const currentJokerValue = card.type === 'joker'
    ? getJokerValue(buildPile, buildPile.length)
    : pileValue;

  // Progressiver Bonus wenn Joker-Wert im KI-Stock benötigt wird
  if (neededForStock(currentJokerValue)) {
    const progressiveBonus = KONFIG.SCORE_25 * (12 - currentJokerValue);
    futureValue += progressiveBonus;
    if (KONFIG.DEBUG_25) debugInfo.push(`📌25 🟢 Joker-Future: Wert ${currentJokerValue} im Stock → +${progressiveBonus}`);
  }

  // Zukunftszüge zählen
  for (let i = 1; i <= 5; i++) {
    if (pileValue + i <= 12) futureValue++;
  }

  // Bonus für fortgeschrittene Stapelposition
  if (pileValue >= 8) {
    futureValue += KONFIG.SCORE_21A;
    if (KONFIG.DEBUG_21a) debugInfo.push(`📌21a 🌟 Langfrist-Bonus +${KONFIG.SCORE_21A} (pileValue=${pileValue})`);
  }

  return futureValue;
}

/**
 * calculateGapSize(pile, card) – Lückengröße auf einem Baustapel berechnen.
 * Lücke = Abstand zwischen Kartenwert und aktuellem Baustapelwert.
 * @returns {number} Lückengröße (0 wenn keine Lücke oder ungültig)
 */
function calculateGapSize(pile, card) {
  if (!card || !card.value) return 0.01;
  const cardValue = parseInt(card.value, 10);
  if (!pile || pile.length === 0) return cardValue;
  const lastCard  = pile[pile.length - 1];
  const lastValue = parseInt(lastCard.value, 10);
  const gap       = cardValue - lastValue;
  return gap > 0 ? gap : 0;
}

/**
 * calculateFutureRisk(card, pileIndex) – Zukunftsrisiko einer Karte berechnen.
 * Höhere Karten haben mehr Zukunftspotenzial → niedrigeres Risiko-Gefühl.
 * @returns {number} Risikobewertung
 */
function calculateFutureRisk(card, pileIndex) {
  if (!card || !card.value) return 0.01;
  const cardValue   = parseInt(card.value, 10);
  const basisFaktor = 5;
  const indexFaktor = (pileIndex !== undefined) ? pileIndex : 0;
  return (12 - cardValue) * (basisFaktor + indexFaktor);
}

/**
 * calculateDynamicPriorities() – Phasenabhängige KI-Gewichtungen berechnen.
 * Frühe Phase: vorsichtig. Mittlere Phase: ausgewogen. Späte Phase: risikofreudig.
 * @returns {Object} {stockAttack, seriesDisrupt, riskTaking}
 */
function calculateDynamicPriorities() {
  const phase      = 1 - (Game.drawPile.length / 144); // 0 = Anfang, 1 = Ende
  const enemyStock = Game.players.human.stock.slice(-1)[0]?.value || 1;
  return {
    stockAttack:   Math.min(1.5, (12 - enemyStock) / 10 * phase),
    seriesDisrupt: 0.4 + (Game.tracking.discardHistory.human.values.length * 0.03),
    riskTaking:    phase < 0.3 ? 0.8 : phase < 0.7 ? 1.0 : 1.3
  };
}

/**
 * getOpponentBlockingPotential(card, buildPileIndex) – Blockadepotenzial berechnen.
 * Wie stark hilft diese Karte dem menschlichen Gegner wenn wir sie legen?
 * Berücksichtigt: Folgekarten, Sequenzkontrolle, Joker-Risiko.
 * @returns {number} riskScore (höher = gefährlicher für uns)
 */
function getOpponentBlockingPotential(card, buildPileIndex) {
  const opponentVisible   = [
    ...Game.players.human.stock.slice(-1),
    ...Game.players.human.discards.flat()
  ];
  let riskScore           = 0;
  const opponentStockSize = Game.players.human.stock.length;

  opponentVisible.forEach(oppCard => {
    // Direkte Folgekarte: wir legen vor, Gegner kann danach legen
    if (oppCard.value === card.value + 1) {
      const stockFactor      = 1 - (Game.players.ai.stock.length / 20);
      const humanStockImpact = 1 + (15 - Game.players.human.stock.length) / 15;
      riskScore += KONFIG.SCORE_1 * stockFactor * humanStockImpact;
      if (KONFIG.DEBUG_1) debugInfo.push(`📌1 ⚠️ Folgekarte: +${(KONFIG.SCORE_1 * stockFactor * humanStockImpact).toFixed(0)}`);

      // Wenn unser Stock fast leer ist: weniger Risiko (wir gewinnen sowieso bald)
      if (Game.players.ai.stock.length <= 5) {
        riskScore -= KONFIG.SCORE_2 * (6 - Game.players.ai.stock.length);
        if (KONFIG.DEBUG_2) debugInfo.push(`📌2 🟢 Endphase-Reduktion: -${KONFIG.SCORE_2 * (6 - Game.players.ai.stock.length)}`);
      }
    }

    // Sequenzkontrolle: Gegner hat Vorgängerkarte
    if (oppCard.value === card.value - 1) {
      riskScore += KONFIG.SCORE_28;
      if (KONFIG.DEBUG_28) debugInfo.push(`📌28 🔗 Sequenz-Kontrolle +${KONFIG.SCORE_28}`);
      if (opponentStockSize <= 3) {
        riskScore += KONFIG.SCORE_29;
        if (KONFIG.DEBUG_29) debugInfo.push(`📌29 🚨 Kritisch: Gegner-Stock ≤ 3 +${KONFIG.SCORE_29}`);
      }
    }

    // Gegner hat Joker: flexibler Gegenzug möglich
    if (oppCard.type === 'joker' && card.value >= 5) {
      riskScore += KONFIG.SCORE_4_OPP_JOKER;
      if (KONFIG.DEBUG_4) debugInfo.push(`📌4 ★ Gegner-Joker +${KONFIG.SCORE_4_OPP_JOKER}`);
      if (opponentStockSize <= 3) {
        riskScore += KONFIG.SCORE_30;
        if (KONFIG.DEBUG_30) debugInfo.push(`📌30 🚨 Kritisch + Joker +${KONFIG.SCORE_30}`);
      }
    }
  });

  // Lückenfüller-Erkennung: unsere Karte füllt eine Gegner-Sequenzlücke
  opponentVisible.forEach((cardA, i) => {
    opponentVisible.slice(i + 1).forEach(cardB => {
      if (Math.abs(cardA.value - cardB.value) === 2) {
        if (card.value === (cardA.value + cardB.value) / 2) {
          riskScore += KONFIG.SCORE_3;
          if (KONFIG.DEBUG_3) debugInfo.push(`📌3 🎯 Lückenfüller: +${KONFIG.SCORE_3} (${cardA.value}-${card.value}-${cardB.value})`);
        }
      }
    });
  });

  // Joker auf Ablage: Stockabbau hat Vorrang → riskScore reduzieren
  if (Joker_auf_Ablage === true) {
    delayWithCallback(10, () => {
      try {
        riskScore -= KONFIG.SCORE_49;
        if (KONFIG.DEBUG_49) {
          debugInfo.push(`📌49 ★ Joker auf Ablage – riskScore -= ${KONFIG.SCORE_49}`);
        }
        Joker_auf_Ablage = false;
      } catch (error) {
        console.error('getOpponentBlockingPotential Fehler:', error);
        debugInfo.push(`📌49 ❌ Fehler: ${error.message}`);
        Joker_auf_Ablage = false;
      }
    });
  }

  if (KONFIG.DEBUG_50) debugInfo.push(`📌50 🔚 RiskScore für ${card.value}: ${riskScore}`);
  return riskScore;
}

/**
 * canRemoveStockCard() – Prüft ob die KI ihre Stockkarte spielen kann.
 * Sicherheitsfunktion mit mehreren Validierungen.
 * @returns {boolean} true wenn Stockkarte spielbar
 */
function canRemoveStockCard() {
  try {
    if (!Game?.players?.ai) return false;
    const stock = Game.players.ai.stock;
    if (!Array.isArray(stock) || stock.length === 0) return false;
    const topCard = stock[stock.length - 1];
    if (!topCard || !('value' in topCard)) return false;
    if (typeof topCard.removable === 'boolean' && !topCard.removable) return false;
    if (topCard.type === 'number') {
      const value = parseInt(topCard.value, 10);
      if (isNaN(value) || value < 1 || value > 12) return false;
    }
    // stockCardIsRemovable wird in initGame() auf true gesetzt
    if (typeof Game.stockCardIsRemovable === 'boolean' && Game.stockCardIsRemovable !== true) return false;
    return true;
  } catch (err) {
    return false;
  }
}

/**
 * neededForStock(jokerValue) – Prüft ob ein Joker-Wert im KI-Stock benötigt wird.
 * @param {number} jokerValue – Der Wert den der Joker vertreten würde
 * @returns {boolean}
 */
function neededForStock(jokerValue) {
  return Game.players.ai.stock.some(
    card => card.type === 'number' && card.value === jokerValue
  );
}

/**
 * predictEnemyStock(opponent) – Gegner-Stockwert wahrscheinlichkeitsbasiert vorhersagen.
 * Analysiert sichtbare Karten und berechnet welcher Wert mit höchster
 * Wahrscheinlichkeit als nächstes aus dem Stock kommen wird.
 * @param {string} opponent – 'human' oder 'ai'
 * @returns {Object} {nextExpected, confidence}
 */
function predictEnemyStock(opponent) {
  try {
    // Alle sichtbaren Karten sammeln
    const visible = [
      ...Game.players[opponent].discards.flat(),
      ...Game.buildPiles.flat(),
      ...Game.players[opponent].hand
    ]
    .filter(c => c)
    .map(c => c.type === 'joker' ? 'joker' : c.value);

    const total = 144 - visible.length;
    const probs = Object.entries(Game.tracking.deckComposition).map(([k, v]) => ({
      value: k,
      prob:  (v - visible.filter(x => x == k).length) / total
    }));
    const best = probs.reduce((a, b) => a.prob > b.prob ? a : b);
    return {
      nextExpected: best.value === 'joker' ? null : parseInt(best.value),
      confidence:   best.prob
    };
  } catch {
    return { nextExpected: 1, confidence: 0.5 };
  }
}

/**
 * detectConsecutiveDiscards(player) – Erkennt aufeinanderfolgende Ablegesequenzen.
 * Findet 3er-Serien in der Ablage-Historie (z.B. 3,4,5 abgelegt).
 * @param {string} player – 'human' oder 'ai'
 * @returns {number[]} Array der Mittelpunktwerte erkannter Serien
 */
function detectConsecutiveDiscards(player) {
  const values = Game.tracking.discardHistory[player].values
    .filter(v => v !== 'joker' && typeof v === 'number');
  const series = [];
  for (let i = 0; i < values.length - 2; i++) {
    if (values[i + 1] === values[i] + 1 && values[i + 2] === values[i] + 2) {
      series.push(values[i] + 1);
    }
  }
  return [...new Set(series)];
}

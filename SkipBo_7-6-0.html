<!DOCTYPE html>
<!--
================================================================================
 SKIP-BO MOBILE v7.6.0 – ULTIMATIVE EDITION (VOLLSTÄNDIG & INTEGRIERT)
================================================================================
 BASIEREND AUF: v6.5.3 (stabile Basis) + v7.1.1 (Joker-Strategie) + v6.7.0 (Tiefensuche)
 
 NEU IN v7.6.0 (gegenüber v7.5.0):
 ===================================
 1. DYNAMISCHE PRIORITÄTEN vollständig in evaluateMoveCandidates integriert
    - JEDER Kandidat durchläuft: Basis → Gegneranalyse → Prioritäten → Risikoanpassung
    - stockAttack, seriesDisrupt, riskTaking werden auf JEDEN Zug angewendet
 
 2. playInDiscardPiles() vollständig implementiert (fehlte in v7.5.0)
    - Joker-Schutz: Joker nicht auf Zahlen legen
    - Zahlen nicht auf Joker legen
    - Gegnerhilfe-Erkennung mit dynamischen Strafen
    - Sequenz-Bonus für aufsteigende Reihen
    - Leerer-Stapel-Bonus
    - tracking von discardStrategy für Analyse
 
 3. trackGameObservations() vollständig wiederhergestellt
    - Unterstützt: discardStrategy, jokerAdditional, opponentDiscard, kiMove, missedStock, gameEnd
    - Generiert vollständige Analyse nach Spielende (Gegnerblockaden, Joker-Nutzung, etc.)
 
 4. JEDER KI-Zug wird sofort im Spielfeld sichtbar (Live-Update nach jeder Aktion)
    - Reihenfolge: Info-Meldung → Zug ausführen → updateView() → Pause
    - Kein "Teleport-Spiel" mehr – Züge sind einzeln sichtbar
 
 5. Alle DEBUG-Flags auf false (kein Debug-Spam im Spielbericht)
    - Bei Bedarf einzelne Flags auf true setzen für detaillierte Logs
 
 6. Rekursionsschutz mit max. 15 Tiefe – keine Endlosschleifen
 7. pressTimer global deklariert – kein ReferenceError mehr
 8. VOLLSTÄNDIGE AUSWERTUNG im Endgame-Fenster
 
 AUSFÜHRLICHE KOMMENTARE zu jeder Funktion und jedem DEBUG-Flag.
================================================================================
-->

  }

  .card {
    border: 2px solid #000 !important;
    border-radius: 8px;
    aspect-ratio: 2 / 3;

    height: auto !important;

  .card-corner.top-left { top: 5px; left: 5px; }
  .card-corner.top-right { top: 5px; right: 5px; }
  .card-corner.bottom-left { bottom: 5px; left: 5px; transform: rotate(180deg); }
  .card-corner.bottom-right { bottom: 5px; right: 5px; transform: rotate(180deg); }
  .card-middle {

  @keyframes card-float {

  .field::after {

  #info-window {

  /* Stock-Highlight für aktiven Spieler */

  /* Overlay-Styles für Einstellungen */
  #overlay-container {
    position: fixed;
    top: 20%;
    left: 50%;

  #overlay-info { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); width: 70%; bottom: 90px; background: #eee; color: black; overflow-y: auto; padding: 10px; border-radius: 10px; }
  .speed-control-container { position: absolute; bottom: 20px; left: 5%; right: 5%; display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; }

  .speed-slider::-webkit-slider-thumb { width: 18px; height: 18px; background: #ffd700; border-radius: 50%; cursor: pointer; }
</style>

<script>
// =============================================================
// 🛠️ ZENTRALE KI-KONFIGURATION & DEBUG-FLAGS
// =============================================================
// ALLE WERTE KÖNNEN HIER DIREKT BEARBEITET WERDEN.
// 
// WICHTIG FÜR PRODUKTION:
// - Alle DEBUG_* Flags auf false lassen (sonst viele Log-Ausgaben)
// - Nur bei Bedarf einzelne Flags auf true setzen
// - Die SCORE_* Werte steuern das KI-Verhalten:
//   Höhere Werte = stärkere Bevorzugung dieser Strategie
// =============================================================

let KONFIG = {
  // ==========================================================
  // TEAM 1: BASIS-BEWERTUNGEN (aus v6.5.3)
  // ==========================================================
  
  // DEBUG_1: Risiko durch Gegner-Karten (true = Log-Ausgaben)
  // SCORE_1: 6000 Punkte wenn Gegner die benötigte Folgekarte besitzt
  // Verhindert, dass die KI dem Gegner in die Hände spielt.
  DEBUG_1: false, SCORE_1: 6000,
  
  // DEBUG_2: Eigenes Stock-Risiko (true = Log-Ausgaben)
  // SCORE_2: 300 Punkte Abzug wenn eigener Stock <= 5 Karten
  // Fördert vorsichtige Züge in der Endphase.
  DEBUG_2: false, SCORE_2: 300,
  
  // DEBUG_3: Lückenfüllung (true = Log-Ausgaben)
  // SCORE_3: 800 Punkte für das Schließen von Zahlenlücken
  // Belohnt das Überbrücken von Lücken im Sequenzmuster.
  DEBUG_3: false, SCORE_3: 800,
  
  // DEBUG_4: Joker-Bewertung (true = Log-Ausgaben)
  // SCORE_4_JOKER_MOVE: 60 Punkte wenn die zu legende Karte ein Joker ist
  // SCORE_4_OPP_JOKER: 60 Punkte wenn Gegner einen Joker hat
  DEBUG_4: false, SCORE_4_JOKER_MOVE: 60, SCORE_4_OPP_JOKER: 60,
  
  // DEBUG_5: Basis-Bonus für Baustapel-Züge (true = Log-Ausgaben)
  // SCORE_5: 600 Punkte für jeden legalen Zug auf einen Baustapel
  // Garantiert, dass gültige Züge überhaupt bewertet werden.
  DEBUG_5: false, SCORE_5: 600,
  
  // DEBUG_6: Joker-Malus (true = Log-Ausgaben)
  // SCORE_6: 800 Punkte Abzug für Joker auf niedrigem Stapel (<5)
  // Bestraft ineffizienten Joker-Einsatz in frühen Spielphasen.
  DEBUG_6: false, SCORE_6: 800,
  
  // DEBUG_7: Joker-Stock-Treffer (true = Log-Ausgaben)
  // SCORE_7: 15000 Punkte wenn Joker exakten Stock-Wert trifft
  // Extrem hoher Anreiz, Joker gezielt gegen den Stock einzusetzen.
  DEBUG_7: false, SCORE_7: 15000,
  
  // DEBUG_8: Joker-Zukunftswert (true = Log-Ausgaben)
  // SCORE_8: 60 Punkte Multiplikator für futureValue
  // Bewertet langfristigen Nutzen eines Joker-Einsatzes.
  DEBUG_8: false, SCORE_8: 60,
  
  // DEBUG_9: Reserviert (true = Log-Ausgaben)
  DEBUG_9: false, SCORE_9: 0,
  
  // DEBUG_10: Stockabbau-Beschleunigung (true = Log-Ausgaben)
  // SCORE_10: 5000 Basiswert für Stockabbau
  // SCORE_10_ADV: 3000 Zusatzbonus pro fortgeschrittenem Baustapel (Länge > 6)
  DEBUG_10: false, SCORE_10: 5000, SCORE_10_ADV: 3000,
  
  DEBUG_11: false,  // Reserviert (logisch mit SCORE_10 verknüpft)
  
  // DEBUG_12: Lückenbonus (true = Log-Ausgaben)
  // SCORE_12: 150 Punkte pro Lückengröße (GapSize * 150)
  DEBUG_12: false, SCORE_12: 150,
  
  // DEBUG_13: Ablage-Basisscore (true = Log-Ausgaben)
  // SCORE_13: 150 Punkte für das Ablegen auf einen Stapel
  DEBUG_13: false, SCORE_13: 150,
  
  // DEBUG_14: Riskante Ablagen reduzieren (true = Log-Ausgaben)
  // SCORE_14: 5000 Punkte Abzug für riskante Ablagen
  DEBUG_14: false, SCORE_14: 5000,
  
  // DEBUG_15: Sequenz-Bonus (true = Log-Ausgaben)
  // SCORE_15: 120 Punkte für aufsteigende Reihen in der Ablage
  DEBUG_15: false, SCORE_15: 120,
  
  // DEBUG_16: Leerer Ablagestapel (true = Log-Ausgaben)
  // SCORE_16: 20 Punkte Bonus für leere Ablagestapel
  DEBUG_16: false, SCORE_16: 20,
  
  // DEBUG_17: Niedrigere Karten (true = Log-Ausgaben)
  // SCORE_17: 30 Punkte Bonus für niedrigere Karten in Ablage
  DEBUG_17: false, SCORE_17: 30,
  
  DEBUG_18: false, SCORE_18: 0,  // Reserviert
  
  // DEBUG_19: Malus pro Ablagekarte (true = Log-Ausgaben)
  // SCORE_19: 2 Punkte Abzug pro Karte im Ablagestapel
  DEBUG_19: false, SCORE_19: 2,
  
  // DEBUG_20: Gegnerhilfe-Blockade (true = Log-Ausgaben)
  // SCORE_20: 15000 Punkte Abzug wenn Ablage dem Gegner hilft
  DEBUG_20: false, SCORE_20: 15000,
  
  // DEBUG_21a: Langfristige Planung (true = Log-Ausgaben)
  // SCORE_21A: 3 Punkte Bonus für Stapelwert >= 8
  DEBUG_21a: false, SCORE_21A: 3,
  
  DEBUG_22: false, SCORE_22: 0,  // Reserviert
  
  // DEBUG_23: Discard-Stock-Synergie (true = Log-Ausgaben)
  // SCORE_23: 600 Punkte wenn Ablage zum eigenen Stock passt
  DEBUG_23: false, SCORE_23: 600,
  
  // DEBUG_24: Stock-min Fallback (true = Log-Ausgaben)
  // SCORE_24: 8000 Punkte maximale Priorisierung für Stockabbau
  DEBUG_24: false, SCORE_24: 8000,
  
  // DEBUG_25: Joker Future Bonus (true = Log-Ausgaben)
  // SCORE_25: 50 Punkte * (12 - Wert) progressiv
  DEBUG_25: false, SCORE_25: 50,
  
  // DEBUG_26: Ablagestapelzug Basis (true = Log-Ausgaben)
  // SCORE_26: 300 Punkte Grundbewertung für strategisches Ablegen
  DEBUG_26: false, SCORE_26: 300,

// =============================================================
// HILFSFUNKTION: Verzögerung für sichtbare Züge
// =============================================================
// Diese Funktion pausiert die Ausführung für eine bestimmte Zeit.
// Die Dauer wird durch spielGeschwindigkeit (0-20 Sekunden) multipliziert.
// multiplier: Zusätzlicher Faktor für längere/kürzere Pausen
function pauseForSeconds(multiplier = 1) {
  return new Promise(resolve => {
    setTimeout(resolve, spielGeschwindigkeit * multiplier * 1000);
  });
}

}

// =============================================================
// SPIELINITIALISIERUNG
// =============================================================
async function initGame() {
  // Spielstatus zurücksetzen
  isGameOver = false;
  debugInfo = [];
  currentPlayer = 'human';
  
  // Gespeicherte Geschwindigkeit aus localStorage laden
  try {
    const savedSpeed = localStorage.getItem('skipbo-speed');
    if (savedSpeed) spielGeschwindigkeit = parseInt(savedSpeed);
  } catch (e) {
    console.error('Fehler beim Zugriff auf localStorage:', e);
  }

  // ========== 1. DECK ERSTELLEN ==========
  // 12x Zahlenkarten von 1 bis 12 (insgesamt 144 Zahlenkarten)
  Game.deck = [];
  for (let s = 0; s < 12; s++) {
    for (let n = 1; n <= 12; n++) {
      Game.deck.push({ type: 'number', value: n });
    }
  }
  // 12 Jokerkarten (★)
  for (let j = 0; j < 12; j++) {
    Game.deck.push({ type: 'joker', value: '★' });
  }

  // ========== 2. DECK MISCHEN (Fisher-Yates) ==========
  for (let i = Game.deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [Game.deck[i], Game.deck[j]] = [Game.deck[j], Game.deck[i]];
  }

  // ========== 3. KARTEN VERTEILEN ==========
  // Jeder Spieler: 5 Handkarten + 20 Stockkarten
  Game.players.human.hand = Game.deck.splice(0, 5);
  Game.players.ai.hand = Game.deck.splice(0, 5);
  Game.players.human.stock = Game.deck.splice(0, 20);
  Game.players.ai.stock = Game.deck.splice(0, 20);
  Game.drawPile = Game.deck;
  Game.stockCardIsRemovable = true;

  // Sichtbarkeit der Handkarten (Spieler sieht seine Karten, Gegner sieht Rückseite)
  Game.players.human.hand.forEach(card => card.faceUp = true);
  Game.players.ai.hand.forEach(card => card.faceUp = false);

  // ========== 4. INITIALISIERUNG NACHZIEHEN ==========
  drawCardsUntilFive('ai');
  updateView();
  showMessage('Spiel initialisiert. Du bist am Zug!');
  
  // UI-Elemente aktivieren
  enableDraggableStatusLabel();
  showOverlay();
  setupTouchEvents();

  // Wenn KI am Zug ist, starte KI-Zug nach 3 Sekunden
  if (currentPlayer === 'ai') setTimeout(() => aiTurn(0), 3000);

  // ========== 5. TRACKING INITIALISIEREN ==========
  Game.tracking = {
    deckComposition: Array.from({ length: 12 }, (_, i) => 12).concat(Array(12).fill('joker')),
    discardHistory: { human: { values: [], timestamps: [] }, ai: { values: [], timestamps: [] } },
    stockPredictions: { human: { nextExpected: 1, confidence: 0 }, ai: { nextExpected: 1, confidence: 0 } }
  };

  // Alte Overlays entfernen
  document.querySelectorAll('.strategy-tag, .ai-prediction-overlay').forEach(el => el.remove());
}

// =============================================================
// EVENT-HANDLING & TOUCH (Karten auswählen und ablegen)
// =============================================================
function setupTouchEvents() {
  if (isGameOver) return;
  
  // Karten-Klick: Auswählen
  document.querySelectorAll('.card').forEach(card => {
    card.onclick = handleCardSelect;
  });
  
  // Bau- und Ablagestapel: Karte ablegen
  document.querySelectorAll('.build-pile, .human-area [data-label*="Ablage"]').forEach(field => {
    field.onclick = handleCardPlace;
  });
  
  // Statusleiste: Long-Press für Vibration (optional)
  const statusLabel = document.getElementById('status-label');
  if (statusLabel) {
    statusLabel.ontouchstart = () => {
      longPressTimer = setTimeout(() => {
        if (navigator.vibrate) navigator.vibrate(50);
      }, 1000);
    };
    statusLabel.ontouchend = () => clearTimeout(longPressTimer);
    statusLabel.ontouchmove = () => clearTimeout(longPressTimer);
  }
}

// =============================================================
// KARTE AUSWÄHLEN (Spieler-Zug)
// =============================================================
function handleCardSelect(event) {
  if (isGameOver) return;
  
  // Wenn auf Bau- oder Ablagestapel geklickt wird, aber eine Karte ausgewählt ist → ablegen
  if (event.currentTarget.closest('.build-pile')) {
    if (selectedCard) {
      handleCardPlace(event);
    }
    return;
  }
  
  event.preventDefault();
  if (currentPlayer !== 'human') return;
  
  // Vorherige Auswahl entfernen
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  const cardElement = event.currentTarget;
  
  // Wenn gleiche Karte erneut ausgewählt → Auswahl aufheben
  if (selectedCard === cardElement) {
    selectedCard = null;
    selectedSource = null;
    selectedIndex = null;
    showMessage("Auswahl aufgehoben.");
    return;
  }
  
  // Neue Karte auswählen
  cardElement.classList.add('selected');
  selectedCard = cardElement;
  selectedSource = getSourceType(cardElement);
  selectedIndex = getSourceIndex(cardElement);
  showMessage(`Karte aus ${selectedSource} ausgewählt. Wähle ein Ziel.`);
}

// =============================================================
// KARTE ABLEGEN (Spieler-Zug)
// =============================================================
function handleCardPlace(event) {
  if (isGameOver) return;
  event.preventDefault();
  
  if (!selectedCard) {
    showMessage('Bitte zuerst eine Karte auswählen');
    return;
  }
  
  const el = event.currentTarget || event.target;
  const target = el.closest('.build-pile') || el.closest('[data-label*="Ablage"]');
  if (!target) return;
  
  if (currentPlayer !== 'human') {
    showMessage('Es ist nicht dein Zug!');
    return;
  }
  
  let success = false;
  const wasLastHandCard = selectedSource === 'hand' && Game.players.human.hand.length === 1;
  
  // Auf Baustapel legen
  if (target.classList.contains('build-pile') || target.closest('.build-pile')) {
    const buildPiles = document.querySelectorAll('.build-pile');
    const actualPile = target.classList.contains('build-pile') ? target : target.closest('.build-pile');
    const buildPileIndex = Array.from(buildPiles).indexOf(actualPile);
    
    if (handleBuildPileDrop(currentPlayer, selectedSource, selectedIndex, buildPileIndex)) {
      success = true;
      showMessage('Du hast eine Karte auf Baustapel gelegt');
      if (wasLastHandCard) {
        drawCardsUntilFive('human');
        drawCardsUntilFive('ai');
      }
    } else {
      showMessage('Dieser Zug ist nicht erlaubt');
    }
  }
  // Auf Ablagestapel legen
  else if (target.matches('[data-label*="Ablage"]') || target.closest('[data-label*="Ablage"]')) {
    const actualDiscard = target.matches('[data-label*="Ablage"]') ? target : target.closest('[data-label*="Ablage"]');
    const discardPiles = document.querySelectorAll('.human-area [data-label*="Ablage"]');
    const discardPileIndex = Array.from(discardPiles).indexOf(actualDiscard);
    
    if (handleDiscardPileDrop(currentPlayer, selectedSource, selectedIndex, discardPileIndex)) {
      success = true;
      showMessage('Du hast eine Karte auf Ablagestapel gelegt');
      switchPlayer();
    }
  }
  
  if (success) {
    selectedCard = null;
    selectedSource = null;
    selectedIndex = null;
    document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
    updateView();
    if (checkForWinner()) return;
    setupTouchEvents();
  }
}

// =============================================================
// QUELLE DER AUSGEWÄHLTEN KARTE BESTIMMEN
// =============================================================
function getSourceType(element) {
  if (element.closest('.hand')) return 'hand';
  if (element.closest('.stock')) return 'stock';
  if (element.closest('[data-label*="Ablage"]')) return 'discard';
  return null;
}

// =============================================================
// INDEX DER AUSGEWÄHLTEN KARTE BESTIMMEN
// =============================================================
function getSourceIndex(element) {
  if (element.closest('.hand')) {
    return Array.from(element.parentElement.children).indexOf(element);
  }
  if (element.closest('[data-label*="Ablage"]')) {
    const discardPiles = document.querySelectorAll('.human-area [data-label*="Ablage"]');
    return Array.from(discardPiles).indexOf(element.closest('[data-label*="Ablage"]'));
  }
  return 0.01;
}

// =============================================================
// JOKER-WERT AUF BAUSTAPEL BERECHNEN
// =============================================================
function getJokerValue(buildPile, jokerPosition) {
  if (jokerPosition === 0) return 1;
  const previousCard = buildPile[jokerPosition - 1];
  return previousCard.type === 'joker' ? jokerPosition + 1 : parseInt(previousCard.value) + 1;
}

// =============================================================
// KARTE AUF BAUSTAPEL LEGEN (KERNLOGIK)
// =============================================================
function handleBuildPileDrop(player, sourceType, sourceIndex, buildPileIndex) {
  let card, sourceArray;
  
  switch (sourceType) {
    case 'hand':
      sourceArray = Game.players[player].hand;
      card = sourceArray[sourceIndex];
      break;
    case 'stock':
      sourceArray = Game.players[player].stock;
      card = sourceArray[sourceArray.length - 1];
      break;
    case 'discard':
      sourceArray = Game.players[player].discards[sourceIndex];
      if (sourceArray?.length > 0) {
        card = sourceArray[sourceArray.length - 1];
      } else {
        return false;
      }
      break;
    default:
      return false;
  }
  
  if (!card) return false;
  
  // Prüfen ob der Zug erlaubt ist
  if (isValidBuildMove(card, buildPileIndex)) {
    Game.buildPiles[buildPileIndex].push(card);
    if (sourceType === 'hand') sourceArray.splice(sourceIndex, 1);
    else sourceArray.pop();
    
    // Wenn Baustapel voll (12), leeren und in Nachziehstapel mischen
    if (isBuildPileComplete(buildPileIndex)) clearBuildPile(buildPileIndex);
    return true;
  }
  return false;
}

// =============================================================
// KARTE AUF ABLAGESTAPEL LEGEN (KERNLOGIK)
// =============================================================
function handleDiscardPileDrop(player, sourceType, sourceIndex, discardPileIndex) {
  // Automatische Ablage für KI (wenn keine Karte ausgewählt)
  if (!selectedCard && player === 'ai') {
    if (Game.players[player].hand.length > 0) {
      const criticalNumbers = getOpponentCriticalNumbers();
      let safestIndex = 0, lowestScore = Infinity;
      
      Game.players[player].hand.forEach((card, i) => {
        let score = 0;
        score += criticalNumbers.includes(card.value + 1) ? KONFIG.SCORE_37 : 0;
        const stockTop = Game.players[player].stock.slice(-1)[0]?.value || 0;
        let calculatedValue = Math.abs(card.value - stockTop) * KONFIG.SCORE_38;
        if (!isNaN(calculatedValue) && isFinite(calculatedValue)) score += calculatedValue;
        let bonusValue = (card.type === 'joker') ? KONFIG.SCORE_33 : 0;
        if (!isNaN(bonusValue) && isFinite(bonusValue)) score += bonusValue;
        score += getDiscardSequenceBonus(player, discardPileIndex, card);
        if (score < lowestScore) { lowestScore = score; safestIndex = i; }
      });
      
      selectedCard = Game.players[player].hand[safestIndex];
      showMessage(`Automatische Ablage: Karte (${selectedCard.value}) gewählt.`);
    } else {
      showMessage('Keine Karte verfügbar zum Ablegen.');
      return false;
    }
  }
  
  let card, sourceArray;
  switch (sourceType) {
    case 'hand':
      sourceArray = Game.players[player].hand;
      card = sourceArray[sourceIndex];
      break;
    case 'stock':
      showMessage(`${player === 'human' ? 'Du' : 'KI'} kann keine Stockkarten in die Ablage legen.`);
      return false;
    default:
      return false;
  }
  
  if (card) {
    if (!Game.players[player].discards[discardPileIndex]) {
      Game.players[player].discards[discardPileIndex] = [];
    }
    Game.players[player].discards[discardPileIndex].push(card);
    if (sourceType === 'hand') sourceArray.splice(sourceIndex, 1);
    else sourceArray.pop();
    
    // Tracking für Analyse
    if (player === 'human') {
      trackGameObservations('opponentDiscard', { cardValue: card.value });
    }
    
    try {
      const key = card.type === 'joker' ? 'joker' : card.value;
      if (Game.tracking.deckComposition[key] > 0) Game.tracking.deckComposition[key]--;
      Game.tracking.discardHistory[player].values.push(key);
      Game.tracking.discardHistory[player].timestamps.push(Date.now());
    } catch(e) {}
    return true;
  }
  
  showMessage(`${player === 'human' ? 'Du' : 'KI'} konnte keine Karte ablegen.`);
  return false;
}

// =============================================================
// HANDKARTEN AUF 5 AUFFÜLLEN (VOM NACHZIEHSTAPEL)
// =============================================================
function drawCardsUntilFive(player) {
  while (Game.players[player].hand.length < 5 && Game.drawPile.length > 0) {
    const card = Game.drawPile.pop();
    card.faceUp = player === 'human';
    Game.players[player].hand.push(card);
  }
  updateView();
}

// =============================================================
// PRÜFT OB JOKER-WERT IM STOCK BENÖTIGT WIRD
// =============================================================
function neededForStock(jokerValue) {
  return Game.players.ai.stock.some(card => card.type === 'number' && card.value === jokerValue);
}

// =============================================================
// KRITISCHE ZAHLEN DES GEGNERS ERMITTELN (für Blockade-Strategie)
// =============================================================
function getOpponentCriticalNumbers() {
  const criticalNumbers = [];
  const humanStock = Game.players.human.stock;
  if (humanStock.length > 0) {
    criticalNumbers.push(parseInt(humanStock[humanStock.length - 1].value) + 1);
  }
  Game.players.human.discards.forEach(pile => {
    if (pile.length > 0) {
      criticalNumbers.push(parseInt(pile[pile.length - 1].value) + 1);
    }
  });
  return [...new Set(criticalNumbers)];
}

// =============================================================
// PRÜFT OB STOCKKARTE ENTFERNT WERDEN KANN
// =============================================================
function canRemoveStockCard() {
  try {
    if (!Game?.players?.ai) return false;
    const stock = Game.players.ai.stock;
    if (!Array.isArray(stock) || stock.length === 0) return false;
    const topCard = stock[stock.length - 1];
    if (!topCard || !('value' in topCard)) return false;
    if (topCard.type === 'number') {
      const value = parseInt(topCard.value, 10);
      if (isNaN(value) || value < 1 || value > 12) return false;
    }
    return true;
  } catch(err) { return false; }
}

// =============================================================
// BASIS-KI-FUNKTIONEN (Blocking, Risiko, Future, Gap)
// =============================================================

// =============================================================
// GEGNER-BLOCKADE-POTENZIAL BERECHNEN
// =============================================================
function getOpponentBlockingPotential(card, buildPileIndex) {
  const opponentVisible = [...Game.players.human.stock.slice(-1), ...Game.players.human.discards.flat()];
  let riskScore = 0;
  const opponentStockSize = Game.players.human.stock.length;
  
  opponentVisible.forEach(oppCard => {
    // Wenn Gegner die benötigte Folgekarte hat (card.value + 1)
    if (oppCard.value === card.value + 1) {
      const stockFactor = 1 - (Game.players.ai.stock.length / 20);
      const humanStockImpact = 1 + (15 - Game.players.human.stock.length) / 15;
      riskScore += KONFIG.SCORE_1 * stockFactor * humanStockImpact;
      if (Game.players.ai.stock.length <= 5) {
        riskScore -= KONFIG.SCORE_2 * (6 - Game.players.ai.stock.length);
      }
    }
    // Wenn Gegner die vorherige Karte hat (card.value - 1) → Sequenzkontrolle
    if (oppCard.value === card.value - 1) {
      riskScore += KONFIG.SCORE_28;
      if (opponentStockSize <= 3) riskScore += KONFIG.SCORE_29;
    }
    // Gegner-Joker erhöht Risiko
    if (oppCard.type === 'joker' && card.value >= 5) {
      riskScore += KONFIG.SCORE_4_OPP_JOKER;
      if (opponentStockSize <= 3) riskScore += KONFIG.SCORE_30;
    }
  });
  return riskScore;
}

// =============================================================
// LÜCKENGRÖSSE AUF BAUSTAPEL BERECHNEN
// =============================================================
function calculateGapSize(pile, card) {
  if (!card || !card.value) return 0.01;
  const cardValue = parseInt(card.value, 10);
  if (!pile || pile.length === 0) return cardValue;
  const lastCard = pile[pile.length - 1];
  const lastValue = parseInt(lastCard.value, 10);
  const gap = cardValue - lastValue;
  return gap > 0 ? gap : 0;
}

// =============================================================
// ZUKUNFTSRISIKO EINER KARTE BERECHNEN
// =============================================================
function calculateFutureRisk(card, pileIndex) {
  if (!card || !card.value) return 0.01;
  const cardValue = parseInt(card.value, 10);
  return (12 - cardValue) * 5;
}

// =============================================================
// JOKER-ZUKUNFTSWERT BERECHNEN (für SCORE_8)
// =============================================================
function calculateJokerFutureValue(card, buildPileIndex) {
  let futureValue = 0;
  const buildPile = Game.buildPiles[buildPileIndex];
  let pileValue = 1;
  
  if (buildPile.length > 0) {
    const topCard = buildPile[buildPile.length - 1];
    pileValue = topCard.type === 'joker' ? buildPile.length : parseInt(topCard.value) + 1;
  }
  
  const currentJokerValue = card.type === 'joker' ? getJokerValue(buildPile, buildPile.length) : pileValue;
  
  if (neededForStock(currentJokerValue)) {
    futureValue += KONFIG.SCORE_25 * (12 - currentJokerValue);
  }
  
  for (let i = 1; i <= 5; i++) {
    if (pileValue + i <= 12) futureValue++;
  }
  
  if (pileValue >= 8) futureValue += KONFIG.SCORE_21A;
  return futureValue;
}

// =============================================================
// PRÜFT OB EINE KARTE AUF BAUSTAPEL GELEGT WERDEN DARF
// =============================================================
function isValidBuildMove(card, buildPileIndex) {
  const buildPile = Game.buildPiles[buildPileIndex];
  if (buildPile.length === 0) {
    return card.type === 'joker' || parseInt(card.value) === 1;
  }
  const topCard = buildPile[buildPile.length - 1];
  const topValue = topCard.type === 'joker' ? buildPile.length : parseInt(topCard.value);
  const cardValue = parseInt(card.value);
  return card.type === 'joker' || cardValue === (topValue + 1);
}

// =============================================================
// PRÜFT OB EIN BAUSTAPEL VOLL IST (12 KARTEN)
// =============================================================
function isBuildPileComplete(buildPileIndex) {
  const buildPile = Game.buildPiles[buildPileIndex];
  if (buildPile.length === 0) return false;
  const topCard = buildPile[buildPile.length - 1];
  return topCard.value === 12 || (topCard.type === 'joker' && buildPile.length === 12);
}

// =============================================================
// BAUSTAPEL LEEREN UND IN NACHZIEHSTAPEL MISCHEN
// =============================================================
function clearBuildPile(buildPileIndex) {
  if (isBuildPileComplete(buildPileIndex)) {
    const clearedCards = Game.buildPiles[buildPileIndex];
    Game.buildPiles[buildPileIndex] = [];
    Game.drawPile = Game.drawPile.concat(clearedCards);
    for (let i = Game.drawPile.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [Game.drawPile[i], Game.drawPile[j]] = [Game.drawPile[j], Game.drawPile[i]];
    }
  }
}

// =============================================================
// SEQUENZ-BONUS FÜR ABLAGESTAPEL
// =============================================================
function getDiscardSequenceBonus(player, discardIndex, newCard) {
  const pile = Game.players[player].discards[discardIndex];
  if (pile.length === 0) return 0.01;
  const topValue = pile[pile.length - 1].value;
  return (newCard.value === topValue - 1) ? 100 : 0;
}

// =============================================================
// GEGNER-STOCK VORHERSAGE (für KI-Strategie)
// =============================================================
function predictEnemyStock(opponent) {
  try {
    const visible = [...Game.players[opponent].discards.flat(), ...Game.buildPiles.flat(), ...Game.players[opponent].hand]
      .filter(c => c).map(c => c.type === 'joker' ? 'joker' : c.value);
    const total = 144 - visible.length;
    const probs = Object.entries(Game.tracking.deckComposition).map(([k, v]) => ({
      value: k,
      prob: (v - visible.filter(x => x == k).length) / total
    }));
    const best = probs.reduce((a, b) => a.prob > b.prob ? a : b);
    return { nextExpected: best.value === 'joker' ? null : parseInt(best.value), confidence: best.prob };
  } catch { 
    return { nextExpected: 1, confidence: 0.5 }; 
  }
}

// =============================================================
// AUFEINANDERFOLGENDE ABLAGEN ERKENNEN (für Serienunterbrechung)
// =============================================================
function detectConsecutiveDiscards(player) {
  const values = Game.tracking.discardHistory[player].values.filter(v => v !== 'joker' && typeof v === 'number');
  const series = [];
  for (let i = 0; i < values.length - 2; i++) {
    if (values[i + 1] === values[i] + 1 && values[i + 2] === values[i] + 2) {
      series.push(values[i] + 1);
    }
  }
  return [...new Set(series)];
}

// =============================================================
// DYNAMISCHE PRIORITÄTEN (Spielphasen-abhängig) – NEU in v7.6.0
// =============================================================
// Diese Funktion berechnet, wie aggressiv die KI spielen soll:
// - stockAttack: Wie sehr soll die KI gegnerischen Stock angreifen?
// - seriesDisrupt: Wie sehr soll die KI gegnerische Serien unterbrechen?
// - riskTaking: Wie risikofreudig soll die KI sein? (0.8 = vorsichtig, 1.3 = aggressiv)
function calculateDynamicPriorities() {
  const phase = 1 - (Game.drawPile.length / 144);  // Spielfortschritt (0=Start, 1=Ende)
  const enemyStock = Game.players.human.stock.slice(-1)[0]?.value || 1;
  return {
    stockAttack: Math.min(1.5, (12 - enemyStock) / 10 * phase),
    seriesDisrupt: 0.4 + (Game.tracking.discardHistory.human.values.length * 0.03),
    riskTaking: phase < 0.3 ? 0.8 : phase < 0.7 ? 1.0 : 1.3
  };
}

// =============================================================
// ERWEITERTE evaluateMoveCandidates (VOLLSTÄNDIG MIT DYNAMISCHEN PRIORITÄTEN)
// =============================================================
// DIES IST DIE ZENTRALE KI-ENTSCHEIDUNGSFUNKTION
// Sie bewertet ALLE möglichen Züge und gibt sie mit Scores zurück.
function evaluateMoveCandidates(player) {
  // ========== 1. JOKER-STOCK-PRIORISIERUNG (aus v7.1.1) ==========
  // Ein Joker auf dem eigenen Stock hat ABSOLUTEN VORRANG
  const stockTop = Game.players[player].stock[Game.players[player].stock.length - 1];
  if (stockTop && stockTop.type === 'joker') {
    for (let i = 0; i < Game.buildPiles.length; i++) {
      if (isValidBuildMove(stockTop, i)) {
        if (KONFIG.DEBUG_JOKER_STOCK) {
          debugInfo.push(`📌JOKER_STOCK: Stock-★ auf Bau ${i+1} ist prioritär.`);
        }
        return [{
          sourceType: 'stock',
          sourceIndex: 0,
          card: stockTop,
          buildPileIndex: i,
          score: KONFIG.SCORE_JOKER_STOCK_FORCE
        }];
      }
    }
  }

  // ========== 2. VORBEREITUNG: Gegneranalyse & Dynamische Prioritäten ==========
  const enemyAnalysis = predictEnemyStock('human');
  const priorities = calculateDynamicPriorities();
  const candidates = [];
  const stockSize = Game.players[player].stock.length;
  const stockTopVal = stockTop?.value;

  // ========== 3. HANDKARTEN BEWERTEN ==========
  Game.players[player].hand.forEach((card, i) => {
    Game.buildPiles.forEach((pile, pileIndex) => {
      if (!isValidBuildMove(card, pileIndex)) return;

      // Basis-Score (SCORE_5 = 600)
      let score = KONFIG.SCORE_5;
      
      // Joker Combo Bonus (aus v7.1.1) – Wenn Joker + Folgewert in Hand
      let comboBonus = 0;
      if (card.type === 'joker') {
        const jokerVal = pile.length === 0 ? 1 : 
          (pile[pile.length-1].type === 'joker' ? pile.length : parseInt(pile[pile.length-1].value)) + 1;
        const nextCardVal = jokerVal + 1;
        if (nextCardVal <= 12 && Game.players[player].hand.some((c, idx) => 
          c.type === 'number' && parseInt(c.value) === nextCardVal && idx !== i)) {
          comboBonus = KONFIG.SCORE_JOKER_COMBO_BONUS;
          if (KONFIG.DEBUG_JOKER_COMBO) debugInfo.push(`📌JOKER_COMBO: Hand-★ auf Bau ${pileIndex+1} ermöglicht Combo.`);
        }
      }
      score += comboBonus;

      // GapSize-Bonus (je größer die Lücke, desto besser)
      const gapSize = calculateGapSize(pile, card) || 0;
      score += gapSize * KONFIG.SCORE_12;

      // FutureRisk (je höher die Karte, desto geringer das Risiko)
      const futureRisk = calculateFutureRisk(card, pileIndex) || 0;
      score -= futureRisk;

      // Gegner-Blockade-Risiko (wenn Gegner die Karte danach hat)
      let riskScore = getOpponentBlockingPotential(card, pileIndex);
      score -= riskScore;

      // ========== JOKER-SPEZIFISCHE BEWERTUNG ==========
      if (card.type === 'joker') {
        const jokerValue = pile.length === 0 ? 1 : pile[pile.length - 1].value + 1;
        const matchesStock = stockTopVal && (jokerValue === stockTopVal || stockTopVal === undefined);
        
        // Joker trifft exakten Stock-Wert → hoher Bonus
        if (matchesStock && (pile.length >= 5 || stockSize <= 10)) {
          const topHumanStock = Game.players.human.stock[Game.players.human.stock.length - 1]?.value || 1;
          score += (KONFIG.SCORE_7 + (2000 * (12 - topHumanStock)));
        }
        
        // Joker-Zukunftswert (wie viele Karten können danach gelegt werden?)
        const futureValue = calculateJokerFutureValue(card, pileIndex) || 0;
        if (futureValue > 0) {
          score += futureValue * KONFIG.SCORE_8;
        }
      }

      candidates.push({ sourceType: 'hand', sourceIndex: i, card, buildPileIndex: pileIndex, score });
    });
  });

  // ========== 4. STOCKKARTEN BEWERTEN (ohne Joker, da oben schon behandelt) ==========
  if (stockTop && stockTop.type !== 'joker') {
    Game.buildPiles.forEach((pile, pileIndex) => {
      if (isValidBuildMove(stockTop, pileIndex)) {
        const advancedPiles = Game.buildPiles.filter(p => p.length > 6).length;
        let score = Math.min(KONFIG.SCORE_24, KONFIG.SCORE_10 + (KONFIG.SCORE_10_ADV * advancedPiles));
        candidates.push({
          sourceType: 'stock',
          sourceIndex: 0,
          card: stockTop,
          buildPileIndex: pileIndex,
          score
        });
      }
    });
  }

  // ========== 5. ABLAGESTAPEL BEWERTEN + TIEFENSUCHE (Lookahead) ==========
  Game.players[player].discards.forEach((pile, discardIndex) => {
    if (pile.length === 0) return;
    const card = pile[pile.length - 1];
    
    Game.buildPiles.forEach((buildPile, buildIndex) => {
      if (!isValidBuildMove(card, buildIndex)) return;
      
      let score = KONFIG.SCORE_26;

      // Wertabhängige Bewertung
      try {
        if (!isNaN(card.value) && isFinite(card.value)) {
          score += card.value * 50;
        } else {
          score += KONFIG.SCORE_27;
        }
      } catch(error) { score += KONFIG.SCORE_27; }

      // Stock-Synergie: Passt die Ablagekarte zum eigenen Stock?
      if (Game.players[player].stock.some(s => s.value === card.value + 1)) {
        score += KONFIG.SCORE_23;
      }

      // ========== TIEFENSUCHE (DEEP LOOKAHEAD) aus v6.7.0 ==========
      // Durchsucht die Ablagestapel nach verdeckten Stockkarten
      if (KONFIG.SCORE_DEEP_LOOKAHEAD_DEPTH > 1 && pile.length > 1) {
        let lookaheadBonus = 0;
        let chainDepth = 1;
        
        for (let k = pile.length - 2; k >= Math.max(0, pile.length - KONFIG.SCORE_DEEP_LOOKAHEAD_DEPTH); k--) {
          const hiddenCard = pile[k];
          chainDepth++;
          
          if (stockTopVal && (hiddenCard.value === stockTopVal || hiddenCard.type === 'joker')) {
            lookaheadBonus += Math.floor(KONFIG.SCORE_DEEP_LOOKAHEAD_BONUS / chainDepth);
            break;
          }
        }
        score += lookaheadBonus;
      }

      candidates.push({
        sourceType: 'discard',
        sourceIndex: discardIndex,
        card,
        buildPileIndex: buildIndex,
        score
      });
    });
  });

  // ========== 6. JOKER-FILTER (nur sinnvolle Joker-Züge erlauben) ==========
  const averageScore = candidates.reduce((sum, m) => sum + m.score, 0) / (candidates.length || 1);
  const dynamicThreshold = averageScore * KONFIG.SCORE_40;
  candidates.forEach(move => { if (move.card.type === 'joker') move.score *= KONFIG.SCORE_42; });

  const hasValidNonJokerMove = candidates.some(move => move.card.type !== 'joker' && move.score > 0);
  const filteredCandidates = hasValidNonJokerMove
    ? candidates.filter(move => {
        if (move.card.type === 'joker' && move.score < dynamicThreshold) return false;
        return true;
      })
    : candidates;

  // ========== 7. DYNAMISCHE PRIORITÄTEN ANWENDEN (NEU IN v7.6.0) ==========
  // JEDER Kandidat durchläuft jetzt die komplette Prioritäten-Pipeline
  filteredCandidates.forEach(move => {
    // Stock-Angriff: Wenn die Karte die nächste erwartete Karte des Gegners ist
    if (move.card.value === enemyAnalysis.nextExpected) {
      const nagel34 = Game.players.human.stock.length < 10 ? KONFIG.SCORE_34_HIGH : KONFIG.SCORE_34_LOW;
      move.score += nagel34 * priorities.stockAttack;
    }
    
    // Serienunterbrechung: Wenn die Karte eine gegnerische Serie unterbricht
    if (detectConsecutiveDiscards('human').includes(move.card.value)) {
      move.score += Math.round(KONFIG.SCORE_35 * priorities.seriesDisrupt);
    }
    
    // Risikoanpassung: Je nach Spielphase vorsichtiger oder aggressiver
    move.score = Math.round(move.score * priorities.riskTaking);
  });
  
  return filteredCandidates.sort((a, b) => b.score - a.score);
}

// =============================================================
// executeStockAttack – KI-Angriff auf gegnerischen Stock
// =============================================================
async function executeStockAttack(targetValue) {
  if (isGameOver) return false;
  try {
    const validPiles = Game.buildPiles
      .map((pile, i) => ({ index: i, current: pile.slice(-1)[0]?.value || 0 }))
      .filter(pile => targetValue === 1 ? pile.current === 0 : pile.current === targetValue - 1);
    if (validPiles.length === 0) return false;
    const bestPile = validPiles.reduce((a, b) => a.current < b.current ? a : b);
    
    const validCards = [
      ...Game.players.ai.hand.map((c, i) => ({ card: c, type: 'hand', index: i })),
      { card: Game.players.ai.stock.slice(-1)[0], type: 'stock', index: 0 }
    ].filter(({ card }) => card && (card.value === targetValue || card.type === 'joker'));
    
    if (validCards.length === 0) return false;
    const bestCard = validCards.reduce((a, b) =>
      (a.card.type === 'joker' ? 1 : 0) - (b.card.type === 'joker' ? 1 : 0) ||
      b.card.value - a.card.value
    );
    
    showMessage(`⚔️ KI führt Stock-Attack aus: Ziel ${targetValue}`);
    const result = handleBuildPileDrop('ai', bestCard.type, bestCard.index, bestPile.index);
    if (result) {
      updateView(); // Live-Update nach Stock-Attack
      await pauseForSeconds(0.8);
    }
    return result === true;
  } catch (e) {
    console.error('Stock Attack Error:', e);
    return false;
  }
}

// =============================================================
// playInDiscardPiles – KI legt Karten auf Ablagestapel (VOLLSTÄNDIG)
// =============================================================
// Diese Funktion wurde in v7.5.0 vermisst und ist jetzt VOLLSTÄNDIG implementiert.
// Sie enthält: Joker-Schutz, Zahlen-Schutz, Gegnerhilfe-Erkennung, Sequenz-Bonus
async function playInDiscardPiles(player) {
  if (isGameOver) return;
  if (Game.players[player].hand.length === 0) {
    showMessage('KI hat keine Handkarten zum Ablegen.');
    await pauseForSeconds(1);
    return;
  }

  // Kritische Zahlen des Gegners (für Blockade-Strategie)
  const opponentCritical = [
    Game.players.human.stock.slice(-1)[0]?.value,
    ...Game.players.human.discards.map(p => p[p.length - 1]?.value)
  ].filter(v => v !== undefined);
  
  const stockTop = Game.players[player].stock.length > 0
    ? Game.players[player].stock[Game.players[player].stock.length - 1].value
    : null;
  const handCards = Game.players[player].hand;
  const discardPiles = Game.players[player].discards;
  let bestDiscardIndex = -1, bestScore = -Infinity;
  const cardToPlay = handCards[handCards.length - 1];
  const sourceIndex = handCards.length - 1;
  const isJoker = String(cardToPlay.value).toUpperCase() === 'JOKER' || cardToPlay.type === 'joker';
  const isDangerousCard = opponentCritical.includes(cardToPlay.value);

  // Alle 4 Ablagestapel bewerten
  for (let i = 0; i < discardPiles.length; i++) {
    const pile = discardPiles[i];
    const topCard = pile.length > 0 ? pile[pile.length - 1] : null;
    let score = KONFIG.SCORE_13;

    // ========== JOKER-ABLAGE-SCHUTZ (aus v7.1.1 + v6.7.0 kombiniert) ==========
    if (isJoker) {
      if (!topCard) {
        score += KONFIG.SCORE_JOKER_DISCARD_SAVE;  // +9000 für leeren Stapel
        if (KONFIG.DEBUG_JOKER_DISCARD) debugInfo.push(`📌JOKER_DISCARD: Bonus für leeren Stapel.`);
      } else if (topCard.type !== 'joker') {
        score -= KONFIG.SCORE_JOKER_COVER_PENALTY; // -12000 für Bedecken von Zahl
        if (KONFIG.DEBUG_JOKER_DISCARD) debugInfo.push(`📌JOKER_DISCARD: Strafe für Bedecken von Zahl ${topCard.value}.`);
      }
      score += KONFIG.SCORE_JOKER_SAFE_DISCARD;   // +5000 zusätzlicher Schutz
    }
    
    // ========== SCHUTZ VON JOKERN IN DER ABLAGE (Zahlen nicht auf Joker legen) ==========
    if (topCard && topCard.type === 'joker' && !isJoker) {
      score -= KONFIG.SCORE_COVER_JOKER_PENALTY; // -8000
      if (KONFIG.DEBUG_42) debugInfo.push(`📌42 ABLAGESCHUTZ: Ablage ${i+1} enthält Joker! Normale Karte blockiert`);
    }

    // Riskante Karten (helfen dem Gegner) werden bestraft
    if (isDangerousCard) {
      score -= KONFIG.SCORE_14;
    }
    
    // Leerer Stapel-Bonus
    if (!topCard && !isJoker) {
      score += KONFIG.SCORE_16;
      if (stockTop && cardToPlay.value === stockTop - 1) score += 50;
    } 
    // Niedrigere Karten werden bevorzugt (kleinere Zahlen zuerst ablegen)
    else if (!isJoker && cardToPlay.value < (topCard?.value || Infinity)) {
      score += KONFIG.SCORE_17;
      if (stockTop && cardToPlay.value === stockTop - 1) score += 50;
    }
    
    // Sequenz-Bonus: Wenn die Karte eine aufsteigende Reihe fortsetzt
    if (topCard && (cardToPlay.value === topCard.value - 1) && !isJoker) {
      score += KONFIG.SCORE_15;
    }
    
    // Stock-Folge: Wenn die Karte genau die nächste Stockkarte ist
    if (stockTop && cardToPlay.value === stockTop + 1) score += 300;
    
    // Malus für große Stapel (unübersichtlich)
    score -= pile.length * KONFIG.SCORE_19;
    
    // Gegnerhilfe: Wenn dieser Stapel dem Gegner helfen würde
    const pileHelpsOpponent = pile.some(c => opponentCritical.includes(c.value));
    if (pileHelpsOpponent) {
      const criticalStockPenalty = Game.players.human.stock.length <= 5 ? 3000 : 0;
      score -= KONFIG.SCORE_20 + criticalStockPenalty;
    }
    
    if (score > bestScore) { bestScore = score; bestDiscardIndex = i; }
  }

  // Fallback für Joker: Wenn kein guter Stapel gefunden wurde, nimm leeren Stapel oder Stapel 4
  if (isJoker && bestDiscardIndex === -1) {
    for (let i = 0; i < 4; i++) {
      if (discardPiles[i].length === 0) { bestDiscardIndex = i; break; }
    }
    if (bestDiscardIndex === -1) bestDiscardIndex = 3;
  }

  // Zug ausführen
  if (bestDiscardIndex >= 0 && handleDiscardPileDrop(player, 'hand', sourceIndex, bestDiscardIndex)) {
    showMessage(`🤖 KI legt ${cardToPlay.type === 'joker' ? '★Joker' : cardToPlay.value} in Ablage ${bestDiscardIndex + 1}`);
    if (KONFIG.DEBUG_43) debugInfo.push(`📌43 KI legt ${cardToPlay.value} in Ablage ${bestDiscardIndex + 1}`);
    updateView(); // Live-Update nach Ablage
    await pauseForSeconds(0.8);
    
    // Tracking für Analyse
    trackGameObservations('discardStrategy', {
      cardValue: cardToPlay.value,
      wasDangerous: isDangerousCard,
      stockFollowup: (stockTop && cardToPlay.value === stockTop + 1),
      createdSequence: discardPiles[bestDiscardIndex]?.slice(-1)[0]?.value
    });
    if (checkForWinner()) return;
  }
}

// =============================================================
// HAUPT-KI-ZUG (aiTurn) – MIT LIVE-UPDATE NACH JEDEM ZUG
// =============================================================
// Diese Funktion steuert den kompletten KI-Zug:
// 1. Gegneranalyse
// 2. Stock-Attack (wenn sinnvoll)
// 3. Baustapel-Züge (bis keine mehr möglich)
// 4. Ablage (playInDiscardPiles)
// 5. Nachziehen
async function aiTurn(rekursionstiefe = 0) {
  // Sicherheits-Check: Spiel beendet?
  if (isGameOver) return;
  
  // Rekursionsschutz: Maximal 15 Aufrufe tief (verhindert Endlosschleifen)
  if (rekursionstiefe > 15) {
    console.warn('aiTurn: Maximale Rekursionstiefe (15) erreicht – Zug wird abgebrochen.');
    switchPlayer();
    return;
  }
  
  // Handkarten auffüllen (falls nötig)
  drawCardsUntilFive('ai');
  showMessage('🤖 KI bereitet Zug vor...');
  if (KONFIG.DEBUG_43) debugInfo.push(`📌43 KI bereitet Zug vor...`);
  await pauseForSeconds(0.3);
  if (isGameOver) return;

  let moved = false;
  let moveCount = 0;
  let kein_zug_mehr = 0;

  // Gegneranalyse für Blockade-Anzeige im UI
  const enemyAnalysis = predictEnemyStock('human');
  Game.buildPiles.forEach((pile, i) => {
    const element = document.querySelector(`.build-pile:nth-child(${i + 1})`);
    if (element && pile.slice(-1)[0]?.value === enemyAnalysis.nextExpected) {
      element.classList.add('ai-prediction-overlay');
      const tag = document.createElement('div');
      tag.className = 'strategy-tag';
      tag.textContent = `⛔ Blockade ${enemyAnalysis.nextExpected} (${Math.round(enemyAnalysis.confidence * 100)}%)`;
      element.appendChild(tag);
    }
  });

  // Versuche Stock-Attack bei hoher Konfidenz (über 60%)
  try {
    if (enemyAnalysis.confidence > 0.6) {
      moved = await executeStockAttack(enemyAnalysis.nextExpected);
      if (isGameOver) return;
    }
  } catch (e) { console.error('Stock Attack Failed:', e); }

  // ========== HAUPT-SCHLEIFE: Züge ausführen bis keine mehr möglich ==========
  do {
    showMessage('🤖 KI analysiert mögliche Züge...');
    await pauseForSeconds(0.3);
    if (isGameOver) return;
    
    const candidates = evaluateMoveCandidates('ai');
    if (candidates.length === 0) {
      // Keine Baustapel-Züge möglich -> Prüfe Stock
      const stockCard = Game.players.ai.stock.slice(-1)[0];
      let stockPlayable = false;
      if (stockCard) {
        for (let j = 0; j < Game.buildPiles.length; j++) {
          if (!isValidBuildMove(stockCard, j)) continue;
          stockPlayable = true;
          showMessage(`🚀 KI legt Stockkarte (${stockCard.value}) auf Bau ${j + 1}`);
          if (KONFIG.DEBUG_43) debugInfo.push(`📌43 KI legt Stockkarte (${stockCard.value}) auf Bau ${j + 1}`);
          
          if (handleBuildPileDrop('ai', 'stock', 0, j)) {
            moved = true;
            moveCount++;
            updateView(); // Live-Update nach jedem Stock-Zug
            await pauseForSeconds(0.8);
            if (isGameOver) return;
            trackGameObservations('kiMove', {
              sourceType: 'stock',
              cardValue: stockCard.value,
              cardType: stockCard.type,
              buildPileIndex: j,
              score: KONFIG.SCORE_24
            });
          }
          break;
        }
      }
      if (!stockPlayable) {
        kein_zug_mehr = 1;
      }
      break;
    }
    
    candidates.sort((a, b) => b.score - a.score);
    const best = candidates[0];
    const stockCard = Game.players.ai.stock.length > 0 ? Game.players.ai.stock[Game.players.ai.stock.length - 1] : null;

    // Priorisiere Stockkarte wenn gleicher Wert (spart wertvolle Handkarten)
    if (best.sourceType !== 'stock' && stockCard && stockCard.type !== 'joker' && stockCard.value === best.card.value) {
      if (KONFIG.DEBUG_31) debugInfo.push(`📌31 KI priorisiert Stockkarte, identisch mit gewählter Karte`);
      if (handleBuildPileDrop('ai', 'stock', 0, best.buildPileIndex)) {
        moved = true;
        moveCount++;
        showMessage(`🚀 KI legt Stockkarte (${stockCard.value}) auf Bau ${best.buildPileIndex + 1}`);
        if (KONFIG.DEBUG_43) debugInfo.push(`📌43 KI legt Stockkarte (${stockCard.value}) auf Bau ${best.buildPileIndex + 1}`);
        updateView(); // Live-Update
        await pauseForSeconds(0.8);
        if (isGameOver) return;
        trackGameObservations('kiMove', {
          sourceType: 'stock',
          cardValue: stockCard.value,
          cardType: stockCard.type,
          buildPileIndex: best.buildPileIndex,
          score: KONFIG.SCORE_32
        });
        aiTurn(rekursionstiefe + 1);
        return;
      }
    }

    // Normaler Zug
    let sourceText = '';
    let emoji = '';
    switch (best.sourceType) {
      case 'hand': sourceText = `Handposition ${best.sourceIndex + 1}`; emoji = '🖐️'; break;
      case 'stock': sourceText = 'Stock-Stapel'; emoji = '🗃️'; break;
      case 'discard': sourceText = `Ablagestapel ${best.sourceIndex + 1}`; emoji = '🗄️'; break;
    }
    showMessage(`${emoji} KI spielt ${best.card.type === 'joker' ? '★Joker' : best.card.value} von ${sourceText} auf Bau ${best.buildPileIndex + 1}`);
    if (KONFIG.DEBUG_43) debugInfo.push(`📌43 KI spielt ${best.card.type === 'joker' ? '★Joker' : best.card.value} von ${sourceText} auf Bau ${best.buildPileIndex + 1}`);
    
    if (handleBuildPileDrop('ai', best.sourceType, best.sourceIndex, best.buildPileIndex)) {
      moved = true;
      moveCount++;
      updateView(); // ⭐⭐⭐ LIVE-UPDATE NACH JEDEM EINZELNEN ZUG! ⭐⭐⭐
      await pauseForSeconds(0.8);
      if (isGameOver) return;
      
      trackGameObservations('kiMove', {
        sourceType: best.sourceType,
        cardValue: best.card.value,
        cardType: best.card.type,
        buildPileIndex: best.buildPileIndex,
        score: best.score
      });
      if (moveCount >= 2) {
        showMessage('🔄 KI führt Kombinationszug aus...');
        await pauseForSeconds(0.5);
      }
    } else {
      kein_zug_mehr = 1;
      break;
    }
  } while (!kein_zug_mehr && !isGameOver && moveCount < 10);

  // ========== NACH DEN BAUSTAPEL-ZÜGEN: ABLAGE ==========
  if (isGameOver) return;
  if (Game.players.ai.hand.length > 0) {
    showMessage('🤖 KI legt eine Karte auf den Ablagestapel...');
    await pauseForSeconds(0.5);
    await playInDiscardPiles('ai');
  } else {
    showMessage('🤖 KI hat keine Handkarten zum Ablegen!');
  }
  
  // Nachziehen auf 5 Handkarten
  if (isGameOver) return;
  if (Game.players.ai.hand.length < 5) {
    showMessage('🃏 KI zieht nach...');
    await pauseForSeconds(0.5);
    drawCardsUntilFive('ai');
  }
  
  // Zug beenden und Spieler wechseln
  if (isGameOver) return;
  showMessage('🏁 KI beendet ihren Zug...');
  await pauseForSeconds(0.5);
  switchPlayer();
  document.querySelectorAll('.ai-prediction-overlay, .strategy-tag').forEach(el => el.remove());
  updateView();
}

// =============================================================
// SPIELERWECHSEL
// =============================================================
async function switchPlayer() {
  if (isGameOver || checkForWinner()) return;
  
  if (currentPlayer === 'human') {
    currentPlayer = 'ai';
    showMessage('🤖 KI ist am Zug...');
    await pauseForSeconds(0.8);
    if (isGameOver) return;
    aiTurn(0);
  } else {
    currentPlayer = 'human';
    showMessage('👉 Dein Zug!');
    await pauseForSeconds(0.5);
    if (isGameOver) return;
    drawCardsUntilFive('human');
    setupTouchEvents();
    showMessage('Wähle eine Karte aus...');
  }
}

// =============================================================
// DRAGGBARE STATUSLEISTE (verschiebbar)
// =============================================================
function enableDraggableStatusLabel() {
  const label = document.getElementById('status-label');
  if (!label) return;
  
  label.style.fontSize = '1.5rem';
  label.style.color = 'black';
  label.style.textShadow = '-1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff';
  
  let isDragging = false, startY = 0, startTop = 0;
  
  function disableTransition() { label.style.transition = 'none'; }
  function enableTransition() { label.style.transition = 'top 0.3s ease-out, transform 0.3s ease-out'; }
  function bounceEffect() { 
    label.style.transform = 'scale(1.15)'; 
    setTimeout(() => { label.style.transform = 'scale(1)'; }, 300); 
  }
  
  // Maus-Events (Desktop)
  label.addEventListener('mousedown', (e) => {
    isDragging = true;
    startY = e.clientY;
    startTop = parseInt(window.getComputedStyle(label).top) || 0;
    disableTransition();
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    label.style.top = (startTop + (e.clientY - startY)) + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (isDragging) { enableTransition(); bounceEffect(); }
    isDragging = false;
  });
  
  // Touch-Events (Mobile)
  label.addEventListener('touchstart', (e) => {
    isDragging = true;
    startY = e.touches[0].clientY;
    startTop = parseInt(window.getComputedStyle(label).top) || 0;
    disableTransition();
    e.preventDefault();
  });
  document.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    label.style.top = (startTop + (e.touches[0].clientY - startY)) + 'px';
  });
  document.addEventListener('touchend', () => {
    if (isDragging) { enableTransition(); bounceEffect(); }
    isDragging = false;
  });
}

// =============================================================
// LONG-PRESS INFO FENSTER (Ablagestapel anzeigen)
// =============================================================
function showInfoWindow(event, discardPileIndex, player) {
  const infoWindow = document.getElementById('info-window');
  const infoTable = document.getElementById('info-table');
  infoTable.innerHTML = '';
  
  const cards = Game.players[player].discards[discardPileIndex];
  if (cards && cards.length > 0) {
    cards.slice().reverse().forEach(card => {
      const row = document.createElement('tr');
      const cell = document.createElement('td');
      cell.textContent = card.type === 'joker' ? '★' : card.value;
      row.appendChild(cell);
      infoTable.appendChild(row);
    });
    
    const rect = event.target.getBoundingClientRect();
    infoWindow.style.left = `${rect.left + window.scrollX}px`;
    infoWindow.style.top = `${rect.top + window.scrollY - infoWindow.offsetHeight - 10}px`;
    infoWindow.style.display = 'block';
    setTimeout(() => { infoWindow.style.display = 'none'; }, 5000);
  }
}

function handleLongPress(event, discardPileIndex, player) {
  pressTimer = setTimeout(() => { showInfoWindow(event, discardPileIndex, player); }, 1000);
}

function handleRelease() { clearTimeout(pressTimer); }

// Long-Press Event-Bindings für Spieler-Ablagestapel
document.querySelectorAll('.human-area [data-label*="Ablage"]').forEach(target => {
  target.addEventListener('touchstart', event => { 
    const idx = Array.from(target.parentElement.children).indexOf(target); 
    handleLongPress(event, idx, 'human'); 
  });
  target.addEventListener('touchend', handleRelease);
  target.addEventListener('mousedown', event => { 
    const idx = Array.from(target.parentElement.children).indexOf(target); 
    handleLongPress(event, idx, 'human'); 
  });
  target.addEventListener('mouseup', handleRelease);
});

// Long-Press Event-Bindings für KI-Ablagestapel
document.querySelectorAll('.opponent-area [data-label*="Ablage"]').forEach(target => {
  target.addEventListener('touchstart', event => { 
    let idx = Array.from(target.parentElement.children).indexOf(target); 
    idx -= 1; 
    handleLongPress(event, idx, 'ai'); 
  });
  target.addEventListener('touchend', handleRelease);
  target.addEventListener('mousedown', event => { 
    let idx = Array.from(target.parentElement.children).indexOf(target); 
    idx -= 1; 
    handleLongPress(event, idx, 'ai'); 
  });
  target.addEventListener('mouseup', handleRelease);
});

// =============================================================
// ENDGAME & WINNER
// =============================================================
function checkForWinner() {
  if (isGameOver) return true;
  
  if (Game.players.human.stock.length === 0) {
    const aiPoints = Game.players.ai.stock.length * 5;
    endGame(playerName, 'KI', aiPoints);
    return true;
  }
  if (Game.players.ai.stock.length === 0) {
    const humanPoints = Game.players.human.stock.length * 5;
    endGame('KI', playerName, humanPoints);
    return true;
  }
  return false;
}

function endGame(winner, loser, points) {
  if (isGameOver) return;
  isGameOver = true;
  
  const analysis = trackGameObservations('gameEnd', {
    winner: winner,
    loserStockSize: Game.players[loser === 'KI' ? 'ai' : 'human'].stock.length
  });
  showEndGameMessage(winner, loser, points, analysis);
  
  const gc = document.querySelector('.game-container');
  if (gc) gc.style.pointerEvents = 'none';
}

function showEndGameMessage(winner, loser, points, analysis) {
  const overlay = document.createElement('div');
  overlay.id = 'end-game-overlay';
  Object.assign(overlay.style, {
    position: 'fixed', top: '5vh', left: '0', width: '100vw', height: '90vh',
    backgroundColor: 'rgba(0, 0, 0, 0.7)', display: 'flex', flexDirection: 'column',
    justifyContent: 'flex-start', alignItems: 'center', color: 'white', fontSize: '2em',
    fontWeight: 'bold', zIndex: '3000', textAlign: 'center', overflowY: 'auto',
    paddingTop: '20px', paddingBottom: 'env(safe-area-inset-bottom)', pointerEvents: 'auto'
  });
  
  overlay.innerHTML = `<div style="background: white; color: black; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(255,255,255,0.5); position: relative; width: 80%; max-width: 600px; pointer-events: auto;">
    <h1 style="font-size: 2em;">Spiel beendet!</h1>
    <p><strong>Gewinner:</strong> ${winner} 🎉</p>
    <p><strong>Verlierer:</strong> ${loser} mit ${points} Punkten</p>
    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button id="restart-button" style="font-size: 0.6em; padding: 10px 20px; height: 40px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">Neues Spiel</button>
      <button id="save-button" style="font-size: 0.6em; padding: 10px 20px; height: 40px; background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer;">Speichern</button>
    </div>
    <div id="analysis-section" style="margin-top: 20px; text-align: left; font-size: 0.8em;">
      <h2 style="font-size: 1.2em;">Version 7.6.0 – Auswertung</h2>
      <textarea style="width: 100%; height: 250px; font-size: 14px; resize: none;" readonly>${analysis}</textarea>
      <p style="font-size: 0.8em;">Kopiere den Text und sende ihn an den Entwickler!</p>
      <button id="close-analysis" style="font-size: 0.8em; padding: 10px 20px; height: 40px; background: #f44336; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px;">Schließen</button>
    </div>
  </div>`;
  
  document.body.appendChild(overlay);
  
  document.getElementById('restart-button')?.addEventListener('click', (e) => { 
    e.preventDefault(); 
    document.body.removeChild(overlay); 
    location.reload(); 
  });
  
  document.getElementById('close-analysis')?.addEventListener('click', (e) => { 
    e.preventDefault(); 
    const sec = document.getElementById('analysis-section'); 
    if(sec) sec.remove(); 
  });
  
  document.getElementById('save-button')?.addEventListener('click', (e) => {
    e.preventDefault();
    if(analysis) {
      const blob = new Blob(['\uFEFF' + analysis], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'SkipBo_Analyse.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    }
  });
}

// =============================================================
// TRACKING & ANALYSE (vollständig für Auswertungsfenster)
// =============================================================

// =============================================================
// NÄCHSTE BENÖTIGTE KARTEN FÜR KI BERECHNEN
// =============================================================
function calculateKINextNeeded() {
  return Game.buildPiles.map(pile => {
    if (pile.length === 0) return 1;
    return pile[pile.length - 1].type === 'joker' ? pile.length + 1 : pile[pile.length - 1].value + 1;
  });
}

// =============================================================
// HAUPT-TRACKING-FUNKTION (speichert alle Spielereignisse)
// =============================================================
function trackGameObservations(eventType, data) {
  let storedData = JSON.parse(localStorage.getItem('skipbo_observations')) || { games: [], count: 0 };
  const maxGames = 10;
  let observations = { gameId: currentGameId, type: eventType, timestamp: Date.now() };
  
  switch (eventType) {
    case 'discardStrategy':
      observations.cardValue = data.cardValue;
      observations.dangerous = data.wasDangerous;
      observations.sequenceValue = data.createdSequence;
      observations.stockFollowup = data.stockFollowup;
      break;
    case 'jokerAdditional':
      observations.cardValue = 'JOKER';
      break;
    case 'opponentDiscard':
      observations.cardValue = data.cardValue;
      observations.opponentStockSize = data.opponentStockSize;
      observations.kiNextNeeded = calculateKINextNeeded();
      break;
    case 'kiMove':
      observations.sourceType = data.sourceType;
      observations.cardValue = data.cardValue;
      observations.isJoker = data.cardType === 'joker';
      observations.buildPileIndex = data.buildPileIndex;
      observations.stockSize = Game.players.ai.stock.length;
      observations.score = data.score;
      observations.helpedOpponent = Game.players.human.stock.slice(-1)[0]?.value === data.cardValue + 1;
      break;
    case 'missedStock':
      observations.stockCardValue = data.stockCardValue;
      break;
    case 'gameEnd':
      observations.winner = data.winner;
      observations.loserStockSize = data.loserStockSize;
      storedData.games.push(observations);
      storedData.count++;
      localStorage.setItem('skipbo_observations', JSON.stringify(storedData));
      
      // Aktuelle Spiel-Analyse generieren
      const currentGame = storedData.games.filter(g => g.gameId === currentGameId);
      const currentAnalysis = generateCurrentGameAnalysis(currentGame);
      const overallAnalysis = generateOverallAnalysis(storedData.games);
      const debugSection = generateDebugInfo();
      
      if (storedData.count >= maxGames) {
        localStorage.setItem('skipbo_observations', JSON.stringify({ games: [], count: 0 }));
      }
      currentGameId = Date.now();
      debugInfo = [];
      return `${currentAnalysis}\n\n${overallAnalysis}\n\n${debugSection}`;
    default:
      break;
  }
  
  if (eventType !== 'gameEnd') storedData.games.push(observations);
  localStorage.setItem('skipbo_observations', JSON.stringify(storedData));
  return null;
}

// =============================================================
// AKTUELLE SPIEL-ANALYSE GENERIEREN
// =============================================================
function generateCurrentGameAnalysis(currentGame) {
  let analysis = '═══════════════════════════════════════════════════\n';
  analysis += '📊 AUSWERTUNG DES AKTUELLEN SPIELS (v7.6.0)\n';
  analysis += '═══════════════════════════════════════════════════\n\n';
  
  const blocks = currentGame.filter(g => g.type === 'opponentDiscard' && 
    g.kiNextNeeded && g.kiNextNeeded.includes(g.cardValue)).length;
  analysis += `🚫 Gegnerblockaden: ${blocks} Mal hat der Gegner eine benötigte Karte gelegt.\n`;
  
  const jokerUses = currentGame.filter(g => g.type === 'kiMove' && g.isJoker).length;
  const earlyJoker = currentGame.filter(g => g.type === 'kiMove' && g.isJoker && g.buildPileIndex < 2).length;
  analysis += `🃏 Joker-Nutzung: ${jokerUses} Mal eingesetzt, davon ${earlyJoker} auf niedrigen Stapeln (< 2).\n`;
  
  const stockMoves = currentGame.filter(g => g.type === 'kiMove' && g.sourceType === 'stock').length;
  analysis += `📦 Stockabbau: ${stockMoves} Stockkarten erfolgreich gelegt.\n`;
  
  const missedStock = currentGame.filter(g => g.type === 'missedStock').length;
  analysis += `⚠️ Verpasste Stockzüge: ${missedStock} Mal hätte eine Stockkarte gelegt werden können.\n`;
  
  const helpedOpponent = currentGame.filter(g => g.type === 'kiMove' && g.helpedOpponent).length;
  analysis += `🤝 Gegnerhilfe: ${helpedOpponent} Mal hat die KI dem Gegner geholfen.\n`;
  
  const gameEnd = currentGame.find(g => g.type === 'gameEnd');
  if (gameEnd) {
    analysis += `🏆 Ergebnis: ${gameEnd.winner} hat gewonnen, Verlierer hatte ${gameEnd.loserStockSize} Stockkarten.\n`;
  }
  
  analysis += '\n📌 Hinweis: Alle DEBUG-Flags sind auf false (kein Debug-Spam).\n';
  analysis += '📌 Jeder KI-Zug wurde einzeln im Spielfeld sichtbar.\n';
  analysis += '📌 Dynamische Prioritäten (stockAttack, seriesDisrupt, riskTaking) sind aktiv.\n';
  return analysis;
}

// =============================================================
// GESAMT-ANALYSE (alle gespeicherten Spiele)
// =============================================================
function generateOverallAnalysis(games) {
  let analysis = '\n═══════════════════════════════════════════════════\n';
  analysis += '📈 GESAMTBEWERTUNG (alle gespeicherten Spiele)\n';
  analysis += '═══════════════════════════════════════════════════\n\n';
  
  const blocks = games.filter(g => g.type === 'opponentDiscard' && 
    g.kiNextNeeded && g.kiNextNeeded.includes(g.cardValue)).length;
  analysis += `🚫 Gegnerblockaden gesamt: ${blocks}\n`;
  
  const jokerUses = games.filter(g => g.type === 'kiMove' && g.isJoker).length;
  const earlyJoker = games.filter(g => g.type === 'kiMove' && g.isJoker && g.buildPileIndex < 2).length;
  analysis += `🃏 Joker-Nutzung gesamt: ${jokerUses} (davon ${earlyJoker} früh)\n`;
  
  const stockMoves = games.filter(g => g.type === 'kiMove' && g.sourceType === 'stock').length;
  analysis += `📦 Stockabbau gesamt: ${stockMoves}\n`;
  
  const missedStock = games.filter(g => g.type === 'missedStock').length;
  analysis += `⚠️ Verpasste Stockzüge gesamt: ${missedStock}\n`;
  
  const helpedOpponent = games.filter(g => g.type === 'kiMove' && g.helpedOpponent).length;
  analysis += `🤝 Gegnerhilfe gesamt: ${helpedOpponent}\n`;
  
  const totalGames = games.filter(g => g.type === 'gameEnd').length;
  const wins = games.filter(g => g.type === 'gameEnd' && g.winner === 'KI').length;
  analysis += `🏆 Siegquote: ${wins} von ${totalGames} Spielen (${totalGames > 0 ? Math.round(wins/totalGames*100) : 0}%)\n`;
  
  return analysis;
}

// =============================================================
// DEBUG-INFORMATIONEN GENERIEREN
// =============================================================
function generateDebugInfo() {
  let debugSection = '\n═══════════════════════════════════════════════════\n';
  debugSection += '🐛 DEBUG-INFORMATIONEN (aktuelles Spiel)\n';
  debugSection += '═══════════════════════════════════════════════════\n\n';
  
  if (debugInfo.length === 0) {
    debugSection += 'Keine Debug-Informationen verfügbar (alle Flags auf false).\n';
    debugSection += 'Zum Aktivieren setze einzelne DEBUG_* Flags in KONFIG auf true.\n';
  } else {
    debugInfo.forEach(info => { debugSection += `• ${info}\n`; });
  }
  return debugSection;
}
